<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест Telegram Бота</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        input, button {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        input { width: 70%; }
        button { cursor: pointer; }
        .result {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #f5f5f5;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    </style>
</head>
<body>
    <h1>📨 Тест отправки сообщения в Telegram</h1>
    <p>Бот: <strong>@чат_виджет_bot</strong></p>
    <p>Твой Chat ID: <strong>7545540622</strong></p>
    
    <input type="text" id="message" placeholder="Введите сообщение...">
    <button onclick="sendMessage()">Отправить в Telegram</button>
    
    <div class="result" id="result">
        👆 Напиши сообщение и нажми "Отправить"
    </div>
    
    <hr>
    <h3>📥 Проверка входящих сообщений</h3>
    <button onclick="checkUpdates()">Проверить новые сообщения</button>
    <div class="result" id="updates">
        👆 Нажми, чтобы проверить ответы от бота
    </div>

    <script>
        const BOT_TOKEN = '8743342099:AAGWRLBrNjd8YlkHPSeqOU64J4-0fJdILPg';
        const YOUR_CHAT_ID = '7545540622';
        
        const resultDiv = document.getElementById('result');
        const updatesDiv = document.getElementById('updates');
        
        async function sendMessage() {
            const message = document.getElementById('message').value;
            if (!message) {
                alert('Введите сообщение');
                return;
            }
            
            resultDiv.innerHTML = '⏳ Отправка...';
            resultDiv.className = 'result';
            
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: YOUR_CHAT_ID,
                        text: `📝 Тестовое сообщение\n\nТекст: ${message}\n\nВремя: ${new Date().toLocaleString()}`
                    })
                });
                
                const data = await response.json();
                console.log('Ответ от Telegram:', data);
                
                if (data.ok) {
                    resultDiv.innerHTML = '✅ СООБЩЕНИЕ ОТПРАВЛЕНО!\n\nПроверь Telegram — тебе должно прийти сообщение от бота.';
                    resultDiv.className = 'result success';
                    document.getElementById('message').value = '';
                } else {
                    resultDiv.innerHTML = `❌ ОШИБКА:\n${JSON.stringify(data, null, 2)}`;
                    resultDiv.className = 'result error';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                resultDiv.innerHTML = `❌ ОШИБКА СОЕДИНЕНИЯ:\n${error.message}\n\nВозможно, Telegram API заблокирован в твоей сети.`;
                resultDiv.className = 'result error';
            }
        }
        
        async function checkUpdates() {
            updatesDiv.innerHTML = '⏳ Проверка...';
            updatesDiv.className = 'result';
            
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`;
                const response = await fetch(url);
                const data = await response.json();
                console.log('Updates:', data);
                
                if (data.ok && data.result.length > 0) {
                    let messages = '📥 ПОЛУЧЕННЫЕ СООБЩЕНИЯ:\n\n';
                    data.result.forEach(update => {
                        if (update.message && update.message.text) {
                            messages += `📨 От: ${update.message.from?.first_name || 'Unknown'}\n`;
                            messages += `💬 Текст: ${update.message.text}\n`;
                            messages += `⏰ Время: ${new Date(update.message.date * 1000).toLocaleString()}\n`;
                            messages += `🆔 Chat ID: ${update.message.chat.id}\n`;
                            messages += `━━━━━━━━━━━━━━━━━━━━━\n`;
                        }
                    });
                    updatesDiv.innerHTML = messages;
                    updatesDiv.className = 'result success';
                } else {
                    updatesDiv.innerHTML = '📭 Нет новых сообщений.\n\nНапиши что-нибудь боту в Telegram, а потом нажми "Проверить"';
                    updatesDiv.className = 'result';
                }
            } catch (error) {
                updatesDiv.innerHTML = `❌ Ошибка: ${error.message}`;
                updatesDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
