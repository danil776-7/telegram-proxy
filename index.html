<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* ========== ПЕРЕМЕННЫЕ ДЛЯ ТЕМ ========== */
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --widget-bg: white;
            --header-bg-start: #667eea;
            --header-bg-end: #764ba2;
            --messages-bg: #f5f7fb;
            --user-message-bg-start: #667eea;
            --user-message-bg-end: #764ba2;
            --user-message-color: white;
            --bot-message-bg: white;
            --bot-message-color: #1a1a2e;
            --operator-message-bg: #e8f4fd;
            --operator-message-color: #1a1a2e;
            --info-message-bg: #fff3e0;
            --info-message-color: #e65100;
            --input-bg: #f8f9fa;
            --input-border: #e0e4e8;
            --input-focus: #667eea;
            --status-online-bg: #d4edda;
            --status-online-color: #155724;
            --status-error-bg: #f8d7da;
            --status-error-color: #721c24;
            --status-sending-bg: #fff3cd;
            --status-sending-color: #856404;
            --phone-card-bg: white;
            --phone-card-text: #333;
            --phone-card-subtext: #666;
            --border-color: #e0e4e8;
        }
        
        /* Тёмная тема */
        body.dark-theme {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --widget-bg: #1e1e2e;
            --header-bg-start: #0f3460;
            --header-bg-end: #16213e;
            --messages-bg: #2a2a3a;
            --user-message-bg-start: #0f3460;
            --user-message-bg-end: #16213e;
            --user-message-color: #e0e0e0;
            --bot-message-bg: #2d2d3d;
            --bot-message-color: #e0e0e0;
            --operator-message-bg: #1a3a5c;
            --operator-message-color: #e0e0e0;
            --info-message-bg: #3a3a1a;
            --info-message-color: #ffd700;
            --input-bg: #2a2a3a;
            --input-border: #3a3a4a;
            --input-focus: #667eea;
            --status-online-bg: #1a3a2a;
            --status-online-color: #90ee90;
            --status-error-bg: #3a1a1a;
            --status-error-color: #ff6b6b;
            --status-sending-bg: #3a3a1a;
            --status-sending-color: #ffd700;
            --phone-card-bg: #1e1e2e;
            --phone-card-text: #e0e0e0;
            --phone-card-subtext: #a0a0a0;
            --border-color: #3a3a4a;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background 0.3s ease;
        }
        
        .content {
            text-align: center;
            padding: 32px 20px;
            background: var(--widget-bg);
            border-radius: 28px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            transition: background 0.3s ease;
        }
        
        h1 { 
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        p { color: var(--phone-card-subtext); line-height: 1.5; font-size: 16px; }
        
        .theme-toggle {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--widget-bg);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            z-index: 1001;
            transition: all 0.3s ease;
            color: var(--bot-message-color);
        }
        
        /* ========== ВИДЖЕТ ========== */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 650px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 40px);
            background: var(--widget-bg);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay { display: none; }
        
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        
        .chat-widget.closed .open-icon { display: flex; }
        
        .chat-header {
            background: linear-gradient(135deg, var(--header-bg-start) 0%, var(--header-bg-end) 100%);
            color: white;
            padding: 20px 20px 16px 20px;
            text-align: center;
            flex-shrink: 0;
            position: relative;
        }
        
        .chat-header h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .chat-header p {
            font-size: 13px;
            opacity: 0.8;
            color: white;
            margin-top: 4px;
        }
        
        .header-buttons {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }
        
        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .clear-btn:hover, .close-btn:hover { background: rgba(255,255,255,0.3); }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: var(--messages-bg);
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
            transition: background 0.3s ease;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 15px;
            line-height: 1.4;
            transition: all 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, var(--user-message-bg-start) 0%, var(--user-message-bg-end) 100%);
            color: var(--user-message-color);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: var(--bot-message-bg);
            color: var(--bot-message-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .operator-message {
            background: var(--operator-message-bg);
            color: var(--operator-message-color);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .info-message {
            background: var(--info-message-bg);
            color: var(--info-message-color);
            align-self: center;
            border-radius: 20px;
            font-size: 12px;
            padding: 8px 16px;
            max-width: 90%;
            text-align: center;
        }
        
        .operator-name {
            font-size: 11px;
            color: #667eea;
            margin-bottom: 4px;
            font-weight: 500;
        }
        
        body.dark-theme .operator-name {
            color: #90a0ff;
        }
        
        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            object-fit: contain;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid var(--border-color);
            background: var(--widget-bg);
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--input-border);
            border-radius: 30px;
            outline: none;
            font-size: 16px;
            transition: all 0.2s;
            background: var(--input-bg);
            color: var(--bot-message-color);
        }
        
        .chat-input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background: var(--widget-bg);
        }
        
        .send-btn, .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .file-btn { background: #6c757d; }
        .send-btn:active, .file-btn:active { transform: scale(0.96); }
        
        .status {
            font-size: 12px;
            padding: 8px 14px;
            text-align: center;
            background: var(--status-online-bg);
            color: var(--status-online-color);
            border-radius: 20px;
            margin-bottom: 8px;
            width: fit-content;
            align-self: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }
        
        .status.online { background: var(--status-online-bg); color: var(--status-online-color); }
        .status.error { background: var(--status-error-bg); color: var(--status-error-color); }
        .status.sending { background: var(--status-sending-bg); color: var(--status-sending-color); }
        
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--phone-card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 28px;
            padding: 20px;
            transition: background 0.3s ease;
        }
        
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 340px;
        }
        
        .phone-card h4 {
            font-size: 24px;
            font-weight: 600;
            color: var(--phone-card-text);
            margin-bottom: 12px;
        }
        
        .phone-card p {
            font-size: 14px;
            color: var(--phone-card-subtext);
            margin-bottom: 24px;
            line-height: 1.5;
        }
        
        .phone-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .country-select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--phone-card-text);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .phone-input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            text-align: center;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: var(--input-bg);
            color: var(--phone-card-text);
            font-family: monospace;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .phone-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }
        
        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
        
        .error-text {
            color: #dc3545;
            font-size: 12px;
            margin-top: 8px;
        }
        
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
                max-width: 100vw;
                max-height: 100vh;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; font-size: 14px; }
            .message img { max-height: 150px; }
            .phone-card { padding: 20px 16px; }
            .phone-card h4 { font-size: 20px; }
            .country-select { font-size: 14px; padding: 10px 8px; }
            .phone-input { font-size: 16px; padding: 14px; }
            .phone-submit { padding: 12px 20px; font-size: 15px; }
            .theme-toggle { top: 10px; left: 10px; padding: 6px 12px; font-size: 12px; }
        }
    </style>
</head>
<body>
<button class="theme-toggle" id="themeToggle">🌙 Тёмная тема</button>

<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>Чат с поддержкой</h3>
        <p>Мы на связи и готовы помочь</p>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Определение страны...</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        // Тёмная тема
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('chat_theme');
        
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeToggle.textContent = '☀️ Светлая тема';
        }
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('chat_theme', isDark ? 'dark' : 'light');
            themeToggle.textContent = isDark ? '☀️ Светлая тема' : '🌙 Тёмная тема';
        });
        
        const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
        
        const countries = [
            { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', maxDigits: 10 },
            { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', maxDigits: 9 },
            { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', maxDigits: 9 },
            { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', maxDigits: 10 },
            { code: 'BY', name: '🇧🇾 Беларусь', phoneCode: '+375', maxDigits: 9 },
            { code: 'US', name: '🇺🇸 США', phoneCode: '+1', maxDigits: 10 },
            { code: 'GB', name: '🇬🇧 Великобритания', phoneCode: '+44', maxDigits: 10 },
            { code: 'DE', name: '🇩🇪 Германия', phoneCode: '+49', maxDigits: 10 },
            { code: 'FR', name: '🇫🇷 Франция', phoneCode: '+33', maxDigits: 9 },
            { code: 'IT', name: '🇮🇹 Италия', phoneCode: '+39', maxDigits: 10 }
        ];
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now();
            localStorage.setItem('chat_user_id', userId);
        }
        
        let userPhone = localStorage.getItem('user_phone');
        let isPhoneRequired = !userPhone;
        
        let userGeo = { ip: '', countryCode: 'NL', countryName: 'Нидерланды', region: 'Noord-Holland', city: 'Amsterdam' };
        let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
        let processedIds = new Set(JSON.parse(localStorage.getItem('chat_processedIds') || '[]'));
        let infoMessageSent = false;
        
        async function detectGeo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                if (data && data.country_code) {
                    userGeo = {
                        ip: data.ip,
                        countryCode: data.country_code,
                        countryName: data.country_name,
                        region: data.region,
                        city: data.city
                    };
                    console.log('📍 Геолокация:', userGeo.countryName, userGeo.city);
                }
            } catch (error) {
                console.error('Ошибка геолокации:', error);
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userGeo.ip = ipData.ip;
            }
        }
        
        const widget = document.getElementById('chatWidget');
        const clearBtn = document.getElementById('clearBtn');
        const closeBtn = document.querySelector('.close-btn');
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        
        function addMessage(text, isUser, isImage = false, imageUrl = null, msgId = null, timestamp = null, operatorName = null, isInfo = false) {
            if (msgId && processedIds.has(msgId)) return;
            
            const div = document.createElement('div');
            if (isInfo) {
                div.className = 'message info-message';
            } else if (operatorName && !isUser) {
                div.className = 'message operator-message';
                const nameSpan = document.createElement('div');
                nameSpan.className = 'operator-name';
                nameSpan.innerText = operatorName;
                div.appendChild(nameSpan);
            } else {
                div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            }
            
            if (isImage && imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.onclick = () => window.open(imageUrl, '_blank');
                div.appendChild(img);
                if (text) div.appendChild(document.createTextNode(' ' + text));
            } else {
                div.innerText = text;
            }
            
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            const msgDate = timestamp ? new Date(timestamp * 1000) : new Date();
            timeSpan.innerText = formatTime(msgDate);
            div.appendChild(timeSpan);
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            if (msgId) {
                processedIds.add(msgId);
                localStorage.setItem('chat_processedIds', JSON.stringify([...processedIds]));
            }
            
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ text, isUser, isImage, imageUrl, time: Date.now(), id: msgId, isInfo });
            localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
        }
        
        function setStatus(text, type = 'online') {
            if (statusDiv) {
                statusDiv.innerHTML = text;
                statusDiv.className = `status ${type}`;
            }
        }
        
        function formatTime(date) {
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }
        
        // Показываем информационное сообщение с данными пользователя
        function showUserInfoMessage() {
            if (infoMessageSent) return;
            
            const currentTime = new Date();
            const timeStr = currentTime.toLocaleString('ru-RU', {
                hour: '2-digit',
                minute: '2-digit',
                day: '2-digit',
                month: '2-digit',
                hour12: false
            });
            
            const infoText = `🖥️ **Информация о вас**\n\n📍 **IP-адрес:** ${userGeo.ip}\n🌍 **Геолокация:** ${userGeo.countryName}${userGeo.city ? ', ' + userGeo.city : ''}${userGeo.region ? ' (' + userGeo.region + ')' : ''}\n📞 **Телефон:** ${userPhone || 'не указан'}\n🕐 **Время подключения:** ${timeStr}`;
            
            addMessage(infoText, false, false, null, null, null, null, true);
            infoMessageSent = true;
        }
        
        async function registerPhone(phone) {
            try {
                const response = await fetch(`${PROXY_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId, 
                        site: window.location.hostname, 
                        ip: userGeo.ip, 
                        phone,
                        region: `${userGeo.countryName}${userGeo.city ? ', ' + userGeo.city : ''}`
                    })
                });
                const data = await response.json();
                if (data.ok) {
                    userPhone = phone;
                    localStorage.setItem('user_phone', phone);
                    isPhoneRequired = false;
                    addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false);
                    showUserInfoMessage();
                    return true;
                }
                return false;
            } catch (error) {
                return false;
            }
        }
        
        function showPhoneForm() {
            const oldOverlay = document.querySelector('.phone-overlay');
            if (oldOverlay) oldOverlay.remove();
            
            const detectedText = userGeo.countryName ? `📍 Определено: ${userGeo.countryName}${userGeo.city ? ', ' + userGeo.city : ''}` : '';
            
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Чат с поддержкой</h4>
                    <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам, даже если вы уйдете с сайта.</p>
                    <p style="font-size: 12px; color: #888; margin-bottom: 8px;">${detectedText}</p>
                    <div class="phone-input-wrapper">
                        <select class="country-select" id="countrySelect">
                            ${countries.map(c => `<option value="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}" ${c.code === userGeo.countryCode ? 'selected' : ''}>${c.name} ${c.phoneCode}</option>`).join('')}
                        </select>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="Введите номер" inputmode="numeric" maxlength="10">
                    </div>
                    <div id="phoneError" class="error-text" style="display: none;"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                    <p style="font-size: 11px; color: #999; margin-top: 16px;">Нажимая кнопку "Начать чат", вы соглашаетесь с обработкой персональных данных</p>
                </div>
            `;
            widget.appendChild(overlay);
            
            const countrySelect = document.getElementById('countrySelect');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            
            let currentMaxDigits = 10;
            
            function updateMaxLength() {
                const selected = countrySelect.options[countrySelect.selectedIndex];
                currentMaxDigits = parseInt(selected.getAttribute('data-maxdigits'));
                phoneInput.maxLength = currentMaxDigits;
                phoneInput.placeholder = `${currentMaxDigits} цифр`;
                phoneInput.value = '';
                phoneError.style.display = 'none';
            }
            
            countrySelect.onchange = updateMaxLength;
            updateMaxLength();
            
            phoneInput.oninput = function() {
                this.value = this.value.replace(/\D/g, '');
                if (this.value.length > currentMaxDigits) {
                    this.value = this.value.slice(0, currentMaxDigits);
                }
            };
            
            phoneSubmit.onclick = async function() {
                const phoneDigits = phoneInput.value.trim();
                const selected = countrySelect.options[countrySelect.selectedIndex];
                const phoneCode = selected.getAttribute('data-phonecode');
                const maxDigits = parseInt(selected.getAttribute('data-maxdigits'));
                
                if (!phoneDigits || phoneDigits.length !== maxDigits) {
                    phoneError.textContent = `Введите ровно ${maxDigits} цифр`;
                    phoneError.style.display = 'block';
                    return;
                }
                
                const fullPhone = phoneCode + phoneDigits;
                
                phoneError.style.display = 'none';
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Проверка...';
                
                const success = await registerPhone(fullPhone);
                if (success) {
                    overlay.remove();
                } else {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.textContent = 'Ошибка. Попробуйте позже.';
                    phoneError.style.display = 'block';
                }
            };
        }
        
        async function sendToTelegram(text, imageBase64 = null) {
            if (isPhoneRequired) {
                showPhoneForm();
                return;
            }
            if (!text && !imageBase64) return;
            if (text) addMessage(text, true);
            else if (imageBase64) addMessage('📷 Изображение', true);
            setStatus('⏳ Отправка...', 'sending');
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId, 
                        site: window.location.hostname, 
                        ip: userGeo.ip, 
                        text,
                        imageBase64,
                        region: `${userGeo.countryName}${userGeo.city ? ', ' + userGeo.city : ''}`
                    })
                });
                const data = await response.json();
                if (data.ok) setStatus('🟢 Онлайн', 'online');
                else throw new Error();
            } catch (error) {
                setStatus('🔴 Ошибка', 'error');
                setTimeout(() => setStatus('🟢 Онлайн', 'online'), 3000);
            }
        }
        
        async function checkReplies() {
            try {
                const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&ip=${userGeo.ip}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.update_id > lastUpdateId) lastUpdateId = update.update_id;
                        if (update.message && (update.message.text || update.message.hasImage)) {
                            if (update.message.text && (
                                update.message.text.includes('Новый пользователь') || 
                                update.message.text.startsWith('💬') || 
                                update.message.text.startsWith('📞') ||
                                update.message.text.includes('changed the topic name')
                            )) {
                                continue;
                            }
                            addMessage(
                                update.message.text || '📷 Изображение', 
                                false, 
                                update.message.hasImage || false, 
                                update.message.imageUrl || null, 
                                update.update_id, 
                                update.message.date,
                                update.message.from
                            );
                        }
                    }
                    localStorage.setItem('chat_lastUpdateId', lastUpdateId);
                }
            } catch (error) {
                console.error('Ошибка проверки:', error);
            }
        }
        
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.forEach(msg => {
                const div = document.createElement('div');
                if (msg.isInfo) {
                    div.className = 'message info-message';
                } else {
                    div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
                }
                if (msg.isImage && msg.imageUrl) {
                    const img = document.createElement('img');
                    img.src = msg.imageUrl;
                    img.onclick = () => window.open(msg.imageUrl, '_blank');
                    div.appendChild(img);
                    if (msg.text) div.appendChild(document.createTextNode(' ' + msg.text));
                } else {
                    div.innerText = msg.text;
                }
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = formatTime(new Date(msg.time));
                div.appendChild(timeSpan);
                messagesDiv.appendChild(div);
            });
            if (history.length === 0 && !isPhoneRequired) {
                setTimeout(() => {
                    addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false);
                    if (userPhone) showUserInfoMessage();
                }, 500);
            } else if (userPhone && !infoMessageSent && !isPhoneRequired) {
                setTimeout(() => showUserInfoMessage(), 500);
            }
        }
        
        widget.onclick = (e) => {
            if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
                widget.classList.remove('closed');
                if (isPhoneRequired) setTimeout(() => showPhoneForm(), 100);
                else if (userPhone && !infoMessageSent) setTimeout(() => showUserInfoMessage(), 200);
            }
        };
        
        if (closeBtn) closeBtn.onclick = () => widget.classList.add('closed');
        if (clearBtn) clearBtn.onclick = () => {
            if (confirm('Очистить историю чата?')) {
                localStorage.clear();
                location.reload();
            }
        };
        if (fileBtn) fileBtn.onclick = () => fileInput.click();
        if (fileInput) fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (ev) => sendToTelegram('', ev.target.result);
            reader.readAsDataURL(file);
            fileInput.value = '';
        };
        if (sendBtn) sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        };
        if (messageInput) messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendToTelegram(text);
                messageInput.value = '';
            }
        };
        
        loadHistory();
        setInterval(checkReplies, 5000);
        
        detectGeo().then(() => {
            if (isPhoneRequired) setTimeout(() => showPhoneForm(), 500);
            else if (userPhone) setTimeout(() => showUserInfoMessage(), 600);
        });
    })();
</script>
</body>
</html>
