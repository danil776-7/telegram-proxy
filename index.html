<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; }
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }
        .note strong { color: #333; }
        
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 550px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #25a3e2;
            cursor: pointer;
        }
        .chat-header {
            background: #25a3e2;
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        .clear-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 20px;
            transition: background 0.2s;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.4); }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .close-btn:hover { background: rgba(255,255,255,0.2); }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 16px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background: #25a3e2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #e4e6eb;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
        }
        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #ddd;
            background: white;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        .chat-input:focus { border-color: #25a3e2; }
        .send-btn, .file-btn {
            background: #25a3e2;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        .file-btn {
            background: #6c757d;
        }
        .send-btn:hover, .file-btn:hover { opacity: 0.9; }
        .chat-widget.closed .chat-header, 
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area {
            display: none;
        }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon {
            display: flex;
        }
        .status {
            font-size: 11px;
            padding: 6px;
            text-align: center;
            background: #e8e8e8;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .status.online { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.sending { background: #fff3cd; color: #856404; }
        
        @media (max-width: 480px) {
            .chat-widget { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
            .chat-widget.closed { width: 60px; height: 60px; bottom: 20px; right: 20px; border-radius: 30px; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам в виджет справа 👉</p>
    <div class="note">
        <strong>📌 Как это работает:</strong><br>
        1. Вы пишете сообщение или отправляете фото<br>
        2. В Telegram создаётся отдельный топик с вашими данными<br>
        3. Мы отвечаем в топике → ответ приходит сюда через 5-10 секунд
    </div>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <span>💬 Поддержка</span>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Готов к работе</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const PROXY_URL = 'https://telegram-proxy-viyx.onrender.com';
    
    let userId = localStorage.getItem('chat_user_id');
    if (!userId) {
        userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('chat_user_id', userId);
    }
    
    let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
    let processedIds = new Set(JSON.parse(localStorage.getItem('chat_processedIds') || '[]'));
    
    let userIp = 'не определён';
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => { userIp = data.ip; updateStatus(true, true); })
        .catch(() => updateStatus(true, true));
    
    const site = window.location.hostname;
    
    function updateStatus(isOnline = true, isActive = false) {
        fetch(`${PROXY_URL}/updateStatus`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, site, ip: userIp, isOnline, isActive })
        }).catch(console.error);
    }
    
    const widget = document.getElementById('chatWidget');
    const closeBtn = document.querySelector('.close-btn');
    const clearBtn = document.getElementById('clearBtn');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileBtn = document.getElementById('fileBtn');
    const fileInput = document.getElementById('fileInput');
    const statusDiv = document.getElementById('status');
    
    widget.addEventListener('click', (e) => {
        if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
            widget.classList.remove('closed');
        }
    });
    
    closeBtn.addEventListener('click', () => {
        widget.classList.add('closed');
    });
    
    clearBtn.addEventListener('click', () => {
        if (confirm('Очистить всю историю чата?')) {
            localStorage.removeItem('chat_history');
            localStorage.removeItem('chat_lastUpdateId');
            localStorage.removeItem('chat_processedIds');
            location.reload();
        }
    });
    
    function addMessage(text, isUser, isImage = false, imageUrl = null, msgId = null) {
        if (msgId && processedIds.has(msgId)) return;
        
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        
        if (isImage && imageUrl) {
            const img = document.createElement('img');
            img.src = imageUrl;
            div.appendChild(img);
            if (text) {
                const textNode = document.createTextNode(' ' + text);
                div.appendChild(textNode);
            }
        } else {
            div.innerText = text;
        }
        
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        if (msgId) {
            processedIds.add(msgId);
            localStorage.setItem('chat_processedIds', JSON.stringify([...processedIds]));
        }
        
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.push({ text, isUser, isImage, imageUrl, time: Date.now(), id: msgId });
        localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
    }
    
    function setStatus(text, type = 'online') {
        statusDiv.innerHTML = text;
        statusDiv.className = `status ${type}`;
    }
    
    async function sendToTelegram(text, imageBase64 = null) {
        if (!text && !imageBase64) return;
        
        if (text) addMessage(text, true);
        else if (imageBase64) addMessage('📷 Изображение', true, true, imageBase64);
        
        setStatus('⏳ Отправка...', 'sending');
        updateStatus(true, true);
        
        try {
            const response = await fetch(`${PROXY_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, site, ip: userIp, text, imageBase64 })
            });
            
            const data = await response.json();
            console.log('Ответ:', data);
            
            if (data.ok) {
                setStatus('✅ Отправлено!', 'online');
                setTimeout(() => setStatus('🟢 Онлайн', 'online'), 2000);
            } else {
                throw new Error(data.description || 'Ошибка');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            setStatus('❌ Ошибка', 'error');
            setTimeout(() => setStatus('🟢 Онлайн', 'online'), 3000);
        }
    }
    
    async function checkReplies() {
        try {
            const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}`);
            const data = await response.json();
            
            if (data.ok && data.result) {
                for (const update of data.result) {
                    lastUpdateId = Math.max(lastUpdateId, update.update_id + 1);
                    if (update.message && update.message.text && update.message.userId === userId) {
                        addMessage(update.message.text, false, false, null, update.update_id);
                    }
                }
                localStorage.setItem('chat_lastUpdateId', lastUpdateId);
            }
        } catch (error) {
            console.error('Ошибка проверки:', error);
        }
    }
    
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
            if (msg.isImage && msg.imageUrl) {
                const img = document.createElement('img');
                img.src = msg.imageUrl;
                div.appendChild(img);
                if (msg.text) div.appendChild(document.createTextNode(' ' + msg.text));
            } else {
                div.innerText = msg.text;
            }
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        if (history.length === 0) {
            setTimeout(() => {
                addMessage('Здравствуйте! Напишите ваш вопрос 😊', false);
            }, 500);
        }
    }
    
    fileBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (ev) => sendToTelegram('', ev.target.result);
        reader.readAsDataURL(file);
        fileInput.value = '';
    });
    
    sendBtn.addEventListener('click', () => {
        const text = messageInput.value.trim();
        if (text) sendToTelegram(text);
        messageInput.value = '';
    });
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        }
    });
    
    setInterval(() => updateStatus(true, true), 30000);
    window.addEventListener('focus', () => updateStatus(true, true));
    window.addEventListener('blur', () => updateStatus(false, false));
    window.addEventListener('beforeunload', () => updateStatus(false, false));
    
    loadHistory();
    setInterval(checkReplies, 5000);
    updateStatus(true, true);
</script>
</body>
</html>
