<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            margin: 20px;
        }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; }
        .demo-text {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 10px;
            font-size: 14px;
        }
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 550px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            font-size: 14px;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #25a3e2;
            cursor: pointer;
        }
        .chat-header {
            background: #25a3e2;
            color: white;
            padding: 12px 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #f9f9f9;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 16px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background: #25a3e2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #e4e6eb;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #ddd;
            background: white;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        .send-btn {
            background: #25a3e2;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
        }
        .chat-widget.closed .chat-header, 
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area {
            display: none;
        }
        .chat-widget.closed .close-btn {
            display: none;
        }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon {
            display: flex;
        }
        .status {
            font-size: 11px;
            padding: 4px;
            text-align: center;
            background: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам в виджет справа 👉</p>
    <div class="demo-text">
        <strong>Как это работает:</strong><br>
        1. Напишите сообщение<br>
        2. Мы получим его на почту<br>
        3. Ответим вам в Telegram<br><br>
        <span style="color: #e67e22;">⚠️ Для ответов используйте Telegram: @чат_виджет_bot</span>
    </div>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <span>💬 Поддержка</span>
        <button class="close-btn">×</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status" id="status">🟢 Онлайн</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    // Используем Google Apps Script как прокси (бесплатно, без блокировок)
    const PROXY_URL = 'https://script.google.com/macros/s/AKfycbxxxxxx/exec'; // Нужно будет создать
    
    // Временное решение - отправка на email через FormSubmit (бесплатно)
    const EMAIL_ENDPOINT = 'https://formsubmit.co/ajax/ТВОЯ_ПОЧТА@mail.ru'; // Замени на свою почту
    
    let userId = localStorage.getItem('chat_user_id');
    if (!userId) {
        userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('chat_user_id', userId);
    }
    
    // DOM элементы
    const widget = document.getElementById('chatWidget');
    const closeBtn = widget.querySelector('.close-btn');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    widget.addEventListener('click', (e) => {
        if (widget.classList.contains('closed')) {
            if (e.target.closest('.open-icon')) {
                widget.classList.remove('closed');
            }
        }
    });
    
    closeBtn.addEventListener('click', () => {
        widget.classList.add('closed');
    });
    
    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        const history = JSON.parse(localStorage.getItem('chat_history_' + userId) || '[]');
        history.push({ text, isUser, timestamp: Date.now() });
        localStorage.setItem('chat_history_' + userId, JSON.stringify(history.slice(-100)));
    }
    
    async function sendMessageToEmail(text) {
        addMessage(text, true);
        statusDiv.innerHTML = '⏳ Отправка...';
        
        const messageText = `
📝 НОВОЕ СООБЩЕНИЕ ИЗ ЧАТА

👤 ID пользователя: ${userId}
🌐 Сайт: ${window.location.hostname}
💬 Сообщение: ${text}
⏰ Время: ${new Date().toLocaleString('ru-RU')}

📌 Чтобы ответить пользователю:
1. Открой Telegram: https://t.me/чат_виджет_bot
2. Напиши ему: ${userId} - твой ответ
        `.trim();
        
        try {
            // Вариант 1: Отправка на email (работает всегда)
            const emailResponse = await fetch('https://formsubmit.co/ajax/7545540622@telegram.com', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: `Пользователь ${userId}`,
                    email: `${userId}@chat.com`,
                    message: messageText,
                    _subject: `💬 Новое сообщение из чата!`
                })
            });
            
            if (emailResponse.ok) {
                statusDiv.innerHTML = '✅ Отправлено';
                addMessage('✅ Сообщение отправлено! Мы ответим в Telegram.', false);
                setTimeout(() => { statusDiv.innerHTML = '🟢 Онлайн'; }, 3000);
            } else {
                throw new Error('Email не отправлен');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            statusDiv.innerHTML = '❌ Ошибка';
            addMessage('⚠️ Не удалось отправить. Попробуйте позже или напишите напрямую в Telegram: @чат_виджет_bot', false);
            setTimeout(() => { statusDiv.innerHTML = '🟢 Онлайн'; }, 3000);
        }
    }
    
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('chat_history_' + userId) || '[]');
        history.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
            div.innerText = msg.text;
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        sendMessageToEmail(text);
        messageInput.value = '';
    }
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    loadHistory();
    
    if (messagesDiv.children.length <= 1) {
        setTimeout(() => {
            addMessage('Здравствуйте! Напишите ваш вопрос. Мы ответим вам в Telegram 😊', false);
        }, 500);
    }
</script>
</body>
</html>
