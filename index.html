<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Чат с поддержкой</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #121214 0%, #374758 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .demo-content {
            text-align: center;
            padding: 40px 24px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
        }
        
        .demo-content h1 { 
            font-size: 28px;
            background: linear-gradient(135deg, #121214 0%, #C7FF2E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        /* ========== ОСНОВНОЙ ВИДЖЕТ ========== */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 400px;
            height: 700px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            background: #FFFFFF;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        
        .chat-widget.closed {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: #C7FF2E;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay,
        .chat-widget.closed .clear-confirm-overlay { 
            display: none; 
        }
        
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #121214;
        }
        
        .chat-widget.closed .open-icon { 
            display: flex; 
        }
        
        /* ========== ШАПКА ========== */
        .chat-header {
            background: #121214;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .operator-avatar {
            width: 44px;
            height: 44px;
            background: #C7FF2E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #121214;
        }
        
        .chat-header-text h3 {
            font-size: 17px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 2px;
        }
        
        .chat-header-text p {
            font-size: 13px;
            color: #C7FF2E;
            margin: 0;
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: #FFFFFF;
        }
        
        /* ========== СООБЩЕНИЯ ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #F5F7FA;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #D5DAE0;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #81858C;
            border-radius: 10px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 15px;
            line-height: 1.45;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #121214;
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: #FFFFFF;
            color: #121214;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #D5DAE0;
        }
        
        .system-message {
            background: #D5DAE0;
            color: #81858C;
            align-self: center;
            max-width: 90%;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 60px;
            text-align: center;
        }
        
        .operator-name {
            font-size: 12px;
            font-weight: 600;
            color: #C7FF2E;
            margin-bottom: 4px;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }
        
        /* Приветственное сообщение */
        .welcome-message {
            text-align: center;
            padding: 24px 20px;
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #D5DAE0;
        }
        
        .welcome-message h4 {
            font-size: 20px;
            font-weight: 600;
            color: #121214;
            margin-bottom: 12px;
        }
        
        .welcome-message p {
            font-size: 15px;
            color: #81858C;
            line-height: 1.4;
        }
        
        /* Вопрос от пользователя */
        .question-message {
            background: #F5F7FA;
            border: 1px solid #D5DAE0;
            color: #121214;
            padding: 16px;
            border-radius: 16px;
            margin: 8px 0;
        }
        
        /* ========== ПОЛЕ ВВОДА ========== */
        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #D5DAE0;
            background: #FFFFFF;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #D5DAE0;
            border-radius: 28px;
            outline: none;
            font-size: 16px;
            transition: all 0.2s;
            background: #F5F7FA;
            font-family: inherit;
        }
        
        .chat-input:focus {
            border-color: #C7FF2E;
            box-shadow: 0 0 0 3px rgba(199,255,46,0.1);
            background: #FFFFFF;
        }
        
        .send-btn {
            background: #121214;
            border: none;
            color: #FFFFFF;
            padding: 10px 20px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
        }
        
        /* ========== ФОРМА ТЕЛЕФОНА (точь-в-точь как на макете) ========== */
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            z-index: 20;
            border-radius: 28px;
            padding: 40px 24px;
        }
        
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 320px;
            margin: auto;
        }
        
        .phone-card h4 {
            font-size: 24px;
            font-weight: 700;
            color: #121214;
            margin-bottom: 12px;
        }
        
        .phone-card p {
            font-size: 15px;
            color: #81858C;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        
        .country-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: #F5F7FA;
            border: 1px solid #D5DAE0;
            border-radius: 16px;
            margin-bottom: 16px;
            cursor: pointer;
            font-weight: 500;
            color: #121214;
        }
        
        .country-selector span:last-child {
            color: #81858C;
        }
        
        .country-dropdown {
            position: absolute;
            background: #FFFFFF;
            border: 1px solid #D5DAE0;
            border-radius: 16px;
            width: calc(100% - 48px);
            max-height: 200px;
            overflow-y: auto;
            z-index: 41;
            display: none;
            margin-top: 60px;
        }
        
        .country-dropdown.show {
            display: block;
        }
        
        .country-option {
            padding: 12px 16px;
            cursor: pointer;
            color: #121214;
        }
        
        .country-option:hover {
            background: #F5F7FA;
        }
        
        .phone-input-field {
            display: flex;
            align-items: center;
            background: #F5F7FA;
            border: 1px solid #D5DAE0;
            border-radius: 16px;
            padding: 4px 16px;
            margin-bottom: 16px;
        }
        
        .phone-code {
            font-size: 16px;
            font-weight: 500;
            color: #121214;
            padding-right: 12px;
            border-right: 1px solid #D5DAE0;
        }
        
        .phone-input {
            flex: 1;
            padding: 16px 0 16px 12px;
            font-size: 16px;
            border: none;
            background: transparent;
            outline: none;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .phone-input::placeholder {
            color: #D5DAE0;
            letter-spacing: 1px;
        }
        
        .error-text {
            color: #E03434;
            font-size: 13px;
            margin-bottom: 16px;
            text-align: left;
        }
        
        .phone-submit {
            background: #121214;
            color: #FFFFFF;
            border: none;
            padding: 16px;
            border-radius: 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .agreement-text {
            font-size: 11px;
            color: #81858C;
            text-align: center;
            margin-top: 20px;
        }
        
        /* ========== МОДАЛЬНОЕ ОКНО ОЧИСТКИ ========== */
        .clear-confirm-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            border-radius: 28px;
            padding: 24px;
        }
        
        .clear-confirm-modal {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 24px;
            max-width: 280px;
            width: 100%;
            text-align: center;
        }
        
        .clear-confirm-modal h4 {
            font-size: 18px;
            font-weight: 600;
            color: #121214;
            margin-bottom: 12px;
        }
        
        .clear-confirm-modal p {
            font-size: 14px;
            color: #81858C;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        
        .clear-confirm-buttons {
            display: flex;
            gap: 12px;
        }
        
        .clear-confirm-cancel {
            flex: 1;
            padding: 12px;
            background: #F5F7FA;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            color: #81858C;
        }
        
        .clear-confirm-ok {
            flex: 1;
            padding: 12px;
            background: #E03434;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            color: #FFFFFF;
        }
        
        /* ========== АДАПТИВ ========== */
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; font-size: 14px; }
        }
        
        @media (min-width: 769px) {
            .chat-widget { width: 420px; height: 700px; }
            .message { max-width: 75%; }
        }
    </style>
</head>
<body>
<div class="demo-content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <div class="chat-header-info">
            <div class="operator-avatar">👩‍💼</div>
            <div class="chat-header-text">
                <h3>Чат с поддержкой</h3>
                <p>Оператор Анна</p>
            </div>
        </div>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">✕</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
            <h4>Чат с поддержкой</h4>
            <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже.<br>Мы ответим в течение пары минут.</p>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    (function() {
        const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
        
        const countries = [
            { code: 'UZ', name: 'Узбекистан', phoneCode: '+998', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '(__) __ __ __' },
            { code: 'NL', name: 'Нидерланды', phoneCode: '+31', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '(__) __ __ __' },
            { code: 'RU', name: 'Россия', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '(___) ___ __ __' },
            { code: 'UA', name: 'Украина', phoneCode: '+380', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '(__) __ __ __' },
            { code: 'KZ', name: 'Казахстан', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '(___) ___ __ __' },
            { code: 'US', name: 'США', phoneCode: '+1', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '(___) ___ __ __' }
        ];
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('chat_user_id', userId);
        }
        
        let userPhone = localStorage.getItem('user_phone');
        let isRegistered = !!userPhone;
        let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
        let userIp = '';
        let detectedCountry = 'UZ';
        
        async function detectGeo() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIp = ipData.ip;
                const response = await fetch(`https://ipapi.co/${userIp}/json/`);
                const geoData = await response.json();
                if (geoData && geoData.country_code) {
                    detectedCountry = geoData.country_code;
                }
            } catch (error) {}
        }
        
        function formatPhoneWithMask(value, mask) {
            const digits = value.replace(/\D/g, '');
            let result = '';
            let digitIndex = 0;
            for (let i = 0; i < mask.length && digitIndex < digits.length; i++) {
                if (mask[i] === '_') {
                    result += digits[digitIndex] || '_';
                    digitIndex++;
                } else {
                    result += mask[i];
                }
            }
            return result;
        }
        
        function addMessage(text, isUser, isSystem = false, operatorName = null) {
            const messagesDiv = document.getElementById('chatMessages');
            const div = document.createElement('div');
            
            if (isSystem) {
                div.className = 'message system-message';
                div.innerText = text;
            } else {
                div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                if (!isUser && operatorName) {
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'operator-name';
                    nameSpan.innerText = operatorName;
                    div.appendChild(nameSpan);
                }
                div.appendChild(document.createTextNode(text));
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                div.appendChild(timeSpan);
            }
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showPhoneForm() {
            const widget = document.getElementById('chatWidget');
            const oldOverlay = document.querySelector('.phone-overlay');
            if (oldOverlay) oldOverlay.remove();
            
            const currentCountry = countries.find(c => c.code === detectedCountry) || countries[0];
            
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Чат с поддержкой</h4>
                    <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам, даже если вы уйдете с сайта.</p>
                    <div class="country-selector" id="countrySelector">
                        <span id="selectedCountryName">${currentCountry.name}</span>
                        <span id="selectedCountryCode">${currentCountry.phoneCode}</span>
                    </div>
                    <div class="country-dropdown" id="countryDropdown">
                        ${countries.map(c => `<div class="country-option" data-code="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}" data-name="${c.name}" data-mask="${c.mask}">${c.name} ${c.phoneCode}</div>`).join('')}
                    </div>
                    <div class="phone-input-field">
                        <span class="phone-code" id="phoneCodeDisplay">${currentCountry.phoneCode}</span>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="${currentCountry.mask}" inputmode="numeric" maxlength="15">
                    </div>
                    <div id="phoneError" class="error-text"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                    <div class="agreement-text">Нажимая кнопку "Начать чат", вы соглашаетесь с обработкой персональных данных</div>
                </div>
            `;
            widget.appendChild(overlay);
            
            let currentMaxDigits = currentCountry.maxDigits;
            let currentPhoneCode = currentCountry.phoneCode;
            let currentCountryName = currentCountry.name;
            let currentPattern = currentCountry.pattern;
            let currentMask = currentCountry.mask;
            
            const countrySelector = document.getElementById('countrySelector');
            const countryDropdown = document.getElementById('countryDropdown');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            const phoneCodeDisplay = document.getElementById('phoneCodeDisplay');
            const selectedCountryName = document.getElementById('selectedCountryName');
            const selectedCountryCode = document.getElementById('selectedCountryCode');
            
            countrySelector.onclick = (e) => {
                e.stopPropagation();
                countryDropdown.classList.toggle('show');
            };
            
            document.querySelectorAll('.country-option').forEach(opt => {
                opt.onclick = () => {
                    currentMaxDigits = parseInt(opt.dataset.maxdigits);
                    currentPhoneCode = opt.dataset.phonecode;
                    currentCountryName = opt.dataset.name;
                    currentMask = opt.dataset.mask;
                    currentPattern = new RegExp(`^[0-9]{${currentMaxDigits}}$`);
                    
                    selectedCountryName.innerText = currentCountryName;
                    selectedCountryCode.innerText = currentPhoneCode;
                    phoneCodeDisplay.innerText = currentPhoneCode;
                    phoneInput.placeholder = currentMask;
                    phoneInput.value = '';
                    phoneError.innerText = '';
                    countryDropdown.classList.remove('show');
                };
            });
            
            document.addEventListener('click', () => {
                countryDropdown.classList.remove('show');
            });
            
            phoneInput.oninput = function() {
                let digits = this.value.replace(/\D/g, '');
                if (digits.length > currentMaxDigits) {
                    digits = digits.slice(0, currentMaxDigits);
                }
                this.value = formatPhoneWithMask(digits, currentMask);
                phoneError.innerText = '';
            };
            
            phoneSubmit.onclick = async () => {
                const digits = phoneInput.value.replace(/\D/g, '');
                
                if (!digits || digits.length === 0) {
                    phoneError.innerText = 'Неверно указан номер телефона';
                    return;
                }
                
                if (digits.length !== currentMaxDigits) {
                    phoneError.innerText = `Неверно указан номер телефона`;
                    return;
                }
                
                if (!currentPattern.test(digits)) {
                    phoneError.innerText = `Неверно указан номер телефона`;
                    return;
                }
                
                const fullPhone = currentPhoneCode + digits;
                
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Регистрация...';
                
                try {
                    const response = await fetch(`${PROXY_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, ip: userIp, phone: fullPhone, region: currentCountryName })
                    });
                    const data = await response.json();
                    
                    if (data.ok) {
                        localStorage.setItem('user_phone', fullPhone);
                        isRegistered = true;
                        overlay.remove();
                        document.getElementById('chatMessages').innerHTML = `
                            <div class="welcome-message">
                                <h4>Чат с поддержкой</h4>
                                <p>О чем вы хотели бы спросить?</p>
                            </div>
                        `;
                        addMessage('Добрый день! Подскажите, когда будет готов мой заказ №4412?', true);
                        addMessage('Здравствуйте! Уже проверяю статус вашего заказа. Одну минуту, пожалуйста...', false, false, 'Оператор Анна');
                    } else {
                        phoneSubmit.disabled = false;
                        phoneSubmit.textContent = 'Начать чат';
                        phoneError.innerText = 'Ошибка сервера';
                    }
                } catch (err) {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.innerText = 'Ошибка соединения';
                }
            };
        }
        
        function clearChat() {
            const overlay = document.createElement('div');
            overlay.className = 'clear-confirm-overlay';
            overlay.innerHTML = `
                <div class="clear-confirm-modal">
                    <h4>Очистить историю чата?</h4>
                    <p>Все сообщения в этом диалоге будут удалены навсегда. Вы не сможете их восстановить.</p>
                    <div class="clear-confirm-buttons">
                        <button class="clear-confirm-cancel" id="clearCancel">Отменить</button>
                        <button class="clear-confirm-ok" id="clearOk">Очистить</button>
                    </div>
                </div>
            `;
            document.getElementById('chatWidget').appendChild(overlay);
            
            document.getElementById('clearCancel').onclick = () => overlay.remove();
            document.getElementById('clearOk').onclick = () => {
                localStorage.removeItem('user_phone');
                localStorage.removeItem('chat_history');
                isRegistered = false;
                userPhone = null;
                document.getElementById('chatMessages').innerHTML = `
                    <div class="welcome-message">
                        <h4>Чат с поддержкой</h4>
                        <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже.<br>Мы ответим в течение пары минут.</p>
                    </div>
                `;
                overlay.remove();
                setTimeout(() => showPhoneForm(), 100);
            };
        }
        
        async function sendToTelegram(text) {
            if (!isRegistered) { showPhoneForm(); return; }
            if (!text) return;
            addMessage(text, true);
            try {
                await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, text })
                });
            } catch (err) {}
        }
        
        const widget = document.getElementById('chatWidget');
        document.querySelector('.close-btn').onclick = () => widget.classList.add('closed');
        document.getElementById('clearBtn').onclick = () => clearChat();
        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('messageInput');
            if (input.value.trim()) sendToTelegram(input.value.trim());
            input.value = '';
        };
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('sendBtn').click();
        };
        
        widget.onclick = (e) => {
            if (widget.classList.contains('closed')) {
                widget.classList.remove('closed');
                e.stopPropagation();
            }
        };
        
        detectGeo().then(() => {
            if (!localStorage.getItem('user_phone')) {
                setTimeout(() => showPhoneForm(), 500);
            } else {
                isRegistered = true;
            }
        });
    })();
</script>
</body>
</html>
