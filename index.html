<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .content {
            text-align: center;
            padding: 40px 24px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        h1 { 
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        p { color: #4a5568; line-height: 1.5; font-size: 16px; }
        
        /* ========== НОВЫЙ ДИЗАЙН ВИДЖЕТА ========== */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 420px;
            height: 680px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }
        
        .chat-widget.closed {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay { display: none; }
        
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        
        .chat-widget.closed .open-icon { display: flex; }
        
        /* Шапка виджета */
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-header-info {
            flex: 1;
        }
        
        .chat-header-info h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .chat-header-info p {
            font-size: 12px;
            opacity: 0.8;
            color: white;
            margin: 0;
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .clear-btn:hover, .close-btn:hover { background: rgba(255,255,255,0.25); }
        
        /* Область сообщений */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 14px;
            line-height: 1.45;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: white;
            color: #1e293b;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .system-message {
            background: #e9eef3;
            color: #4a5b6e;
            align-self: center;
            max-width: 90%;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 60px;
            text-align: center;
        }
        
        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            object-fit: contain;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }
        
        /* Поле ввода */
        .chat-input-area {
            display: flex;
            padding: 16px 20px;
            border-top: 1px solid #e2e8f0;
            background: white;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            outline: none;
            font-size: 15px;
            transition: all 0.2s;
            background: #f8fafc;
            font-family: inherit;
        }
        
        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background: white;
        }
        
        .send-btn, .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.1s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        
        .file-btn { background: #94a3b8; }
        .send-btn:active, .file-btn:active { transform: scale(0.96); }
        
        .status {
            font-size: 12px;
            padding: 8px 16px;
            text-align: center;
            background: #e2e8f0;
            color: #475569;
            border-radius: 24px;
            margin-bottom: 12px;
            width: fit-content;
            align-self: center;
        }
        
        /* Форма ввода телефона */
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 28px;
            padding: 24px;
        }
        
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 320px;
        }
        
        .phone-card h4 {
            font-size: 24px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 12px;
        }
        
        .phone-card p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        
        .phone-input-wrapper {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .country-select {
            flex: 1;
            padding: 14px 12px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #f8fafc;
            cursor: pointer;
            font-family: inherit;
        }
        
        .phone-input {
            flex: 2;
            padding: 14px 12px;
            font-size: 16px;
            text-align: center;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            background: #f8fafc;
            font-family: monospace;
            letter-spacing: 1px;
        }
        
        .phone-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }
        
        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .phone-submit:active { transform: scale(0.98); }
        .phone-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .error-text {
            color: #ef4444;
            font-size: 12px;
            margin-top: 8px;
        }
        
        /* Адаптация для телефонов */
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
                max-width: 100vw;
                max-height: 100vh;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; font-size: 14px; padding: 10px 14px; }
            .message img { max-height: 150px; }
            .chat-header { padding: 16px 20px; }
            .chat-header-info h3 { font-size: 16px; }
            .phone-input-wrapper { flex-direction: column; gap: 10px; }
            .country-select { width: 100%; }
            .phone-input { width: 100%; }
        }
        
        @media (min-width: 481px) and (max-width: 768px) {
            .chat-widget { width: 420px; height: 640px; }
        }
        
        @media (min-width: 769px) {
            .chat-widget { width: 440px; height: 700px; }
            .message { max-width: 75%; font-size: 15px; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <div class="chat-header-info">
            <h3>Чат с поддержкой</h3>
            <p>Мы на связи и готовы помочь</p>
        </div>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Загрузка...</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
        
        const countries = [
            { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', maxDigits: 9, pattern: /^[0-9]{9}$/ },
            { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/ },
            { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', maxDigits: 9, pattern: /^[0-9]{9}$/ },
            { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/ },
            { code: 'BY', name: '🇧🇾 Беларусь', phoneCode: '+375', maxDigits: 9, pattern: /^[0-9]{9}$/ },
            { code: 'US', name: '🇺🇸 США', phoneCode: '+1', maxDigits: 10, pattern: /^[0-9]{10}$/ },
            { code: 'GB', name: '🇬🇧 Великобритания', phoneCode: '+44', maxDigits: 10, pattern: /^[0-9]{10}$/ },
            { code: 'DE', name: '🇩🇪 Германия', phoneCode: '+49', maxDigits: 10, pattern: /^[0-9]{10}$/ },
            { code: 'FR', name: '🇫🇷 Франция', phoneCode: '+33', maxDigits: 9, pattern: /^[0-9]{9}$/ },
            { code: 'IT', name: '🇮🇹 Италия', phoneCode: '+39', maxDigits: 10, pattern: /^[0-9]{10}$/ },
            { code: 'ES', name: '🇪🇸 Испания', phoneCode: '+34', maxDigits: 9, pattern: /^[0-9]{9}$/ }
        ];
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('chat_user_id', userId);
        }
        
        let userPhone = localStorage.getItem('user_phone');
        let isRegistered = !!userPhone;
        let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
        let userIp = '';
        let detectedCountry = null;
        let detectedCountryName = '';
        
        // Функция для определения ГЕО (улучшенная)
        async function detectGeo() {
            try {
                // Получаем IP
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIp = ipData.ip;
                
                // Получаем точную геолокацию
                const geoRes = await fetch(`https://ipapi.co/${userIp}/json/`);
                const geoData = await geoRes.json();
                
                if (geoData && geoData.country_code) {
                    detectedCountry = geoData.country_code;
                    detectedCountryName = geoData.country_name;
                    console.log(`📍 Ваш регион: ${detectedCountryName} (${detectedCountry})`);
                } else {
                    // Fallback
                    detectedCountry = 'NL';
                    detectedCountryName = 'Нидерланды';
                }
            } catch (error) {
                console.error('Ошибка геолокации:', error);
                detectedCountry = 'NL';
                detectedCountryName = 'Нидерланды';
            }
            
            document.getElementById('status').innerHTML = `🟢 ${detectedCountryName}`;
            return { country: detectedCountry, name: detectedCountryName };
        }
        
        // Функция добавления сообщения
        function addMessage(text, isUser, isSystem = false, isImage = false, imageUrl = null, timestamp = null) {
            const div = document.createElement('div');
            
            if (isSystem) {
                div.className = 'message system-message';
                div.innerText = text;
            } else {
                div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                
                if (isImage && imageUrl) {
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.onclick = () => window.open(imageUrl, '_blank');
                    div.appendChild(img);
                    if (text) div.appendChild(document.createTextNode(' ' + text));
                } else {
                    div.innerText = text;
                }
                
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                // Используем правильное время (из Telegram или текущее локальное)
                let displayDate;
                if (timestamp) {
                    displayDate = new Date(timestamp * 1000);
                } else {
                    displayDate = new Date();
                }
                timeSpan.innerText = displayDate.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                div.appendChild(timeSpan);
            }
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Сохраняем в историю
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ text, isUser, isSystem, isImage, imageUrl, time: Date.now() });
            localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
        }
        
        function addSystemMessage(text) {
            addMessage(text, false, true);
        }
        
        function setStatus(text) {
            const statusDiv = document.getElementById('status');
            if (statusDiv) statusDiv.innerHTML = text;
        }
        
        // Обновление статуса (с защитой от спама)
        let lastStatusUpdate = 0;
        let currentStatus = false;
        async function updateActivity(isOnline, isActive) {
            const now = Date.now();
            if (now - lastStatusUpdate < 30000 && currentStatus === isOnline) return;
            lastStatusUpdate = now;
            currentStatus = isOnline;
            
            try {
                await fetch(`${PROXY_URL}/updateStatus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, isOnline, isActive })
                });
            } catch (err) {}
        }
        
        // Регистрация с телефоном
        async function registerPhone(phone, countryCode, countryName) {
            setStatus('⏳ Регистрация...');
            try {
                const response = await fetch(`${PROXY_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId, 
                        site: window.location.hostname, 
                        ip: userIp, 
                        phone: phone,
                        region: countryName
                    })
                });
                const data = await response.json();
                console.log('Регистрация:', data);
                if (data.ok) {
                    userPhone = phone;
                    localStorage.setItem('user_phone', phone);
                    isRegistered = true;
                    setStatus('🟢 Онлайн');
                    addSystemMessage('✅ Вы успешно подключены к поддержке');
                    addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false);
                    updateActivity(true, true);
                    return true;
                }
                return false;
            } catch (err) {
                console.error('Ошибка:', err);
                setStatus('❌ Ошибка');
                return false;
            }
        }
        
        // Форма ввода телефона
        function showPhoneForm() {
            const oldOverlay = document.querySelector('.phone-overlay');
            if (oldOverlay) oldOverlay.remove();
            
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>📱 Чат с поддержкой</h4>
                    <p>Оставьте номер телефона, чтобы мы могли ответить вам</p>
                    <div class="phone-input-wrapper">
                        <select class="country-select" id="countrySelect">
                            ${countries.map(c => `<option value="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}" data-name="${c.name}" ${c.code === detectedCountry ? 'selected' : ''}>${c.name} ${c.phoneCode}</option>`).join('')}
                        </select>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="" maxlength="10" inputmode="numeric">
                    </div>
                    <div id="phoneError" class="error-text" style="display: none;"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                </div>
            `;
            widget.appendChild(overlay);
            
            const countrySelect = document.getElementById('countrySelect');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            
            let currentCountry = countries.find(c => c.code === detectedCountry) || countries[0];
            let currentMaxDigits = currentCountry.maxDigits;
            let currentPhoneCode = currentCountry.phoneCode;
            let currentCountryName = currentCountry.name;
            let currentPattern = currentCountry.pattern;
            
            function updateCountry() {
                const selectedCode = countrySelect.options[countrySelect.selectedIndex].value;
                currentCountry = countries.find(c => c.code === selectedCode);
                currentMaxDigits = currentCountry.maxDigits;
                currentPhoneCode = currentCountry.phoneCode;
                currentCountryName = currentCountry.name;
                currentPattern = currentCountry.pattern;
                phoneInput.maxLength = currentMaxDigits;
                phoneInput.placeholder = `${currentMaxDigits} цифр`;
                phoneInput.value = '';
                phoneError.style.display = 'none';
            }
            
            countrySelect.onchange = updateCountry;
            updateCountry();
            
            phoneInput.oninput = function() {
                let value = this.value.replace(/\D/g, '');
                if (value.length > currentMaxDigits) {
                    value = value.slice(0, currentMaxDigits);
                }
                this.value = value;
                phoneError.style.display = 'none';
            };
            
            phoneSubmit.onclick = async function() {
                const digits = phoneInput.value.replace(/\D/g, '');
                if (!digits || digits.length !== currentMaxDigits) {
                    phoneError.textContent = `❌ Введите ровно ${currentMaxDigits} цифр`;
                    phoneError.style.display = 'block';
                    return;
                }
                
                // Проверка по паттерну страны
                if (!currentPattern.test(digits)) {
                    phoneError.textContent = `❌ Неверный формат номера для ${currentCountryName}`;
                    phoneError.style.display = 'block';
                    return;
                }
                
                const fullPhone = currentPhoneCode + digits;
                
                phoneError.style.display = 'none';
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Проверка...';
                
                const success = await registerPhone(fullPhone, currentPhoneCode, currentCountryName);
                if (success) {
                    overlay.remove();
                } else {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.textContent = '❌ Ошибка сервера. Попробуйте позже.';
                    phoneError.style.display = 'block';
                }
            };
        }
        
        // Отправка в Telegram
        async function sendToTelegram(text, imageBase64 = null) {
            if (!isRegistered) {
                showPhoneForm();
                return;
            }
            if (!text && !imageBase64) return;
            if (text) addMessage(text, true);
            else addMessage('📷 Изображение', true);
            updateActivity(true, true);
            
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        site: window.location.hostname,
                        text: text,
                        imageBase64: imageBase64
                    })
                });
                const data = await response.json();
                console.log('Отправка:', data);
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }
        
        // Получение ответов (включая фото)
        let lastFetchTime = 0;
        async function checkReplies() {
            try {
                const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&userId=${userId}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                            if (update.message) {
                                // Пропускаем системные сообщения о регистрации
                                if (update.message.text && update.message.text.includes('НОВЫЙ ПОЛЬЗОВАТЕЛЬ')) continue;
                                if (update.message.text && update.message.text.includes('закрепил')) continue;
                                
                                // Добавляем сообщение с правильным временем из Telegram
                                addMessage(
                                    update.message.text || '📷 Изображение', 
                                    false, 
                                    false,
                                    update.message.hasImage || false, 
                                    update.message.imageUrl || null,
                                    update.message.date  // Передаём timestamp из Telegram
                                );
                            }
                        }
                    }
                    localStorage.setItem('chat_lastUpdateId', lastUpdateId);
                }
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }
        
        // Инициализация
        const widget = document.getElementById('chatWidget');
        const clearBtn = document.getElementById('clearBtn');
        const closeBtn = document.querySelector('.close-btn');
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        
        // Открытие/закрытие виджета
        widget.onclick = (e) => {
            if (widget.classList.contains('closed')) {
                widget.classList.remove('closed');
                e.stopPropagation();
            }
        };
        
        closeBtn.onclick = (e) => {
            widget.classList.add('closed');
            e.stopPropagation();
        };
        
        clearBtn.onclick = (e) => {
            messagesDiv.innerHTML = '<div class="status online" id="status">🟢 Онлайн</div>';
            localStorage.removeItem('chat_history');
            e.stopPropagation();
        };
        
        // Отправка сообщения
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) {
                sendToTelegram(text);
                messageInput.value = '';
            }
        };
        
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                sendBtn.click();
            }
        };
        
        // Отправка фото
        fileBtn.onclick = () => fileInput.click();
        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    sendToTelegram('', event.target.result);
                };
                reader.readAsDataURL(file);
            }
            fileInput.value = '';
        };
        
        // Отслеживание активности
        let activeTimeout;
        function onUserActivity() {
            updateActivity(true, true);
            clearTimeout(activeTimeout);
            activeTimeout = setTimeout(() => updateActivity(true, false), 5000);
        }
        
        document.addEventListener('click', onUserActivity);
        document.addEventListener('scroll', onUserActivity);
        messageInput.addEventListener('focus', onUserActivity);
        
        // Запуск
        detectGeo().then(() => {
            if (userPhone) {
                isRegistered = true;
                setStatus('🟢 Онлайн');
                updateActivity(true, true);
            } else {
                setTimeout(() => {
                    if (!isRegistered) showPhoneForm();
                }, 500);
            }
        });
        
        // Проверка новых сообщений каждые 2 секунды
        setInterval(checkReplies, 2000);
        
        // Загрузка истории
        const savedHistory = JSON.parse(localStorage.getItem('chat_history') || '[]');
        savedHistory.forEach(msg => {
            if (msg.isSystem) addSystemMessage(msg.text);
            else addMessage(msg.text, msg.isUser, false, msg.isImage, msg.imageUrl);
        });
    })();
</script>
</body>
</html>
