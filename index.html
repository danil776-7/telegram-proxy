<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; line-height: 1.6; }
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
            text-align: left;
        }
        .note strong { color: #333; }
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 550px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #25a3e2;
            cursor: pointer;
        }
        .chat-header {
            background: #25a3e2;
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .close-btn:hover { background: rgba(255,255,255,0.2); }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 16px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background: #25a3e2;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot-message {
            background: #e4e6eb;
            color: black;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #ddd;
            background: white;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        .chat-input:focus { border-color: #25a3e2; }
        .send-btn {
            background: #25a3e2;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }
        .send-btn:hover { background: #1d8bc2; }
        .chat-widget.closed .chat-header, 
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area {
            display: none;
        }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon {
            display: flex;
        }
        .status {
            font-size: 11px;
            padding: 6px;
            text-align: center;
            background: #e8e8e8;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .status.online { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.sending { background: #fff3cd; color: #856404; }
        
        @media (max-width: 480px) {
            .chat-widget { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
            .chat-widget.closed { width: 60px; height: 60px; bottom: 20px; right: 20px; border-radius: 30px; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам в виджет справа 👉</p>
    <div class="note">
        <strong>📌 Как это работает:</strong><br>
        1. Вы пишете сообщение → оно приходит в Telegram<br>
        2. Вы отвечаете в Telegram → ответ приходит сюда через 5-10 секунд<br><br>
        <strong>⚠️ Важно:</strong> Напишите боту первым в Telegram, чтобы начать диалог
    </div>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <span>💬 Поддержка</span>
        <button class="close-btn">×</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Готов к работе</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    // ========== НАСТРОЙКИ ==========
    const BOT_TOKEN = '8743342099:AAGWRLBrNjd8YlkHPSeqOU64J4-0fJdILPg';
    const YOUR_CHAT_ID = '7545540622';
    const PROXY_URL = 'https://test-c7ow.onrender.com';
    
    let userId = localStorage.getItem('chat_user_id');
    if (!userId) {
        userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('chat_user_id', userId);
    }
    
    let lastUpdateId = 0;
    
    // Элементы
    const widget = document.getElementById('chatWidget');
    const closeBtn = document.querySelector('.close-btn');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    // Открыть/закрыть виджет
    widget.addEventListener('click', (e) => {
        if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
            widget.classList.remove('closed');
        }
    });
    
    closeBtn.addEventListener('click', () => {
        widget.classList.add('closed');
    });
    
    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        // Сохраняем историю
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.push({ text, isUser, time: Date.now() });
        localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
    }
    
    function setStatus(text, type = 'online') {
        statusDiv.innerHTML = text;
        statusDiv.className = `status ${type}`;
    }
    
    async function sendToTelegram(text) {
        addMessage(text, true);
        setStatus('⏳ Отправка...', 'sending');
        
        const messageText = `📝 НОВОЕ СООБЩЕНИЕ\n\n👤 ID: ${userId}\n🌐 Сайт: ${window.location.hostname}\n💬 Сообщение: ${text}\n\n⏰ Время: ${new Date().toLocaleString('ru-RU')}`;
        
        try {
            const response = await fetch(`${PROXY_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: BOT_TOKEN,
                    chatId: YOUR_CHAT_ID,
                    text: messageText
                })
            });
            
            const data = await response.json();
            console.log('Ответ прокси:', data);
            
            if (data.ok) {
                setStatus('✅ Отправлено!', 'online');
                setTimeout(() => setStatus('🟢 Онлайн', 'online'), 2000);
            } else {
                throw new Error(data.description || 'Ошибка отправки');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            setStatus('❌ Ошибка: ' + error.message, 'error');
            setTimeout(() => setStatus('🟢 Онлайн', 'online'), 3000);
        }
    }
    
    async function checkForReplies() {
        try {
            const response = await fetch(`${PROXY_URL}/getUpdates?token=${BOT_TOKEN}&offset=${lastUpdateId}`);
            const data = await response.json();
            
            if (data.ok && data.result) {
                for (const update of data.result) {
                    lastUpdateId = update.update_id + 1;
                    const message = update.message;
                    
                    // Проверяем, что сообщение от тебя (поддержки) и не является нашим исходящим
                    if (message && message.chat.id == YOUR_CHAT_ID && message.text) {
                        if (!message.text.includes('📝 НОВОЕ СООБЩЕНИЕ')) {
                            console.log('Новый ответ:', message.text);
                            addMessage(message.text, false);
                        }
                    }
                }
            }
        } catch (error) {
            console.error('Ошибка проверки ответов:', error);
        }
    }
    
    async function checkServer() {
        try {
            const response = await fetch(`${PROXY_URL}/`);
            const data = await response.json();
            if (data.status === 'ok') {
                console.log('✅ Сервер доступен');
                setStatus('🟢 Онлайн', 'online');
                return true;
            }
        } catch (error) {
            console.error('❌ Сервер недоступен:', error);
            setStatus('🔴 Сервер недоступен', 'error');
            return false;
        }
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        sendToTelegram(text);
        messageInput.value = '';
    }
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // Загрузка истории
    const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
    history.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
        div.innerText = msg.text;
        messagesDiv.appendChild(div);
    });
    
    // Приветствие
    if (messagesDiv.children.length <= 1) {
        setTimeout(() => {
            addMessage('Здравствуйте! Напишите ваш вопрос 😊', false);
        }, 500);
    }
    
    // Проверка сервера
    checkServer();
    setInterval(checkServer, 30000);
    
    // Проверка новых ответов каждые 5 секунд
    setInterval(checkForReplies, 5000);
</script>
</body>
</html>
