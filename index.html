<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Чат с поддержкой</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            -webkit-text-size-adjust: 100%;
        }
        
        .demo-content {
            text-align: center;
            padding: 40px 24px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .demo-content h1 { 
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        .demo-content p { 
            color: #4a5568; 
            line-height: 1.5; 
            font-size: 16px; 
        }
        
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 420px;
            height: 680px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        
        .chat-widget.closed {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay,
        .chat-widget.closed .clear-confirm-overlay { 
            display: none; 
        }
        
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        
        .chat-widget.closed .open-icon { 
            display: flex; 
        }
        
        .chat-header {
            background: white;
            border-bottom: 1px solid #eef2f6;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .operator-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }
        
        .chat-header-text h3 {
            font-size: 17px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 2px;
        }
        
        .chat-header-text p {
            font-size: 13px;
            color: #34c759;
            margin: 0;
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .clear-btn, .close-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: #8e8e93;
        }
        
        .clear-btn:hover, .close-btn:hover { 
            background: #f2f2f6; 
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 16px;
            -webkit-overflow-scrolling: touch;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 15px;
            line-height: 1.45;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: #f2f2f6;
            color: #1a1a1a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .system-message {
            background: #e9eef3;
            color: #6c6c70;
            align-self: center;
            max-width: 90%;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 60px;
            text-align: center;
        }
        
        .operator-name {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 4px;
        }
        
        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            object-fit: contain;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }
        
        .welcome-message {
            text-align: center;
            padding: 20px;
            background: #f8f9fc;
            border-radius: 16px;
            margin-bottom: 8px;
        }
        
        .welcome-message h4 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        
        .welcome-message p {
            font-size: 14px;
            color: #6c6c70;
            line-height: 1.5;
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #eef2f6;
            background: white;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 28px;
            outline: none;
            font-size: 16px;
            transition: all 0.2s;
            background: #f8f9fc;
        }
        
        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background: white;
        }
        
        @media (max-width: 768px) {
            .chat-input, .phone-input, .custom-select-trigger {
                font-size: 16px !important;
            }
        }
        
        .send-btn, .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.1s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .file-btn { background: #8e8e93; }
        .send-btn:active, .file-btn:active { transform: scale(0.96); }
        
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            flex-direction: column;
            z-index: 20;
            border-radius: 28px;
            padding: 32px 24px;
            overflow-y: auto;
        }
        
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 340px;
            margin: auto;
        }
        
        .phone-card h4 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        
        .phone-card p {
            font-size: 15px;
            color: #8e8e93;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        
        .custom-select {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }
        
        .custom-select-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #f8f9fc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }
        
        .custom-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 40;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        
        .custom-select-dropdown.show { display: block; }
        
        .custom-select-option {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }
        
        .custom-select-option:hover { background: #f2f2f6; }
        
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #f8f9fc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 4px 16px;
            margin-bottom: 16px;
        }
        
        .phone-code {
            font-size: 16px;
            font-weight: 500;
            color: #1a1a1a;
            padding-right: 12px;
            border-right: 1px solid #e2e8f0;
        }
        
        .phone-input {
            flex: 1;
            padding: 14px 0 14px 12px;
            font-size: 16px;
            border: none;
            background: transparent;
            font-family: monospace;
            outline: none;
        }
        
        .error-text {
            color: #ff3b30;
            font-size: 13px;
            margin-top: 8px;
            text-align: left;
        }
        
        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        
        .agreement-text {
            font-size: 11px;
            color: #8e8e93;
            text-align: center;
            margin-top: 20px;
        }
        
        .clear-confirm-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            border-radius: 28px;
            padding: 24px;
        }
        
        .clear-confirm-modal {
            background: white;
            border-radius: 20px;
            padding: 24px;
            max-width: 280px;
            width: 100%;
            text-align: center;
        }
        
        .clear-confirm-modal h4 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .clear-confirm-modal p {
            font-size: 14px;
            color: #6c6c70;
            margin-bottom: 24px;
        }
        
        .clear-confirm-buttons {
            display: flex;
            gap: 12px;
        }
        
        .clear-confirm-cancel {
            flex: 1;
            padding: 12px;
            background: #f2f2f6;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #007aff;
        }
        
        .clear-confirm-ok {
            flex: 1;
            padding: 12px;
            background: #ff3b30;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
        }
        
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; font-size: 14px; padding: 10px 14px; }
            .phone-overlay { padding: 24px 20px; }
            .phone-card h4 { font-size: 22px; }
        }
        
        @media (min-width: 769px) {
            .chat-widget { width: 440px; height: 700px; }
            .message { max-width: 75%; }
        }
        
        button, input, textarea, select {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="demo-content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <div class="chat-header-info">
            <div class="operator-avatar">👩‍💼</div>
            <div class="chat-header-text">
                <h3>Чат с поддержкой</h3>
                <p>🟢 Оператор Анна</p>
            </div>
        </div>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">✕</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
            <h4>💬 Чат с поддержкой</h4>
            <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже,<br>Мы ответим в течение пары минут.</p>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        // ========== ВАШ СЕРВЕР НА RENDER ==========
        const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
        
        const countries = [
            { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '12 34 56 789' },
            { code: 'UZ', name: '🇺🇿 Узбекистан', phoneCode: '+998', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '12 345 67 89' },
            { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '912 345 67 89' },
            { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '12 345 67 89' },
            { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '712 345 67 89' },
            { code: 'BY', name: '🇧🇾 Беларусь', phoneCode: '+375', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '12 345 67 89' },
            { code: 'US', name: '🇺🇸 США', phoneCode: '+1', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '212 555 1234' },
            { code: 'GB', name: '🇬🇧 Великобритания', phoneCode: '+44', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '7911 123456' },
            { code: 'DE', name: '🇩🇪 Германия', phoneCode: '+49', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '151 12345678' },
            { code: 'FR', name: '🇫🇷 Франция', phoneCode: '+33', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '6 12 34 56 78' },
            { code: 'IT', name: '🇮🇹 Италия', phoneCode: '+39', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '312 345 6789' },
            { code: 'ES', name: '🇪🇸 Испания', phoneCode: '+34', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '612 34 56 78' }
        ];
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('chat_user_id', userId);
        }
        
        let userPhone = localStorage.getItem('user_phone');
        let isRegistered = !!userPhone;
        let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
        let userIp = '';
        let detectedCountry = 'NL';
        
        async function detectGeo() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIp = ipData.ip;
                
                const response = await fetch(`https://ipapi.co/${userIp}/json/`);
                const geoData = await response.json();
                if (geoData && geoData.country_code) {
                    detectedCountry = geoData.country_code;
                    console.log(`📍 Регион: ${geoData.country_name} (${detectedCountry})`);
                }
            } catch (error) {
                console.error('Ошибка геолокации:', error);
            }
        }
        
        function formatMessageTime(timestamp) {
            const date = timestamp ? new Date(timestamp * 1000) : new Date();
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/Amsterdam' });
        }
        
        function addMessage(text, isUser, isSystem = false, isImage = false, imageUrl = null, timestamp = null, operatorName = null) {
            const messagesDiv = document.getElementById('chatMessages');
            const div = document.createElement('div');
            
            if (isSystem) {
                div.className = 'message system-message';
                div.innerText = text;
            } else {
                div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                if (!isUser && operatorName) {
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'operator-name';
                    nameSpan.innerText = operatorName;
                    div.appendChild(nameSpan);
                }
                if (isImage && imageUrl) {
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.onclick = () => window.open(imageUrl, '_blank');
                    div.appendChild(img);
                }
                if (text) div.appendChild(document.createTextNode(text));
                
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = formatMessageTime(timestamp);
                div.appendChild(timeSpan);
            }
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ text, isUser, isSystem, isImage, imageUrl, time: Date.now(), telegramTime: timestamp });
            localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
        }
        
        function addSystemMessage(text) {
            addMessage(text, false, true);
        }
        
        function clearChat() {
            if (confirm('Очистить чат? Номер телефона будет удалён.')) {
                localStorage.removeItem('user_phone');
                localStorage.removeItem('chat_history');
                isRegistered = false;
                userPhone = null;
                document.getElementById('chatMessages').innerHTML = `
                    <div class="welcome-message">
                        <h4>💬 Чат с поддержкой</h4>
                        <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже,<br>Мы ответим в течение пары минут.</p>
                    </div>
                `;
                setTimeout(() => showPhoneForm(), 100);
            }
        }
        
        function showPhoneForm() {
            const widget = document.getElementById('chatWidget');
            const oldOverlay = document.querySelector('.phone-overlay');
            if (oldOverlay) oldOverlay.remove();
            
            const currentCountry = countries.find(c => c.code === detectedCountry) || countries[0];
            
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Чат с поддержкой</h4>
                    <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам, даже если вы уйдете с сайта.</p>
                    <div class="custom-select" id="customSelect">
                        <div class="custom-select-trigger" id="selectTrigger">
                            <span id="selectedCountryName">${currentCountry.name}</span>
                            <span id="selectedCountryCode">${currentCountry.phoneCode}</span>
                        </div>
                        <div class="custom-select-dropdown" id="selectDropdown">
                            ${countries.map(c => `<div class="custom-select-option" data-code="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}" data-name="${c.name}">${c.name} ${c.phoneCode} (${c.maxDigits} цифр)</div>`).join('')}
                        </div>
                    </div>
                    <div class="phone-input-wrapper">
                        <span class="phone-code" id="phoneCodeDisplay">${currentCountry.phoneCode}</span>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="${currentCountry.mask}" inputmode="numeric">
                    </div>
                    <div id="phoneError" class="error-text"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                    <div class="agreement-text">Нажимая кнопку "Начать чат", вы соглашаетесь с обработкой персональных данных</div>
                </div>
            `;
            widget.appendChild(overlay);
            
            let currentMaxDigits = currentCountry.maxDigits;
            let currentPhoneCode = currentCountry.phoneCode;
            let currentCountryName = currentCountry.name;
            let currentPattern = currentCountry.pattern;
            
            const selectTrigger = document.getElementById('selectTrigger');
            const selectDropdown = document.getElementById('selectDropdown');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            const phoneCodeDisplay = document.getElementById('phoneCodeDisplay');
            
            selectTrigger.onclick = () => selectDropdown.classList.toggle('show');
            
            document.querySelectorAll('.custom-select-option').forEach(opt => {
                opt.onclick = () => {
                    currentMaxDigits = parseInt(opt.dataset.maxdigits);
                    currentPhoneCode = opt.dataset.phonecode;
                    currentCountryName = opt.dataset.name;
                    currentPattern = new RegExp(`^[0-9]{${currentMaxDigits}}$`);
                    
                    document.getElementById('selectedCountryName').innerText = currentCountryName;
                    document.getElementById('selectedCountryCode').innerText = currentPhoneCode;
                    phoneCodeDisplay.innerText = currentPhoneCode;
                    phoneInput.maxLength = currentMaxDigits;
                    phoneInput.placeholder = '_'.repeat(currentMaxDigits).split('').join(' ');
                    phoneInput.value = '';
                    phoneError.innerText = '';
                    selectDropdown.classList.remove('show');
                };
            });
            
            document.addEventListener('click', () => selectDropdown.classList.remove('show'));
            
            phoneInput.oninput = function() {
                let value = this.value.replace(/\D/g, '');
                if (value.length > currentMaxDigits) value = value.slice(0, currentMaxDigits);
                this.value = value;
                if (value.length > 0 && value.length < currentMaxDigits) {
                    phoneError.innerText = `Осталось ${currentMaxDigits - value.length} цифр из ${currentMaxDigits}`;
                    phoneError.style.color = '#8e8e93';
                } else {
                    phoneError.innerText = '';
                }
            };
            
            phoneSubmit.onclick = async () => {
                const digits = phoneInput.value.replace(/\D/g, '');
                
                if (!digits || digits.length === 0) {
                    phoneError.innerText = '❌ Введите номер телефона';
                    phoneError.style.color = '#ff3b30';
                    return;
                }
                
                if (digits.length !== currentMaxDigits) {
                    phoneError.innerText = `❌ Для ${currentCountryName} нужно ввести ровно ${currentMaxDigits} цифр (сейчас ${digits.length})`;
                    phoneError.style.color = '#ff3b30';
                    return;
                }
                
                if (!currentPattern.test(digits)) {
                    phoneError.innerText = `❌ Неверный формат номера для ${currentCountryName}`;
                    phoneError.style.color = '#ff3b30';
                    return;
                }
                
                const fullPhone = currentPhoneCode + digits;
                
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Регистрация...';
                
                try {
                    // ========== ИСПРАВЛЕНО: используем PROXY_URL ==========
                    const response = await fetch(`${PROXY_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, ip: userIp, phone: fullPhone, region: currentCountryName })
                    });
                    const data = await response.json();
                    
                    if (data.ok) {
                        localStorage.setItem('user_phone', fullPhone);
                        isRegistered = true;
                        overlay.remove();
                        addSystemMessage('✅ Вы успешно подключены к поддержке');
                        addMessage('Здравствуйте! Подскажите, о чем вы хотели бы спросить?', false, false, false, null, null, 'Оператор Анна');
                    } else {
                        phoneSubmit.disabled = false;
                        phoneSubmit.textContent = 'Начать чат';
                        phoneError.innerText = '❌ Ошибка сервера';
                        phoneError.style.color = '#ff3b30';
                    }
                } catch (err) {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.innerText = '❌ Ошибка соединения с сервером';
                    phoneError.style.color = '#ff3b30';
                    console.error('Ошибка:', err);
                }
            };
        }
        
        async function sendToTelegram(text, imageBase64 = null) {
            if (!isRegistered) { showPhoneForm(); return; }
            if (!text && !imageBase64) return;
            addMessage(text || '📷 Изображение', true);
            try {
                await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, text, imageBase64 })
                });
            } catch (err) {}
        }
        
        async function checkReplies() {
            if (!isRegistered) return;
            try {
                const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&userId=${userId}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                            if (update.message && !update.message.text?.includes('НОВЫЙ')) {
                                addMessage(update.message.text || '📷 Изображение', false, false, update.message.hasImage, update.message.imageUrl, update.message.date, 'Оператор Анна');
                            }
                        }
                    }
                    localStorage.setItem('chat_lastUpdateId', lastUpdateId);
                }
            } catch (err) {}
        }
        
        async function updateActivity(isOnline, isActive) {
            if (!isRegistered) return;
            try {
                await fetch(`${PROXY_URL}/updateStatus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, isOnline, isActive })
                });
            } catch (err) {}
        }
        
        const widget = document.getElementById('chatWidget');
        document.querySelector('.close-btn').onclick = () => widget.classList.add('closed');
        document.getElementById('clearBtn').onclick = () => clearChat();
        document.getElementById('sendBtn').onclick = () => {
            const input = document.getElementById('messageInput');
            if (input.value.trim()) sendToTelegram(input.value.trim());
            input.value = '';
        };
        document.getElementById('messageInput').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('sendBtn').click();
        };
        document.getElementById('fileBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (event) => sendToTelegram('', event.target.result);
                reader.readAsDataURL(file);
            }
        };
        
        widget.onclick = (e) => {
            if (widget.classList.contains('closed')) {
                widget.classList.remove('closed');
                e.stopPropagation();
            }
        };
        
        detectGeo().then(() => {
            if (!localStorage.getItem('user_phone')) {
                setTimeout(() => showPhoneForm(), 500);
            } else {
                isRegistered = true;
                const savedHistory = JSON.parse(localStorage.getItem('chat_history') || '[]');
                if (savedHistory.length > 0) {
                    savedHistory.forEach(msg => {
                        if (msg.isSystem) addSystemMessage(msg.text);
                        else addMessage(msg.text, msg.isUser, false, msg.isImage, msg.imageUrl, msg.telegramTime, msg.isUser ? null : 'Оператор Анна');
                    });
                } else {
                    addMessage('Здравствуйте! Подскажите, о чем вы хотели бы спросить?', false, false, false, null, null, 'Оператор Анна');
                }
            }
        });
        
        setInterval(checkReplies, 2000);
    })();
</script>
</body>
</html>
