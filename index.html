<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Чат с поддержкой</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #121214 0%, #374758 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .demo-content {
            text-align: center;
            padding: 40px 24px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
        }
        
        .demo-content h1 { 
            font-size: 28px;
            background: linear-gradient(135deg, #121214 0%, #C7FF2E 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        /* ========== ОСНОВНОЙ ВИДЖЕТ ========== */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 420px;
            height: 680px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            background: #FFFFFF;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        
        .chat-widget.closed {
            width: 64px;
            height: 64px;
            border-radius: 32px;
            background: #C7FF2E;
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay,
        .chat-widget.closed .clear-confirm-overlay { 
            display: none; 
        }
        
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #121214;
        }
        
        .chat-widget.closed .open-icon { 
            display: flex; 
        }
        
        /* ========== ШАПКА ========== */
        .chat-header {
            background: #121214;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .operator-avatar {
            width: 44px;
            height: 44px;
            background: #C7FF2E;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #121214;
        }
        
        .chat-header-text h3 {
            font-size: 17px;
            font-weight: 600;
            color: #FFFFFF;
            margin-bottom: 2px;
        }
        
        .chat-header-text p {
            font-size: 13px;
            color: #C7FF2E;
            margin: 0;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #C7FF2E;
            margin-left: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            color: #FFFFFF;
        }
        
        /* ========== СООБЩЕНИЯ ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #F5F7FA;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #D5DAE0;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #81858C;
            border-radius: 10px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 15px;
            line-height: 1.45;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: #121214;
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: #FFFFFF;
            color: #121214;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #D5DAE0;
        }
        
        .system-message {
            background: #D5DAE0;
            color: #81858C;
            align-self: center;
            max-width: 90%;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 60px;
            text-align: center;
        }
        
        .operator-name {
            font-size: 12px;
            font-weight: 600;
            color: #C7FF2E;
            margin-bottom: 4px;
        }
        
        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            object-fit: contain;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 6px;
            text-align: right;
        }
        
        .welcome-message {
            text-align: center;
            padding: 24px 20px;
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #D5DAE0;
        }
        
        .welcome-message h4 {
            font-size: 20px;
            font-weight: 600;
            color: #121214;
            margin-bottom: 12px;
        }
        
        .welcome-message p {
            font-size: 15px;
            color: #81858C;
            line-height: 1.4;
        }
        
        /* ========== ПОЛЕ ВВОДА ========== */
        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #D5DAE0;
            background: #FFFFFF;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #D5DAE0;
            border-radius: 28px;
            outline: none;
            font-size: 16px;
            transition: all 0.2s;
            background: #F5F7FA;
            font-family: inherit;
        }
        
        .chat-input:focus {
            border-color: #C7FF2E;
            box-shadow: 0 0 0 3px rgba(199,255,46,0.1);
            background: #FFFFFF;
        }
        
        .send-btn, .file-btn {
            background: #121214;
            border: none;
            color: #FFFFFF;
            padding: 10px 18px;
            border-radius: 28px;
            cursor: pointer;
            font-size: 15px;
            transition: transform 0.1s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        
        .file-btn { 
            background: #81858C;
        }
        
        .send-btn:active, .file-btn:active { 
            transform: scale(0.96); 
        }
        
        /* ========== ФОРМА ТЕЛЕФОНА ========== */
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            z-index: 20;
            border-radius: 28px;
            padding: 40px 24px;
            overflow-y: auto;
        }
        
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 320px;
            margin: auto;
        }
        
        .phone-card h4 {
            font-size: 24px;
            font-weight: 700;
            color: #121214;
            margin-bottom: 12px;
        }
        
        .phone-card p {
            font-size: 15px;
            color: #81858C;
            margin-bottom: 32px;
            line-height: 1.4;
        }
        
        .custom-select {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }
        
        .custom-select-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #F5F7FA;
            border: 1px solid #D5DAE0;
            border-radius: 16px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }
        
        .custom-select-trigger span:first-child {
            color: #121214;
        }
        
        .custom-select-trigger span:last-child {
            color: #81858C;
            font-size: 12px;
        }
        
        .custom-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #FFFFFF;
            border: 1px solid #D5DAE0;
            border-radius: 16px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 40;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        
        .custom-select-dropdown.show {
            display: block;
        }
        
        .custom-select-option {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
            color: #121214;
        }
        
        .custom-select-option:hover {
            background: #F5F7FA;
        }
        
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #F5F7FA;
            border: 1px solid #D5DAE0;
            border-radius: 16px;
            padding: 4px 16px;
            margin-bottom: 16px;
        }
        
        .phone-code {
            font-size: 16px;
            font-weight: 500;
            color: #121214;
            padding-right: 12px;
            border-right: 1px solid #D5DAE0;
        }
        
        .phone-input {
            flex: 1;
            padding: 14px 0 14px 12px;
            font-size: 16px;
            border: none;
            background: transparent;
            font-family: monospace;
            outline: none;
            color: #121214;
        }
        
        .phone-input::placeholder {
            color: #D5DAE0;
        }
        
        .error-text {
            color: #E03434;
            font-size: 13px;
            margin-top: 8px;
            text-align: left;
        }
        
        .phone-submit {
            background: #121214;
            color: #FFFFFF;
            border: none;
            padding: 16px 24px;
            border-radius: 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: transform 0.1s;
        }
        
        .phone-submit:active { 
            transform: scale(0.98); 
        }
        
        .phone-submit:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        
        .agreement-text {
            font-size: 11px;
            color: #81858C;
            text-align: center;
            margin-top: 20px;
        }
        
        /* ========== МОДАЛЬНОЕ ОКНО ОЧИСТКИ ========== */
        .clear-confirm-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            border-radius: 28px;
            padding: 24px;
        }
        
        .clear-confirm-modal {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 24px;
            max-width: 280px;
            width: 100%;
            text-align: center;
        }
        
        .clear-confirm-modal h4 {
            font-size: 18px;
            font-weight: 600;
            color: #121214;
            margin-bottom: 12px;
        }
        
        .clear-confirm-modal p {
            font-size: 14px;
            color: #81858C;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        
        .clear-confirm-buttons {
            display: flex;
            gap: 12px;
        }
        
        .clear-confirm-cancel {
            flex: 1;
            padding: 12px;
            background: #F5F7FA;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #81858C;
        }
        
        .clear-confirm-ok {
            flex: 1;
            padding: 12px;
            background: #E03434;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #FFFFFF;
        }
        
        /* ========== АДАПТИВ ========== */
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; font-size: 14px; }
            .phone-overlay { padding: 24px 20px; }
        }
        
        @media (min-width: 769px) {
            .chat-widget { width: 440px; height: 700px; }
            .message { max-width: 75%; }
        }
        
        button, input, textarea, select {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="demo-content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <div class="chat-header-info">
            <div class="operator-avatar">👩‍💼</div>
            <div class="chat-header-text">
                <h3>Чат с поддержкой <span class="status-indicator" id="statusIndicator"></span></h3>
                <p>Оператор Анна</p>
            </div>
        </div>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">✕</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
            <h4>Чат с поддержкой</h4>
            <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже.<br>Мы ответим в течение пары минут.</p>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
        
        const SESSION_HOURS = 36;
        const INACTIVITY_TIMEOUT = 30000; // 30 секунд неактивности до офлайн
        
        const countries = [
            { code: 'UZ', name: '🇺🇿 Узбекистан', phoneCode: '+998', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '__ __ __ __' },
            { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '__ __ __ __' },
            { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '___ ___ __ __' },
            { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '__ __ __ __' },
            { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '___ ___ __ __' },
            { code: 'US', name: '🇺🇸 США', phoneCode: '+1', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '___ ___ __ __' }
        ];
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('chat_user_id', userId);
        }
        
        // Проверка сессии
        const sessionStart = localStorage.getItem('session_start');
        const now = Date.now();
        if (sessionStart) {
            const hoursPassed = (now - parseInt(sessionStart)) / (1000 * 60 * 60);
            if (hoursPassed >= SESSION_HOURS) {
                localStorage.removeItem('user_phone');
                localStorage.removeItem('chat_history');
                localStorage.removeItem('chat_lastUpdateId');
                localStorage.setItem('session_start', now.toString());
            }
        } else {
            localStorage.setItem('session_start', now.toString());
        }
        
        let userPhone = localStorage.getItem('user_phone');
        let isRegistered = !!userPhone;
        let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
        let userIp = '';
        let detectedCountry = 'UZ';
        
        // Улучшенная система отслеживания активности
        let inactivityTimer = null;
        let isOnline = false;
        let isPageVisible = true;
        let lastActivityTime = Date.now();
        let statusCheckInterval = null;
        
        const statusIndicator = document.getElementById('statusIndicator');
        
        // Функция обновления индикатора статуса в UI
        function updateStatusIndicator() {
            if (statusIndicator) {
                if (isOnline) {
                    statusIndicator.style.backgroundColor = '#C7FF2E';
                    statusIndicator.style.animation = 'pulse 2s infinite';
                } else {
                    statusIndicator.style.backgroundColor = '#81858C';
                    statusIndicator.style.animation = 'none';
                }
            }
        }
        
        function formatMessageTime(timestamp) {
            const date = timestamp ? new Date(timestamp * 1000) : new Date();
            return date.toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit',
                timeZone: 'Europe/Amsterdam'
            });
        }
        
        // ========== ФУНКЦИЯ ДОБАВЛЕНИЯ СООБЩЕНИЯ ==========
        function addMessage(text, isUser, isSystem = false, isImage = false, imageUrl = null, timestamp = null, operatorName = null) {
            const messagesDiv = document.getElementById('chatMessages');
            const div = document.createElement('div');
            
            if (isSystem) {
                div.className = 'message system-message';
                div.innerText = text;
            } else {
                div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                if (!isUser && operatorName) {
                    const nameSpan = document.createElement('div');
                    nameSpan.className = 'operator-name';
                    nameSpan.innerText = operatorName;
                    div.appendChild(nameSpan);
                }
                if (isImage && imageUrl) {
                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.onclick = () => window.open(imageUrl, '_blank');
                    div.appendChild(img);
                    if (text) div.appendChild(document.createTextNode(' ' + text));
                } else if (text) {
                    div.appendChild(document.createTextNode(text));
                }
                
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = formatMessageTime(timestamp);
                div.appendChild(timeSpan);
            }
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Сохраняем историю
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ 
                text, isUser, isSystem, isImage, imageUrl, 
                time: Date.now(), 
                telegramTime: timestamp,
                operatorName: operatorName
            });
            while (history.length > 200) history.shift();
            localStorage.setItem('chat_history', JSON.stringify(history));
        }
        
        function addSystemMessage(text) {
            addMessage(text, false, true);
        }
        
        // ========== ОТПРАВКА СТАТУСА (с проверкой изменений) ==========
        async function sendStatus(online) {
            if (!isRegistered) return false;
            
            // Не отправляем тот же статус повторно
            if (isOnline === online) return false;
            
            try {
                const response = await fetch(`${PROXY_URL}/updateStatus`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, isOnline: online, isActive: online })
                });
                
                if (response.ok) {
                    isOnline = online;
                    updateStatusIndicator();
                    console.log(`📊 Статус изменён: ${online ? 'ОНЛАЙН' : 'ОФЛАЙН'} (активность: ${Math.floor((Date.now() - lastActivityTime)/1000)}с назад)`);
                    return true;
                }
            } catch (err) {
                console.error('Ошибка отправки статуса:', err);
            }
            return false;
        }
        
        // ========== ПРОВЕРКА АКТИВНОСТИ И ОБНОВЛЕНИЕ СТАТУСА ==========
        function checkActivityAndUpdateStatus() {
            if (!isRegistered) return;
            
            const now = Date.now();
            const inactiveTime = now - lastActivityTime;
            const shouldBeOnline = isPageVisible && (inactiveTime < INACTIVITY_TIMEOUT);
            
            // Логируем только при изменении статуса
            if (shouldBeOnline !== isOnline) {
                if (shouldBeOnline) {
                    console.log(`🟢 Восстановление активности после ${Math.floor(inactiveTime/1000)}с`);
                    sendStatus(true);
                } else {
                    console.log(`🔴 Переход в офлайн (неактивен ${Math.floor(inactiveTime/1000)}с)`);
                    sendStatus(false);
                }
            }
        }
        
        // ========== СБРОС ТАЙМЕРА АКТИВНОСТИ ==========
        function resetActivityTimer() {
            if (!isRegistered) return;
            
            const wasInactive = (Date.now() - lastActivityTime) >= INACTIVITY_TIMEOUT;
            lastActivityTime = Date.now();
            
            // Если были неактивны и страница видима - включаем онлайн
            if (wasInactive && isPageVisible && !isOnline) {
                sendStatus(true);
            }
        }
        
        // ========== ОБРАБОТЧИКИ СОБЫТИЙ АКТИВНОСТИ ==========
        function setupActivityTracking() {
            const events = ['click', 'mousemove', 'keypress', 'scroll', 'touchstart', 'touchmove'];
            events.forEach(event => {
                document.addEventListener(event, resetActivityTimer);
            });
            
            // Отслеживание фокуса на инпуте
            const messageInput = document.getElementById('messageInput');
            if (messageInput) {
                messageInput.addEventListener('focus', resetActivityTimer);
                messageInput.addEventListener('input', resetActivityTimer);
            }
            
            // Видимость страницы (Page Visibility API)
            document.addEventListener('visibilitychange', () => {
                isPageVisible = !document.hidden;
                console.log(`👁️ Видимость страницы: ${isPageVisible ? 'видима' : 'скрыта'}`);
                
                if (isPageVisible) {
                    // Страница стала видимой - обновляем активность
                    resetActivityTimer();
                    // Немедленно проверяем статус
                    setTimeout(() => checkActivityAndUpdateStatus(), 100);
                } else {
                    // Страница скрыта - сразу проверяем, нужно ли уйти в офлайн
                    checkActivityAndUpdateStatus();
                }
            });
            
            // Отслеживание закрытия/перезагрузки страницы
            window.addEventListener('beforeunload', () => {
                if (isRegistered && isOnline) {
                    // Отправляем офлайн статус синхронно через beacon
                    navigator.sendBeacon(`${PROXY_URL}/updateStatus`, 
                        new Blob([JSON.stringify({ userId, isOnline: false, isActive: false })], 
                        { type: 'application/json' }));
                }
            });
            
            // Периодическая проверка статуса (каждые 10 секунд)
            statusCheckInterval = setInterval(() => {
                checkActivityAndUpdateStatus();
            }, 10000);
        }
        
        // ========== ГЕОЛОКАЦИЯ ==========
        async function detectGeo() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIp = ipData.ip;
                const response = await fetch(`https://ipapi.co/${userIp}/json/`);
                const geoData = await response.json();
                if (geoData && geoData.country_code) {
                    detectedCountry = geoData.country_code;
                    console.log(`📍 Регион: ${geoData.country_name}`);
                }
            } catch (error) {}
        }
        
        // ========== ФОРМА ТЕЛЕФОНА ==========
        function showPhoneForm() {
            const widget = document.getElementById('chatWidget');
            const oldOverlay = document.querySelector('.phone-overlay');
            if (oldOverlay) oldOverlay.remove();
            
            const currentCountry = countries.find(c => c.code === detectedCountry) || countries[0];
            
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Чат с поддержкой</h4>
                    <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам, даже если вы уйдете с сайта.</p>
                    <div class="custom-select" id="customSelect">
                        <div class="custom-select-trigger" id="selectTrigger">
                            <span id="selectedCountryName">${currentCountry.name}</span>
                            <span id="selectedCountryCode">${currentCountry.phoneCode}</span>
                        </div>
                        <div class="custom-select-dropdown" id="selectDropdown">
                            ${countries.map(c => `<div class="custom-select-option" data-code="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}" data-name="${c.name}" data-mask="${c.mask}">${c.name} ${c.phoneCode} (${c.maxDigits} цифр)</div>`).join('')}
                        </div>
                    </div>
                    <div class="phone-input-wrapper">
                        <span class="phone-code" id="phoneCodeDisplay">${currentCountry.phoneCode}</span>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="${currentCountry.mask}" inputmode="numeric">
                    </div>
                    <div id="phoneError" class="error-text"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                    <div class="agreement-text">Нажимая кнопку "Начать чат", вы соглашаетесь с обработкой персональных данных</div>
                </div>
            `;
            widget.appendChild(overlay);
            
            let currentMaxDigits = currentCountry.maxDigits;
            let currentPhoneCode = currentCountry.phoneCode;
            let currentCountryName = currentCountry.name;
            let currentPattern = currentCountry.pattern;
            let currentMask = currentCountry.mask;
            
            const selectTrigger = document.getElementById('selectTrigger');
            const selectDropdown = document.getElementById('selectDropdown');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            const phoneCodeDisplay = document.getElementById('phoneCodeDisplay');
            const selectedCountryName = document.getElementById('selectedCountryName');
            const selectedCountryCode = document.getElementById('selectedCountryCode');
            
            selectTrigger.onclick = (e) => {
                e.stopPropagation();
                selectDropdown.classList.toggle('show');
            };
            
            document.querySelectorAll('.custom-select-option').forEach(opt => {
                opt.onclick = () => {
                    currentMaxDigits = parseInt(opt.dataset.maxdigits);
                    currentPhoneCode = opt.dataset.phonecode;
                    currentCountryName = opt.dataset.name;
                    currentMask = opt.dataset.mask;
                    currentPattern = new RegExp(`^[0-9]{${currentMaxDigits}}$`);
                    
                    selectedCountryName.innerText = currentCountryName;
                    selectedCountryCode.innerText = currentPhoneCode;
                    phoneCodeDisplay.innerText = currentPhoneCode;
                    phoneInput.placeholder = currentMask;
                    phoneInput.value = '';
                    phoneError.innerText = '';
                    selectDropdown.classList.remove('show');
                };
            });
            
            document.addEventListener('click', () => {
                selectDropdown.classList.remove('show');
            });
            
            phoneInput.oninput = function() {
                let value = this.value.replace(/\D/g, '');
                if (value.length > currentMaxDigits) {
                    value = value.slice(0, currentMaxDigits);
                }
                this.value = value;
                phoneError.innerText = '';
                if (value.length > 0 && value.length < currentMaxDigits) {
                    phoneError.style.color = '#81858C';
                    phoneError.innerText = `Осталось ${currentMaxDigits - value.length} цифр из ${currentMaxDigits}`;
                }
            };
            
            phoneSubmit.onclick = async () => {
                const digits = phoneInput.value.replace(/\D/g, '');
                
                if (!digits || digits.length === 0) {
                    phoneError.innerText = '❌ Неверно указан номер телефона';
                    phoneError.style.color = '#E03434';
                    return;
                }
                
                if (digits.length !== currentMaxDigits) {
                    phoneError.innerText = `❌ Неверно указан номер телефона`;
                    phoneError.style.color = '#E03434';
                    return;
                }
                
                if (!currentPattern.test(digits)) {
                    phoneError.innerText = `❌ Неверный формат номера для ${currentCountryName}`;
                    phoneError.style.color = '#E03434';
                    return;
                }
                
                const fullPhone = currentPhoneCode + digits;
                
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Регистрация...';
                
                try {
                    const response = await fetch(`${PROXY_URL}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, ip: userIp, phone: fullPhone, region: currentCountryName })
                    });
                    const data = await response.json();
                    console.log('Ответ сервера:', data);
                    
                    if (data.ok) {
                        userPhone = fullPhone;
                        localStorage.setItem('user_phone', fullPhone);
                        isRegistered = true;
                        overlay.remove();
                        
                        // Очищаем и загружаем начальные сообщения
                        const messagesDiv = document.getElementById('chatMessages');
                        messagesDiv.innerHTML = `
                            <div class="welcome-message">
                                <h4>Чат с поддержкой</h4>
                                <p>О чем вы хотели бы спросить?</p>
                            </div>
                        `;
                        
                        addMessage('Добрый день! Подскажите, когда будет готов мой заказ №4412?', true);
                        addMessage('Здравствуйте! Уже проверяю статус вашего заказа. Одну минуту, пожалуйста...', false, false, false, null, null, 'Оператор Анна');
                        
                        // Активируем онлайн статус
                        lastActivityTime = Date.now();
                        await sendStatus(true);
                    } else {
                        phoneSubmit.disabled = false;
                        phoneSubmit.textContent = 'Начать чат';
                        phoneError.innerText = '❌ Ошибка сервера';
                        phoneError.style.color = '#E03434';
                    }
                } catch (err) {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.innerText = '❌ Ошибка соединения';
                    phoneError.style.color = '#E03434';
                    console.error('Ошибка:', err);
                }
            };
        }
        
        // ========== ОТПРАВКА СООБЩЕНИЯ ==========
        async function sendToTelegram(text, imageBase64 = null) {
            if (!isRegistered) {
                showPhoneForm();
                return;
            }
            
            // Обновляем активность при отправке сообщения
            resetActivityTimer();
            
            if (!text && !imageBase64) return;
            
            // Добавляем сообщение в чат
            if (text) addMessage(text, true);
            else addMessage('📷 Изображение', true);
            
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, text, imageBase64 })
                });
                const data = await response.json();
                console.log('📨 Сообщение отправлено:', data);
            } catch (err) {
                console.error('Ошибка отправки:', err);
                addMessage('❌ Ошибка отправки сообщения. Попробуйте позже.', false, true);
            }
        }
        
        // ========== ПОЛУЧЕНИЕ ОТВЕТОВ ==========
        async function checkReplies() {
            if (!isRegistered) return;
            try {
                const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&userId=${userId}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.update_id > lastUpdateId) {
                            lastUpdateId = update.update_id;
                            if (update.message && !update.message.text?.includes('НОВЫЙ')) {
                                addMessage(update.message.text || '📷 Изображение', false, false, update.message.hasImage, update.message.imageUrl, update.message.date, 'Оператор Анна');
                            }
                        }
                    }
                    localStorage.setItem('chat_lastUpdateId', lastUpdateId);
                }
            } catch (err) {
                console.error('Ошибка получения:', err);
            }
        }
        
        // ========== ОЧИСТКА ЧАТА ==========
        function clearChat() {
            const overlay = document.createElement('div');
            overlay.className = 'clear-confirm-overlay';
            overlay.innerHTML = `
                <div class="clear-confirm-modal">
                    <h4>Очистить историю чата?</h4>
                    <p>Все сообщения в этом диалоге будут удалены навсегда. Вы не сможете их восстановить.</p>
                    <div class="clear-confirm-buttons">
                        <button class="clear-confirm-cancel" id="clearCancel">Отменить</button>
                        <button class="clear-confirm-ok" id="clearOk">Очистить</button>
                    </div>
                </div>
            `;
            document.getElementById('chatWidget').appendChild(overlay);
            
            document.getElementById('clearCancel').onclick = () => overlay.remove();
            document.getElementById('clearOk').onclick = () => {
                localStorage.removeItem('user_phone');
                localStorage.removeItem('chat_history');
                localStorage.setItem('chat_lastUpdateId', '0');
                userPhone = null;
                isRegistered = false;
                lastUpdateId = 0;
                isOnline = false;
                
                document.getElementById('chatMessages').innerHTML = `
                    <div class="welcome-message">
                        <h4>Чат с поддержкой</h4>
                        <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже.<br>Мы ответим в течение пары минут.</p>
                    </div>
                `;
                overlay.remove();
                setTimeout(() => showPhoneForm(), 100);
            };
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        const widget = document.getElementById('chatWidget');
        const closeBtn = document.querySelector('.close-btn');
        const clearBtn = document.getElementById('clearBtn');
        const sendBtn = document.getElementById('sendBtn');
        const messageInput = document.getElementById('messageInput');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        
        widget.onclick = (e) => {
            if (widget.classList.contains('closed')) {
                widget.classList.remove('closed');
                e.stopPropagation();
                if (isRegistered) resetActivityTimer();
            }
        };
        
        if (closeBtn) closeBtn.onclick = (e) => { widget.classList.add('closed'); e.stopPropagation(); };
        if (clearBtn) clearBtn.onclick = (e) => { clearChat(); e.stopPropagation(); };
        
        if (sendBtn) {
            sendBtn.onclick = () => {
                const text = messageInput.value.trim();
                if (text) {
                    sendToTelegram(text);
                    messageInput.value = '';
                }
            };
        }
        
        if (messageInput) {
            messageInput.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendBtn.click();
                }
            };
        }
        
        if (fileBtn && fileInput) {
            fileBtn.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (event) => sendToTelegram('', event.target.result);
                    reader.readAsDataURL(file);
                }
                fileInput.value = '';
            };
        }
        
        // Настраиваем отслеживание активности
        setupActivityTracking();
        
        detectGeo().then(() => {
            if (userPhone) {
                isRegistered = true;
                lastActivityTime = Date.now();
                
                // Восстанавливаем историю
                const savedHistory = JSON.parse(localStorage.getItem('chat_history') || '[]');
                if (savedHistory.length > 0) {
                    savedHistory.forEach(msg => {
                        const messagesDiv = document.getElementById('chatMessages');
                        const div = document.createElement('div');
                        
                        if (msg.isSystem) {
                            div.className = 'message system-message';
                            div.innerText = msg.text;
                        } else {
                            div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
                            if (!msg.isUser && msg.operatorName) {
                                const nameSpan = document.createElement('div');
                                nameSpan.className = 'operator-name';
                                nameSpan.innerText = msg.operatorName;
                                div.appendChild(nameSpan);
                            }
                            if (msg.isImage && msg.imageUrl) {
                                const img = document.createElement('img');
                                img.src = msg.imageUrl;
                                img.onclick = () => window.open(msg.imageUrl, '_blank');
                                div.appendChild(img);
                            }
                            if (msg.text) div.appendChild(document.createTextNode(msg.text));
                            
                            const timeSpan = document.createElement('div');
                            timeSpan.className = 'message-time';
                            timeSpan.innerText = formatMessageTime(msg.telegramTime);
                            div.appendChild(timeSpan);
                        }
                        
                        messagesDiv.appendChild(div);
                    });
                    const messagesDiv = document.getElementById('chatMessages');
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                } else {
                    addMessage('Добрый день! Подскажите, о чем вы хотели бы спросить?', true);
                    addMessage('Здравствуйте! Уже проверяю статус вашего заказа. Одну минуту, пожалуйста...', false, false, false, null, null, 'Оператор Анна');
                }
                
                // Устанавливаем онлайн статус
                setTimeout(() => {
                    sendStatus(true);
                }, 500);
            } else {
                setTimeout(() => showPhoneForm(), 500);
            }
        });
        
        setInterval(checkReplies, 3000);
        
        // Проверка сессии каждый час
        setInterval(() => {
            const sessionStart = localStorage.getItem('session_start');
            if (sessionStart && userPhone) {
                const hoursPassed = (Date.now() - parseInt(sessionStart)) / (1000 * 60 * 60);
                if (hoursPassed >= SESSION_HOURS) {
                    localStorage.removeItem('user_phone');
                    localStorage.removeItem('chat_history');
                    localStorage.removeItem('chat_lastUpdateId');
                    localStorage.setItem('session_start', Date.now().toString());
                    location.reload();
                }
            }
        }, 3600000);
    })();
</script>
</body>
</html>
