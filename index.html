<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Чат с поддержкой</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .demo-content {
            text-align: center;
            padding: 40px 24px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .demo-content h1 { 
            font-size: 28px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        /* ========== ОСНОВНОЙ ВИДЖЕТ ========== */
        .chat-widget {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 400px;
            height: 700px;
            max-width: calc(100vw - 48px);
            max-height: calc(100vh - 48px);
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay,
        .chat-widget.closed .clear-confirm-overlay { 
            display: none; 
        }
        
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #FFFFFF;
        }
        
        .chat-widget.closed .open-icon { 
            display: flex; 
        }
        
        /* ========== ШАПКА ========== */
        .chat-header {
            background: #FFFFFF;
            padding: 20px 20px 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .operator-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #FFFFFF;
        }
        
        .chat-header-text h3 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .chat-header-text p {
            font-size: 13px;
            color: #8b8b9e;
            margin: 0;
        }
        
        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #cbd5e1;
            transition: all 0.3s ease;
        }
        
        .status-indicator.online {
            background-color: #10b981;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
            animation: pulse 2s infinite;
        }
        
        .status-text {
            font-size: 11px;
            font-weight: normal;
            color: #8b8b9e;
        }
        
        .status-text.online {
            color: #10b981;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }
        
        .header-buttons {
            display: flex;
            gap: 8px;
        }
        
        .clear-btn, .close-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 18px;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #8b8b9e;
        }
        
        .clear-btn:hover, .close-btn:hover {
            background: #f5f5f5;
            color: #1a1a2e;
        }
        
        /* ========== СООБЩЕНИЯ ========== */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 14px;
            line-height: 1.5;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #FFFFFF;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: #f5f5f5;
            color: #1a1a2e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .system-message {
            background: #f0f0f0;
            color: #8b8b9e;
            align-self: center;
            max-width: 90%;
            font-size: 12px;
            padding: 8px 14px;
            border-radius: 20px;
            text-align: center;
        }
        
        .operator-name {
            font-size: 12px;
            font-weight: 600;
            color: #6366f1;
            margin-bottom: 6px;
        }
        
        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
            object-fit: contain;
        }
        
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 8px;
            text-align: right;
        }
        
        .user-message .message-time {
            color: rgba(255,255,255,0.7);
        }
        
        .bot-message .message-time {
            color: #8b8b9e;
        }
        
        .welcome-message {
            text-align: center;
            padding: 32px 24px;
            background: #fafafa;
            border-radius: 20px;
            margin: 20px 0;
        }
        
        .welcome-message h4 {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .welcome-message p {
            font-size: 14px;
            color: #8b8b9e;
            line-height: 1.5;
        }
        
        /* ========== ПОЛЕ ВВОДА ========== */
        .chat-input-area {
            display: flex;
            padding: 16px 20px;
            border-top: 1px solid #f0f0f0;
            background: #FFFFFF;
            gap: 12px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            outline: none;
            font-size: 14px;
            transition: all 0.2s;
            background: #fafafa;
            font-family: inherit;
            color: #1a1a2e;
        }
        
        .chat-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: #FFFFFF;
        }
        
        .chat-input::placeholder {
            color: #cbd5e1;
        }
        
        .send-btn, .file-btn {
            background: #f0f0f0;
            border: none;
            color: #6366f1;
            padding: 10px 18px;
            border-radius: 24px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        
        .send-btn:hover, .file-btn:hover {
            background: #e8e8e8;
            transform: scale(0.98);
        }
        
        /* ========== ФОРМА ТЕЛЕФОНА ========== */
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #FFFFFF;
            display: flex;
            flex-direction: column;
            z-index: 20;
            border-radius: 24px;
            padding: 40px 24px;
            overflow-y: auto;
        }
        
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 320px;
            margin: auto;
        }
        
        .phone-card h4 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .phone-card p {
            font-size: 14px;
            color: #8b8b9e;
            margin-bottom: 32px;
            line-height: 1.5;
        }
        
        .custom-select {
            position: relative;
            width: 100%;
            margin-bottom: 16px;
        }
        
        .custom-select-trigger {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #fafafa;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .custom-select-trigger:hover {
            border-color: #6366f1;
            background: #FFFFFF;
        }
        
        .custom-select-trigger span:first-child {
            color: #1a1a2e;
        }
        
        .custom-select-trigger span:last-child {
            color: #8b8b9e;
            font-size: 13px;
        }
        
        .custom-select-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #FFFFFF;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-top: 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 40;
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        }
        
        .custom-select-dropdown.show {
            display: block;
        }
        
        .custom-select-option {
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #1a1a2e;
        }
        
        .custom-select-option:hover {
            background: #f5f5f5;
        }
        
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            background: #fafafa;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 4px 16px;
            margin-bottom: 16px;
            transition: all 0.2s;
        }
        
        .phone-input-wrapper:focus-within {
            border-color: #6366f1;
            background: #FFFFFF;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        .phone-code {
            font-size: 15px;
            font-weight: 500;
            color: #1a1a2e;
            padding-right: 12px;
            border-right: 1px solid #e2e8f0;
        }
        
        .phone-input {
            flex: 1;
            padding: 14px 0 14px 12px;
            font-size: 15px;
            border: none;
            background: transparent;
            font-family: monospace;
            outline: none;
            color: #1a1a2e;
        }
        
        .phone-input::placeholder {
            color: #cbd5e1;
        }
        
        .error-text {
            color: #ef4444;
            font-size: 13px;
            margin-top: 8px;
            text-align: left;
        }
        
        .phone-submit {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: #FFFFFF;
            border: none;
            padding: 16px 24px;
            border-radius: 32px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            transition: all 0.2s;
        }
        
        .phone-submit:active { 
            transform: scale(0.98); 
        }
        
        .phone-submit:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        
        .agreement-text {
            font-size: 11px;
            color: #8b8b9e;
            text-align: center;
            margin-top: 20px;
            line-height: 1.4;
        }
        
        /* ========== МОДАЛЬНОЕ ОКНО ОЧИСТКИ ========== */
        .clear-confirm-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 30;
            border-radius: 24px;
            padding: 24px;
        }
        
        .clear-confirm-modal {
            background: #FFFFFF;
            border-radius: 20px;
            padding: 28px 24px;
            max-width: 300px;
            width: 100%;
            text-align: center;
        }
        
        .clear-confirm-modal h4 {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        
        .clear-confirm-modal p {
            font-size: 14px;
            color: #8b8b9e;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        
        .clear-confirm-buttons {
            display: flex;
            gap: 12px;
        }
        
        .clear-confirm-cancel {
            flex: 1;
            padding: 12px;
            background: #f5f5f5;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #8b8b9e;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .clear-confirm-cancel:hover {
            background: #e8e8e8;
        }
        
        .clear-confirm-ok {
            flex: 1;
            padding: 12px;
            background: #ef4444;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: #FFFFFF;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .clear-confirm-ok:hover {
            background: #dc2626;
        }
        
        /* ========== АДАПТИВ ========== */
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; font-size: 14px; }
            .phone-overlay { padding: 24px 20px; }
        }
        
        @media (min-width: 769px) {
            .chat-widget { width: 420px; height: 700px; }
            .message { max-width: 75%; }
        }
        
        button, input, textarea, select {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
    </style>
</head>
<body>
<div class="demo-content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <div class="chat-header-info">
            <div class="operator-avatar">👩‍💼</div>
            <div class="chat-header-text">
                <h3>
                    Чат с поддержкой
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span class="status-text" id="statusText">офлайн</span>
                </h3>
                <p>Оператор Анна</p>
            </div>
        </div>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">✕</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="welcome-message">
            <h4>Чат с поддержкой</h4>
            <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже.<br>Мы ответим в течение пары минут.</p>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        // Ждём полной загрузки DOM перед инициализацией
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        
        function init() {
            const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
            
            const SESSION_HOURS = 36;
            const INACTIVITY_TIMEOUT = 30000;
            
            const countries = [
                { code: 'UZ', name: '🇺🇿 Узбекистан', phoneCode: '+998', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '(__) __ __ __' },
                { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '(__) __ __ __' },
                { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '(___) ___ __ __' },
                { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', maxDigits: 9, pattern: /^[0-9]{9}$/, mask: '(__) __ __ __' },
                { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '(___) ___ __ __' },
                { code: 'US', name: '🇺🇸 США', phoneCode: '+1', maxDigits: 10, pattern: /^[0-9]{10}$/, mask: '(___) ___ __ __' }
            ];
            
            let userId = localStorage.getItem('chat_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                localStorage.setItem('chat_user_id', userId);
            }
            
            const sessionStart = localStorage.getItem('session_start');
            const now = Date.now();
            if (sessionStart) {
                const hoursPassed = (now - parseInt(sessionStart)) / (1000 * 60 * 60);
                if (hoursPassed >= SESSION_HOURS) {
                    localStorage.removeItem('user_phone');
                    localStorage.removeItem('chat_history');
                    localStorage.removeItem('chat_lastUpdateId');
                    localStorage.setItem('session_start', now.toString());
                }
            } else {
                localStorage.setItem('session_start', now.toString());
            }
            
            let userPhone = localStorage.getItem('user_phone');
            let isRegistered = !!userPhone;
            let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
            let userIp = '';
            let detectedCountry = 'UZ';
            
            // Статус система
            let currentStatus = false;
            let lastActivityTime = Date.now();
            let isPageVisible = true;
            let statusUpdateInterval = null;
            let heartbeatInterval = null;
            let lastSentStatus = null;
            let lastSentTime = 0;
            let isUnloading = false; // Флаг для предотвращения повторных отправок при выгрузке
            
            // Получаем элементы с проверкой
            const statusIndicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');
            const widget = document.getElementById('chatWidget');
            const closeBtn = document.querySelector('.close-btn');
            const clearBtn = document.getElementById('clearBtn');
            const sendBtn = document.getElementById('sendBtn');
            const messageInput = document.getElementById('messageInput');
            const fileBtn = document.getElementById('fileBtn');
            const fileInput = document.getElementById('fileInput');
            const chatMessages = document.getElementById('chatMessages');
            
            function updateStatusUI(online) {
                if (statusIndicator) {
                    if (online) {
                        statusIndicator.className = 'status-indicator online';
                    } else {
                        statusIndicator.className = 'status-indicator';
                    }
                }
                if (statusText) {
                    if (online) {
                        statusText.textContent = 'онлайн';
                        statusText.className = 'status-text online';
                    } else {
                        statusText.textContent = 'офлайн';
                        statusText.className = 'status-text';
                    }
                }
            }
            
            async function sendStatusToServer(online, isSync = false) {
                if (!isRegistered) return false;
                if (lastSentStatus === online && (Date.now() - lastSentTime) < 5000) return false;
                
                const payload = { userId, isOnline: online, isActive: online };
                
                try {
                    if (isSync) {
                        // Синхронная отправка через sendBeacon для закрытия страницы
                        const blob = new Blob([JSON.stringify(payload)], { type: 'application/json' });
                        const sent = navigator.sendBeacon(`${PROXY_URL}/updateStatus`, blob);
                        if (sent) {
                            lastSentStatus = online;
                            lastSentTime = Date.now();
                            currentStatus = online;
                            updateStatusUI(online);
                            console.log(`📊 Статус отправлен (beacon): ${online ? 'ОНЛАЙН' : 'ОФЛАЙН'}`);
                        }
                        return sent;
                    } else {
                        // Асинхронная отправка
                        const response = await fetch(`${PROXY_URL}/updateStatus`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        
                        if (response.ok) {
                            lastSentStatus = online;
                            lastSentTime = Date.now();
                            currentStatus = online;
                            updateStatusUI(online);
                            console.log(`📊 Статус отправлен: ${online ? 'ОНЛАЙН' : 'ОФЛАЙН'}`);
                            return true;
                        }
                    }
                } catch (err) {
                    console.error('Ошибка отправки статуса:', err);
                }
                return false;
            }
            
            function checkAndUpdateStatus() {
                if (!isRegistered || isUnloading) return;
                const now = Date.now();
                const inactiveTime = now - lastActivityTime;
                const shouldBeOnline = isPageVisible && (inactiveTime < INACTIVITY_TIMEOUT);
                
                if (shouldBeOnline !== currentStatus) {
                    sendStatusToServer(shouldBeOnline);
                }
            }
            
            function onUserActivity() {
                if (!isRegistered || isUnloading) return;
                lastActivityTime = Date.now();
                if (!currentStatus && isPageVisible) {
                    sendStatusToServer(true);
                }
            }
            
            function startHeartbeat() {
                if (heartbeatInterval) clearInterval(heartbeatInterval);
                heartbeatInterval = setInterval(() => {
                    if (isRegistered && currentStatus && isPageVisible && !isUnloading) {
                        fetch(`${PROXY_URL}/updateStatus`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId, isOnline: true, isActive: true, heartbeat: true })
                        }).catch(() => {});
                        console.log('💓 Heartbeat отправлен');
                    }
                }, 20000);
            }
            
            function setupActivityTracking() {
                const events = ['click', 'mousemove', 'keydown', 'keypress', 'scroll', 'touchstart', 'touchmove', 'focus'];
                events.forEach(event => {
                    document.addEventListener(event, onUserActivity);
                    window.addEventListener(event, onUserActivity);
                });
                
                if (messageInput) {
                    messageInput.addEventListener('focus', onUserActivity);
                    messageInput.addEventListener('input', onUserActivity);
                    messageInput.addEventListener('keypress', onUserActivity);
                }
                
                document.addEventListener('visibilitychange', () => {
                    if (isUnloading) return;
                    isPageVisible = !document.hidden;
                    console.log(`👁️ Видимость страницы: ${isPageVisible ? 'видима' : 'скрыта'}`);
                    
                    if (isPageVisible) {
                        lastActivityTime = Date.now();
                        checkAndUpdateStatus();
                        if (!currentStatus) {
                            sendStatusToServer(true);
                        }
                    } else {
                        if (currentStatus) {
                            sendStatusToServer(false);
                        }
                    }
                });
                
                // Обработка закрытия страницы - МНОЖЕСТВЕННАЯ ЗАЩИТА
                window.addEventListener('beforeunload', () => {
                    isUnloading = true;
                    if (isRegistered && currentStatus) {
                        console.log('🚪 Страница закрывается, отправляем офлайн статус...');
                        // Отправляем через sendBeacon (самый надёжный способ)
                        sendStatusToServer(false, true);
                        
                        // Дополнительная отправка через fetch с keepalive
                        fetch(`${PROXY_URL}/updateStatus`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ userId, isOnline: false, isActive: false }),
                            keepalive: true
                        }).catch(() => {});
                    }
                });
                
                // Страница выгружается (перезагрузка)
                window.addEventListener('pagehide', () => {
                    isUnloading = true;
                    if (isRegistered && currentStatus) {
                        console.log('🚪 Pagehide, отправляем офлайн статус...');
                        sendStatusToServer(false, true);
                    }
                });
                
                statusUpdateInterval = setInterval(() => {
                    checkAndUpdateStatus();
                }, 5000);
                
                startHeartbeat();
            }
            
            function formatMessageTime(timestamp) {
                const date = timestamp ? new Date(timestamp * 1000) : new Date();
                return date.toLocaleTimeString('ru-RU', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    timeZone: 'Europe/Amsterdam'
                });
            }
            
            function addMessage(text, isUser, isSystem = false, isImage = false, imageUrl = null, timestamp = null, operatorName = null) {
                if (!chatMessages) return;
                
                const div = document.createElement('div');
                
                const welcomeMsg = chatMessages.querySelector('.welcome-message');
                if (welcomeMsg && !isSystem && !isUser) {
                    welcomeMsg.remove();
                }
                
                if (isSystem) {
                    div.className = 'message system-message';
                    div.innerText = text;
                } else {
                    div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                    if (!isUser && operatorName) {
                        const nameSpan = document.createElement('div');
                        nameSpan.className = 'operator-name';
                        nameSpan.innerText = operatorName;
                        div.appendChild(nameSpan);
                    }
                    if (isImage && imageUrl) {
                        const img = document.createElement('img');
                        img.src = imageUrl;
                        img.onclick = () => window.open(imageUrl, '_blank');
                        div.appendChild(img);
                        if (text) div.appendChild(document.createTextNode(' ' + text));
                    } else if (text) {
                        div.appendChild(document.createTextNode(text));
                    }
                    
                    const timeSpan = document.createElement('div');
                    timeSpan.className = 'message-time';
                    timeSpan.innerText = formatMessageTime(timestamp);
                    div.appendChild(timeSpan);
                }
                
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
                history.push({ 
                    text, isUser, isSystem, isImage, imageUrl, 
                    time: Date.now(), 
                    telegramTime: timestamp,
                    operatorName: operatorName
                });
                while (history.length > 200) history.shift();
                localStorage.setItem('chat_history', JSON.stringify(history));
            }
            
            async function detectGeo() {
                try {
                    const ipRes = await fetch('https://api.ipify.org?format=json');
                    const ipData = await ipRes.json();
                    userIp = ipData.ip;
                    const response = await fetch(`https://ipapi.co/${userIp}/json/`);
                    const geoData = await response.json();
                    if (geoData && geoData.country_code) {
                        detectedCountry = geoData.country_code;
                    }
                } catch (error) {}
            }
            
            function showPhoneForm() {
                const oldOverlay = document.querySelector('.phone-overlay');
                if (oldOverlay) oldOverlay.remove();
                
                const currentCountry = countries.find(c => c.code === detectedCountry) || countries[0];
                
                const overlay = document.createElement('div');
                overlay.className = 'phone-overlay';
                overlay.innerHTML = `
                    <div class="phone-card">
                        <h4>Чат с поддержкой</h4>
                        <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам, даже если вы уйдете с сайта.</p>
                        <div class="custom-select" id="customSelect">
                            <div class="custom-select-trigger" id="selectTrigger">
                                <span id="selectedCountryName">${currentCountry.name}</span>
                                <span id="selectedCountryCode">${currentCountry.phoneCode} ▼</span>
                            </div>
                            <div class="custom-select-dropdown" id="selectDropdown">
                                ${countries.map(c => `<div class="custom-select-option" data-code="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}" data-name="${c.name}" data-mask="${c.mask}">${c.name} ${c.phoneCode} (${c.maxDigits} цифр)</div>`).join('')}
                            </div>
                        </div>
                        <div class="phone-input-wrapper">
                            <span class="phone-code" id="phoneCodeDisplay">${currentCountry.phoneCode}</span>
                            <input type="tel" class="phone-input" id="phoneInput" placeholder="${currentCountry.mask}" inputmode="numeric">
                        </div>
                        <div id="phoneError" class="error-text"></div>
                        <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                        <div class="agreement-text">Нажимая кнопку "Начать чат", вы соглашаетесь с обработкой персональных данных</div>
                    </div>
                `;
                if (widget) widget.appendChild(overlay);
                
                let currentMaxDigits = currentCountry.maxDigits;
                let currentPhoneCode = currentCountry.phoneCode;
                let currentCountryName = currentCountry.name;
                let currentPattern = currentCountry.pattern;
                let currentMask = currentCountry.mask;
                
                const selectTrigger = document.getElementById('selectTrigger');
                const selectDropdown = document.getElementById('selectDropdown');
                const phoneInput = document.getElementById('phoneInput');
                const phoneError = document.getElementById('phoneError');
                const phoneSubmit = document.getElementById('phoneSubmit');
                const phoneCodeDisplay = document.getElementById('phoneCodeDisplay');
                const selectedCountryName = document.getElementById('selectedCountryName');
                const selectedCountryCode = document.getElementById('selectedCountryCode');
                
                if (selectTrigger) {
                    selectTrigger.onclick = (e) => {
                        e.stopPropagation();
                        if (selectDropdown) selectDropdown.classList.toggle('show');
                    };
                }
                
                document.querySelectorAll('.custom-select-option').forEach(opt => {
                    opt.onclick = () => {
                        currentMaxDigits = parseInt(opt.dataset.maxdigits);
                        currentPhoneCode = opt.dataset.phonecode;
                        currentCountryName = opt.dataset.name;
                        currentMask = opt.dataset.mask;
                        currentPattern = new RegExp(`^[0-9]{${currentMaxDigits}}$`);
                        
                        if (selectedCountryName) selectedCountryName.innerText = currentCountryName;
                        if (selectedCountryCode) selectedCountryCode.innerText = currentPhoneCode + ' ▼';
                        if (phoneCodeDisplay) phoneCodeDisplay.innerText = currentPhoneCode;
                        if (phoneInput) phoneInput.placeholder = currentMask;
                        if (phoneInput) phoneInput.value = '';
                        if (phoneError) phoneError.innerText = '';
                        if (selectDropdown) selectDropdown.classList.remove('show');
                    };
                });
                
                document.addEventListener('click', () => {
                    if (selectDropdown) selectDropdown.classList.remove('show');
                });
                
                if (phoneInput) {
                    phoneInput.oninput = function() {
                        let value = this.value.replace(/\D/g, '');
                        if (value.length > currentMaxDigits) {
                            value = value.slice(0, currentMaxDigits);
                        }
                        this.value = value;
                        if (phoneError) phoneError.innerText = '';
                        if (value.length > 0 && value.length < currentMaxDigits && phoneError) {
                            phoneError.style.color = '#8b8b9e';
                            phoneError.innerText = `Осталось ${currentMaxDigits - value.length} цифр из ${currentMaxDigits}`;
                        }
                    };
                }
                
                if (phoneSubmit) {
                    phoneSubmit.onclick = async () => {
                        const digits = phoneInput ? phoneInput.value.replace(/\D/g, '') : '';
                        
                        if (!digits || digits.length === 0 || digits.length !== currentMaxDigits || !currentPattern.test(digits)) {
                            if (phoneError) {
                                phoneError.innerText = '❌ Неверно указан номер телефона';
                                phoneError.style.color = '#ef4444';
                            }
                            return;
                        }
                        
                        const fullPhone = currentPhoneCode + digits;
                        
                        if (phoneSubmit) {
                            phoneSubmit.disabled = true;
                            phoneSubmit.textContent = 'Регистрация...';
                        }
                        
                        try {
                            const response = await fetch(`${PROXY_URL}/register`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ userId, ip: userIp, phone: fullPhone, region: currentCountryName })
                            });
                            const data = await response.json();
                            
                            if (data.ok) {
                                userPhone = fullPhone;
                                localStorage.setItem('user_phone', fullPhone);
                                isRegistered = true;
                                overlay.remove();
                                
                                if (chatMessages) {
                                    chatMessages.innerHTML = '';
                                }
                                
                                addMessage('Добрый день! Подскажите, когда будет готов мой заказ №4412?', true);
                                addMessage('Здравствуйте! Уже проверяю статус вашего заказа. Одну минуту, пожалуйста...', false, false, false, null, null, 'Оператор Анна');
                                
                                lastActivityTime = Date.now();
                                await sendStatusToServer(true);
                            } else {
                                if (phoneSubmit) {
                                    phoneSubmit.disabled = false;
                                    phoneSubmit.textContent = 'Начать чат';
                                }
                                if (phoneError) {
                                    phoneError.innerText = '❌ Ошибка сервера';
                                    phoneError.style.color = '#ef4444';
                                }
                            }
                        } catch (err) {
                            if (phoneSubmit) {
                                phoneSubmit.disabled = false;
                                phoneSubmit.textContent = 'Начать чат';
                            }
                            if (phoneError) {
                                phoneError.innerText = '❌ Ошибка соединения';
                                phoneError.style.color = '#ef4444';
                            }
                            console.error('Ошибка:', err);
                        }
                    };
                }
            }
            
            async function sendToTelegram(text, imageBase64 = null) {
                if (!isRegistered) {
                    showPhoneForm();
                    return;
                }
                
                onUserActivity();
                
                if (!text && !imageBase64) return;
                
                if (text) addMessage(text, true);
                else addMessage('📷 Изображение', true);
                
                try {
                    const response = await fetch(`${PROXY_URL}/send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ userId, text, imageBase64 })
                    });
                    const data = await response.json();
                    console.log('📨 Сообщение отправлено:', data);
                } catch (err) {
                    console.error('Ошибка отправки:', err);
                    addMessage('❌ Ошибка отправки сообщения. Попробуйте позже.', false, true);
                }
            }
            
            async function checkReplies() {
                if (!isRegistered) return;
                try {
                    const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&userId=${userId}`);
                    const data = await response.json();
                    if (data.ok && data.result) {
                        for (const update of data.result) {
                            if (update.update_id > lastUpdateId) {
                                lastUpdateId = update.update_id;
                                if (update.message && !update.message.text?.includes('НОВЫЙ')) {
                                    addMessage(update.message.text || '📷 Изображение', false, false, update.message.hasImage, update.message.imageUrl, update.message.date, 'Оператор Анна');
                                }
                            }
                        }
                        localStorage.setItem('chat_lastUpdateId', lastUpdateId);
                    }
                } catch (err) {
                    console.error('Ошибка получения:', err);
                }
            }
            
            function clearChat() {
                const overlay = document.createElement('div');
                overlay.className = 'clear-confirm-overlay';
                overlay.innerHTML = `
                    <div class="clear-confirm-modal">
                        <h4>Очистить историю чата?</h4>
                        <p>Все сообщения в этом диалоге будут удалены навсегда. Вы не сможете их восстановить.</p>
                        <div class="clear-confirm-buttons">
                            <button class="clear-confirm-cancel" id="clearCancel">Отменить</button>
                            <button class="clear-confirm-ok" id="clearOk">Очистить</button>
                        </div>
                    </div>
                `;
                if (widget) widget.appendChild(overlay);
                
                const cancelBtn = document.getElementById('clearCancel');
                const okBtn = document.getElementById('clearOk');
                
                if (cancelBtn) cancelBtn.onclick = () => overlay.remove();
                if (okBtn) {
                    okBtn.onclick = () => {
                        localStorage.removeItem('user_phone');
                        localStorage.removeItem('chat_history');
                        localStorage.setItem('chat_lastUpdateId', '0');
                        userPhone = null;
                        isRegistered = false;
                        lastUpdateId = 0;
                        currentStatus = false;
                        
                        if (chatMessages) {
                            chatMessages.innerHTML = `
                                <div class="welcome-message">
                                    <h4>Чат с поддержкой</h4>
                                    <p>Мы на связи и готовы помочь.<br>Напишите ваш вопрос ниже.<br>Мы ответим в течение пары минут.</p>
                                </div>
                            `;
                        }
                        overlay.remove();
                        setTimeout(() => showPhoneForm(), 100);
                    };
                }
            }
            
            // Инициализация обработчиков событий
            if (widget) {
                widget.onclick = (e) => {
                    if (widget.classList.contains('closed')) {
                        widget.classList.remove('closed');
                        e.stopPropagation();
                        if (isRegistered) onUserActivity();
                    }
                };
            }
            
            if (closeBtn) closeBtn.onclick = (e) => { 
                if (widget) widget.classList.add('closed'); 
                e.stopPropagation(); 
            };
            
            if (clearBtn) clearBtn.onclick = (e) => { 
                clearChat(); 
                e.stopPropagation(); 
            };
            
            if (sendBtn) {
                sendBtn.onclick = () => {
                    if (messageInput) {
                        const text = messageInput.value.trim();
                        if (text) {
                            sendToTelegram(text);
                            messageInput.value = '';
                        }
                    }
                };
            }
            
            if (messageInput) {
                messageInput.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (sendBtn) sendBtn.click();
                    }
                };
            }
            
            if (fileBtn && fileInput) {
                fileBtn.onclick = () => fileInput.click();
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file && file.type.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (event) => sendToTelegram('', event.target.result);
                        reader.readAsDataURL(file);
                    }
                    fileInput.value = '';
                };
            }
            
            // Запуск
            setupActivityTracking();
            
            detectGeo().then(() => {
                if (userPhone) {
                    isRegistered = true;
                    lastActivityTime = Date.now();
                    
                    const savedHistory = JSON.parse(localStorage.getItem('chat_history') || '[]');
                    if (chatMessages) {
                        if (savedHistory.length > 0) {
                            chatMessages.innerHTML = '';
                            savedHistory.forEach(msg => {
                                const div = document.createElement('div');
                                
                                if (msg.isSystem) {
                                    div.className = 'message system-message';
                                    div.innerText = msg.text;
                                } else {
                                    div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
                                    if (!msg.isUser && msg.operatorName) {
                                        const nameSpan = document.createElement('div');
                                        nameSpan.className = 'operator-name';
                                        nameSpan.innerText = msg.operatorName;
                                        div.appendChild(nameSpan);
                                    }
                                    if (msg.isImage && msg.imageUrl) {
                                        const img = document.createElement('img');
                                        img.src = msg.imageUrl;
                                        img.onclick = () => window.open(msg.imageUrl, '_blank');
                                        div.appendChild(img);
                                    }
                                    if (msg.text) div.appendChild(document.createTextNode(msg.text));
                                    
                                    const timeSpan = document.createElement('div');
                                    timeSpan.className = 'message-time';
                                    timeSpan.innerText = formatMessageTime(msg.telegramTime);
                                    div.appendChild(timeSpan);
                                }
                                
                                chatMessages.appendChild(div);
                            });
                            chatMessages.scrollTop = chatMessages.scrollHeight;
                        }
                    }
                    
                    setTimeout(() => {
                        sendStatusToServer(true);
                    }, 500);
                } else {
                    setTimeout(() => showPhoneForm(), 500);
                }
            });
            
            setInterval(checkReplies, 3000);
            
            setInterval(() => {
                const sessionStart = localStorage.getItem('session_start');
                if (sessionStart && userPhone) {
                    const hoursPassed = (Date.now() - parseInt(sessionStart)) / (1000 * 60 * 60);
                    if (hoursPassed >= SESSION_HOURS) {
                        localStorage.removeItem('user_phone');
                        localStorage.removeItem('chat_history');
                        localStorage.removeItem('chat_lastUpdateId');
                        localStorage.setItem('session_start', Date.now().toString());
                        location.reload();
                    }
                }
            }, 3600000);
        }
    })();
</script>
</body>
</html>
