<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .content {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { font-size: 28px; margin-bottom: 16px; }
        p { color: #666; font-size: 16px; }
        
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 600px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1000;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay { display: none; }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon { display: flex; }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .chat-header h3 { font-size: 20px; margin-bottom: 4px; }
        .chat-header p { font-size: 13px; opacity: 0.8; }
        .header-buttons {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }
        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
        }
        .bot-message {
            background: white;
            color: #1a1a2e;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .message img {
            max-width: 100%;
            max-height: 150px;
            border-radius: 10px;
            margin-top: 5px;
            cursor: pointer;
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eef2f6;
            background: white;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }
        .send-btn, .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
        }
        .file-btn { background: #6c757d; }
        
        .status {
            font-size: 12px;
            padding: 8px;
            text-align: center;
            background: #d4edda;
            color: #155724;
            border-radius: 20px;
            width: fit-content;
            align-self: center;
        }
        
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 24px;
            padding: 20px;
        }
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 340px;
        }
        .phone-card h4 { font-size: 24px; margin-bottom: 12px; color: #333; }
        .phone-card p { font-size: 14px; color: #666; margin-bottom: 16px; }
        
        .phone-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }
        .country-select {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: #f8f9fa;
            cursor: pointer;
        }
        .phone-input {
            flex: 2;
            padding: 14px;
            font-size: 18px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: #f8f9fa;
            font-family: monospace;
            letter-spacing: 2px;
        }
        .phone-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }
        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
        .error-text { color: #dc3545; font-size: 12px; margin-top: 8px; }
        
        @media (max-width: 480px) {
            .chat-widget { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
            .chat-widget.closed { width: 56px; height: 56px; bottom: 20px; right: 20px; border-radius: 28px; }
            .message { max-width: 90%; }
            .phone-input-wrapper { flex-direction: column; }
            .country-select { width: 100%; }
            .phone-input { width: 100%; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>Чат с поддержкой</h3>
        <p>Мы на связи и готовы помочь</p>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Готов к работе</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
        
        // Список стран с кодами
        const countries = [
            { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', maxDigits: 10, placeholder: '9123456789' },
            { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', maxDigits: 9, placeholder: '612345678' },
            { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', maxDigits: 9, placeholder: '501234567' },
            { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', maxDigits: 10, placeholder: '7012345678' },
            { code: 'BY', name: '🇧🇾 Беларусь', phoneCode: '+375', maxDigits: 9, placeholder: '291234567' },
            { code: 'US', name: '🇺🇸 США', phoneCode: '+1', maxDigits: 10, placeholder: '2125551234' },
            { code: 'GB', name: '🇬🇧 Великобритания', phoneCode: '+44', maxDigits: 10, placeholder: '7712345678' },
            { code: 'DE', name: '🇩🇪 Германия', phoneCode: '+49', maxDigits: 10, placeholder: '15123456789' },
            { code: 'FR', name: '🇫🇷 Франция', phoneCode: '+33', maxDigits: 9, placeholder: '612345678' },
            { code: 'IT', name: '🇮🇹 Италия', phoneCode: '+39', maxDigits: 10, placeholder: '3123456789' },
            { code: 'ES', name: '🇪🇸 Испания', phoneCode: '+34', maxDigits: 9, placeholder: '612345678' },
            { code: 'TR', name: '🇹🇷 Турция', phoneCode: '+90', maxDigits: 10, placeholder: '5012345678' },
            { code: 'CN', name: '🇨🇳 Китай', phoneCode: '+86', maxDigits: 11, placeholder: '13812345678' },
            { code: 'IN', name: '🇮🇳 Индия', phoneCode: '+91', maxDigits: 10, placeholder: '9876543210' },
            { code: 'BR', name: '🇧🇷 Бразилия', phoneCode: '+55', maxDigits: 11, placeholder: '11912345678' }
        ];
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now();
            localStorage.setItem('chat_user_id', userId);
        }
        
        let userPhone = localStorage.getItem('user_phone');
        let isRegistered = !!userPhone;
        let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
        let userIp = '';
        
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => userIp = data.ip)
            .catch(() => userIp = '185.92.181.97');
        
        const widget = document.getElementById('chatWidget');
        const clearBtn = document.getElementById('clearBtn');
        const closeBtn = document.querySelector('.close-btn');
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        
        function addMessage(text, isUser, isImage = false, imageUrl = null, timestamp = null) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            if (isImage && imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.onclick = () => window.open(imageUrl, '_blank');
                div.appendChild(img);
                if (text) div.appendChild(document.createTextNode(' ' + text));
            } else {
                div.innerText = text;
            }
            
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            const date = timestamp ? new Date(timestamp * 1000) : new Date();
            timeSpan.innerText = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            div.appendChild(timeSpan);
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ text, isUser, isImage, imageUrl, time: Date.now() });
            localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
        }
        
        function setStatus(text) {
            if (statusDiv) statusDiv.innerHTML = text;
        }
        
        async function registerPhone(phone, countryCode, regionName) {
            setStatus('⏳ Регистрация...');
            try {
                const response = await fetch(`${PROXY_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        userId, 
                        site: window.location.hostname, 
                        ip: userIp, 
                        phone: phone,
                        region: regionName
                    })
                });
                const data = await response.json();
                console.log('Регистрация:', data);
                if (data.ok) {
                    userPhone = phone;
                    localStorage.setItem('user_phone', phone);
                    isRegistered = true;
                    setStatus('🟢 Онлайн');
                    addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false);
                    return true;
                }
                return false;
            } catch (err) {
                console.error('Ошибка:', err);
                setStatus('❌ Ошибка');
                return false;
            }
        }
        
        function showPhoneForm() {
            const oldOverlay = document.querySelector('.phone-overlay');
            if (oldOverlay) oldOverlay.remove();
            
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Чат с поддержкой</h4>
                    <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам</p>
                    <div class="phone-input-wrapper">
                        <select class="country-select" id="countrySelect">
                            ${countries.map(c => `<option value="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}" data-placeholder="${c.placeholder}" data-name="${c.name}">${c.name} ${c.phoneCode}</option>`).join('')}
                        </select>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="1234567890" maxlength="10" inputmode="numeric">
                    </div>
                    <div id="phoneError" class="error-text" style="display: none;"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                </div>
            `;
            widget.appendChild(overlay);
            
            const countrySelect = document.getElementById('countrySelect');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            
            let currentMaxDigits = 10;
            let currentPhoneCode = '+7';
            let currentCountryName = 'Россия';
            
            function updateCountry() {
                const selected = countrySelect.options[countrySelect.selectedIndex];
                currentMaxDigits = parseInt(selected.getAttribute('data-maxdigits'));
                currentPhoneCode = selected.getAttribute('data-phonecode');
                currentCountryName = selected.getAttribute('data-name');
                phoneInput.maxLength = currentMaxDigits;
                phoneInput.placeholder = selected.getAttribute('data-placeholder');
                phoneInput.value = '';
                phoneError.style.display = 'none';
            }
            
            countrySelect.onchange = updateCountry;
            updateCountry();
            
            phoneInput.oninput = function() {
                let value = this.value.replace(/\D/g, '');
                if (value.length > currentMaxDigits) {
                    value = value.slice(0, currentMaxDigits);
                }
                this.value = value;
            };
            
            phoneSubmit.onclick = async function() {
                const digits = phoneInput.value.trim();
                if (!digits || digits.length !== currentMaxDigits) {
                    phoneError.textContent = `Введите ${currentMaxDigits} цифр`;
                    phoneError.style.display = 'block';
                    return;
                }
                const fullPhone = currentPhoneCode + digits;
                const regionName = `${currentCountryName}`;
                
                phoneError.style.display = 'none';
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Проверка...';
                
                const success = await registerPhone(fullPhone, currentPhoneCode, regionName);
                if (success) {
                    overlay.remove();
                } else {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.textContent = 'Ошибка. Попробуйте позже.';
                    phoneError.style.display = 'block';
                }
            };
        }
        
        async function sendToTelegram(text, imageBase64 = null) {
            if (!isRegistered) {
                showPhoneForm();
                return;
            }
            if (!text && !imageBase64) return;
            if (text) addMessage(text, true);
            else addMessage('📷 Изображение', true);
            
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId: userId,
                        site: window.location.hostname,
                        text: text,
                        imageBase64: imageBase64
                    })
                });
                const data = await response.json();
                console.log('Отправка:', data);
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }
        
        async function checkReplies() {
            try {
                const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&userId=${userId}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        lastUpdateId = Math.max(lastUpdateId, update.update_id + 1);
                        if (update.message && (update.message.text || update.message.hasImage)) {
                            if (update.message.text && update.message.text.includes('НОВЫЙ ПОЛЬЗОВАТЕЛЬ')) continue;
                            addMessage(
                                update.message.text || '📷 Изображение', 
                                false, 
                                update.message.hasImage || false, 
                                update.message.imageUrl || null,
                                update.message.date
                            );
                        }
                    }
                    localStorage.setItem('chat_lastUpdateId', lastUpdateId);
                }
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }
        
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
                if (msg.isImage && msg.imageUrl) {
                    const img = document.createElement('img');
                    img.src = msg.imageUrl;
                    img.onclick = () => window.open(msg.imageUrl, '_blank');
                    div.appendChild(img);
                    if (msg.text) div.appendChild(document.createTextNode(' ' + msg.text));
                } else {
                    div.innerText = msg.text;
                }
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                div.appendChild(timeSpan);
                messagesDiv.appendChild(div);
            });
            if (history.length === 0 && isRegistered) {
                setTimeout(() => addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false), 500);
            }
        }
        
        widget.onclick = (e) => {
            if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
                widget.classList.remove('closed');
                if (!isRegistered) setTimeout(() => showPhoneForm(), 100);
            }
        };
        
        if (closeBtn) closeBtn.onclick = () => widget.classList.add('closed');
        if (clearBtn) clearBtn.onclick = () => {
            if (confirm('Очистить историю чата?')) {
                localStorage.clear();
                location.reload();
            }
        };
        
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        };
        
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendToTelegram(text);
                messageInput.value = '';
            }
        };
        
        fileBtn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (ev) => sendToTelegram('', ev.target.result);
            reader.readAsDataURL(file);
            fileInput.value = '';
        };
        
        loadHistory();
        setInterval(checkReplies, 3000);
        
        if (!isRegistered) setTimeout(() => showPhoneForm(), 500);
    })();
</script>
</body>
</html>
