<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .content {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        p { color: #666; line-height: 1.5; font-size: 16px; }

        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 650px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 40px);
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }

        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }

        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay { display: none; }

        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .chat-widget.closed .open-icon { display: flex; }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 20px 16px 20px;
            text-align: center;
            flex-shrink: 0;
            position: relative;
        }

        .chat-header h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.8;
            color: white;
            margin-top: 4px;
        }

        .header-buttons {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }

        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: white;
            color: #1a1a2e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #eef2f6;
            background: white;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e4e8;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
            background: #f8f9fa;
        }

        .send-btn, .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-btn { background: #6c757d; }

        .status {
            font-size: 12px;
            padding: 8px 14px;
            text-align: center;
            background: white;
            border-radius: 20px;
            width: fit-content;
            align-self: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 28px;
            padding: 20px;
        }

        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 340px;
        }

        .phone-card h4 {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .phone-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .phone-input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 16px;
        }

        .country-select {
            width: 100%;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            padding: 14px 12px;
            background: #f8f9fa;
            border: 1px solid #e0e4e8;
            border-radius: 12px;
            cursor: pointer;
        }

        .phone-input {
            width: 100%;
            padding: 14px 12px;
            font-size: 18px;
            font-family: monospace;
            letter-spacing: 2px;
            text-align: center;
            border: 1px solid #e0e4e8;
            border-radius: 12px;
            background: #f8f9fa;
            outline: none;
            transition: all 0.2s;
        }

        .phone-input:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 2px rgba(102,126,234,0.2);
        }

        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }

        .error-text {
            color: #dc3545;
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
                max-width: 100vw;
                max-height: 100vh;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; font-size: 14px; }
            .phone-card { padding: 20px 16px; }
            .phone-card h4 { font-size: 22px; }
            .country-select { font-size: 14px; padding: 10px 8px; }
            .phone-input { font-size: 16px; letter-spacing: 1px; }
            .phone-submit { padding: 12px 20px; font-size: 15px; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>Чат с поддержкой</h3>
        <p>Мы на связи и готовы помочь</p>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Онлайн</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        const PROXY_URL = 'https://telegram-proxy-viyx.onrender.com';
        
        const countries = [
            { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', pattern: /^7\d{10}$/, maxDigits: 10 },
            { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', pattern: /^31[1-9]\d{8}$/, maxDigits: 9 },
            { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', pattern: /^380\d{9}$/, maxDigits: 9 },
            { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', pattern: /^7\d{10}$/, maxDigits: 10 },
            { code: 'BY', name: '🇧🇾 Беларусь', phoneCode: '+375', pattern: /^375\d{9}$/, maxDigits: 9 },
            { code: 'US', name: '🇺🇸 США', phoneCode: '+1', pattern: /^1\d{10}$/, maxDigits: 10 },
            { code: 'GB', name: '🇬🇧 Великобритания', phoneCode: '+44', pattern: /^44\d{10}$/, maxDigits: 10 },
            { code: 'DE', name: '🇩🇪 Германия', phoneCode: '+49', pattern: /^49\d{10}$/, maxDigits: 10 },
            { code: 'FR', name: '🇫🇷 Франция', phoneCode: '+33', pattern: /^33\d{9}$/, maxDigits: 9 },
            { code: 'IT', name: '🇮🇹 Италия', phoneCode: '+39', pattern: /^39\d{10}$/, maxDigits: 10 }
        ];
        
        let userGeo = {
            ip: 'не определён',
            countryCode: 'RU',
            countryName: 'Россия',
            phoneCode: '+7'
        };
        
        let userPhone = localStorage.getItem('user_phone');
        let userCountry = localStorage.getItem('user_country') || 'RU';
        let isPhoneRequired = !userPhone;
        
        async function detectGeo() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                if (data && data.ip) {
                    userGeo.ip = data.ip;
                }
            } catch (error) {
                console.error('Ошибка геолокации:', error);
            }
        }
        
        function getMaxDigits(countryCode) {
            const country = countries.find(c => c.code === countryCode);
            return country ? country.maxDigits : 10;
        }
        
        function validatePhone(phone, countryCode) {
            const country = countries.find(c => c.code === countryCode);
            if (!country) return false;
            const digits = phone.replace(/\D/g, '');
            return country.pattern.test(digits);
        }
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
            localStorage.setItem('chat_user_id', userId);
        }
        
        let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
        let processedIds = new Set(JSON.parse(localStorage.getItem('chat_processedIds') || '[]'));
        
        const widget = document.getElementById('chatWidget');
        const closeBtn = document.querySelector('.close-btn');
        const clearBtn = document.getElementById('clearBtn');
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        
        function clearChat() {
            if (confirm('Очистить всю историю чата?')) {
                const messages = messagesDiv.querySelectorAll('.message');
                messages.forEach(msg => msg.remove());
                localStorage.removeItem('chat_history');
                localStorage.removeItem('chat_lastUpdateId');
                localStorage.removeItem('chat_processedIds');
                lastUpdateId = 0;
                processedIds.clear();
                addMessage('Чат очищен. Задайте, пожалуйста, ваш вопрос 😊', false);
            }
        }
        
        if (clearBtn) clearBtn.addEventListener('click', clearChat);
        if (closeBtn) closeBtn.addEventListener('click', () => widget.classList.add('closed'));
        
        function formatTime(date) {
            return date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }
        
        function addMessage(text, isUser, isImage = false, imageUrl = null, msgId = null, timestamp = null) {
            if (msgId && processedIds.has(msgId)) return;
            
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            
            if (isImage && imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                img.onclick = () => window.open(imageUrl, '_blank');
                div.appendChild(img);
                if (text) div.appendChild(document.createTextNode(' ' + text));
            } else {
                div.innerText = text;
            }
            
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            const msgDate = timestamp ? new Date(timestamp * 1000) : new Date();
            timeSpan.innerText = formatTime(msgDate);
            div.appendChild(timeSpan);
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            if (msgId) {
                processedIds.add(msgId);
                localStorage.setItem('chat_processedIds', JSON.stringify([...processedIds]));
            }
            
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ text, isUser, isImage, imageUrl, time: Date.now(), id: msgId });
            localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
        }
        
        function setStatus(text, type = 'online') {
            if (statusDiv) {
                statusDiv.innerHTML = text;
                statusDiv.className = `status ${type}`;
            }
        }
        
        async function registerPhone(phone, countryCode) {
            try {
                const response = await fetch(`${PROXY_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, site: window.location.hostname, ip: userGeo.ip, phone, region: userGeo.countryName })
                });
                const data = await response.json();
                if (data.ok) {
                    userPhone = phone;
                    userCountry = countryCode;
                    localStorage.setItem('user_phone', phone);
                    localStorage.setItem('user_country', countryCode);
                    isPhoneRequired = false;
                    addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false);
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Ошибка:', error);
                return false;
            }
        }
        
        function showPhoneForm() {
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Чат с поддержкой</h4>
                    <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам, даже если вы уйдете с сайта.</p>
                    <div class="phone-input-wrapper">
                        <select class="country-select" id="countrySelect">
                            ${countries.map(c => `<option value="${c.code}" ${c.code === userCountry ? 'selected' : ''}>${c.name} ${c.phoneCode}</option>`).join('')}
                        </select>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="Введите номер" inputmode="numeric">
                    </div>
                    <div id="phoneError" class="error-text" style="display: none;"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                    <p style="font-size: 11px; color: #999; margin-top: 16px;">Нажимая кнопку "Начать чат", вы соглашаетесь с обработкой персональных данных</p>
                </div>
            `;
            widget.appendChild(overlay);
            
            const countrySelect = document.getElementById('countrySelect');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            
            let currentMaxDigits = getMaxDigits(countrySelect.value);
            
            function updateMaxLength() {
                currentMaxDigits = getMaxDigits(countrySelect.value);
                phoneInput.maxLength = currentMaxDigits;
                phoneInput.placeholder = `${currentMaxDigits} цифр`;
                phoneInput.value = '';
                phoneError.style.display = 'none';
            }
            
            countrySelect.addEventListener('change', updateMaxLength);
            updateMaxLength();
            
            phoneInput.addEventListener('input', function(e) {
                this.value = this.value.replace(/\D/g, '');
                if (this.value.length > currentMaxDigits) {
                    this.value = this.value.slice(0, currentMaxDigits);
                }
            });
            
            // Простой обработчик кнопки
            phoneSubmit.onclick = function(e) {
                e.preventDefault();
                
                const phoneDigits = phoneInput.value.trim();
                const selectedCountry = countries.find(c => c.code === countrySelect.value);
                
                if (!phoneDigits || phoneDigits.length !== currentMaxDigits) {
                    phoneError.textContent = `Введите ровно ${currentMaxDigits} цифр`;
                    phoneError.style.display = 'block';
                    return;
                }
                
                const fullPhone = selectedCountry.phoneCode + phoneDigits;
                
                if (!validatePhone(fullPhone, selectedCountry.code)) {
                    phoneError.textContent = `Неверный формат номера для ${selectedCountry.name}`;
                    phoneError.style.display = 'block';
                    return;
                }
                
                phoneError.style.display = 'none';
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Проверка...';
                
                registerPhone(fullPhone, selectedCountry.code).then(success => {
                    if (success) {
                        overlay.remove();
                    } else {
                        phoneSubmit.disabled = false;
                        phoneSubmit.textContent = 'Начать чат';
                        phoneError.textContent = 'Ошибка. Попробуйте позже.';
                        phoneError.style.display = 'block';
                    }
                });
            };
        }
        
        async function sendToTelegram(text, imageBase64 = null) {
            if (isPhoneRequired) {
                showPhoneForm();
                return;
            }
            
            if (!text && !imageBase64) return;
            if (text) addMessage(text, true);
            else if (imageBase64) addMessage('📷 Изображение', true, true, imageBase64);
            
            setStatus('⏳ Отправка...', 'sending');
            
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, site: window.location.hostname, ip: userGeo.ip, text, imageBase64, region: userGeo.countryName })
                });
                const data = await response.json();
                if (data.ok) {
                    setStatus('🟢 Онлайн', 'online');
                } else {
                    throw new Error('Ошибка');
                }
            } catch (error) {
                setStatus('🔴 Ошибка', 'offline');
                setTimeout(() => setStatus('🟢 Онлайн', 'online'), 3000);
            }
        }
        
        async function checkReplies() {
            try {
                const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&ip=${userGeo.ip}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        lastUpdateId = Math.max(lastUpdateId, update.update_id + 1);
                        if (update.message && (update.message.text || update.message.hasImage)) {
                            if (update.message.text && (update.message.text.includes('Новый пользователь') || update.message.text.startsWith('💬') || update.message.text.includes('changed the topic name'))) {
                                continue;
                            }
                            addMessage(update.message.text || '📷 Изображение', false, update.message.hasImage || false, update.message.imageUrl || null, update.update_id, update.message.date);
                        }
                    }
                    localStorage.setItem('chat_lastUpdateId', lastUpdateId);
                }
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }
        
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
                if (msg.isImage && msg.imageUrl) {
                    const img = document.createElement('img');
                    img.src = msg.imageUrl;
                    img.onclick = () => window.open(msg.imageUrl, '_blank');
                    div.appendChild(img);
                    if (msg.text) div.appendChild(document.createTextNode(' ' + msg.text));
                } else {
                    div.innerText = msg.text;
                }
                const timeSpan = document.createElement('div');
                timeSpan.className = 'message-time';
                timeSpan.innerText = formatTime(new Date(msg.time));
                div.appendChild(timeSpan);
                messagesDiv.appendChild(div);
            });
            if (history.length === 0 && !isPhoneRequired) {
                setTimeout(() => addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false), 500);
            }
        }
        
        widget.addEventListener('click', (e) => {
            if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
                widget.classList.remove('closed');
                if (isPhoneRequired) {
                    setTimeout(() => showPhoneForm(), 100);
                }
            }
        });
        
        fileBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (ev) => sendToTelegram('', ev.target.result);
            reader.readAsDataURL(file);
            fileInput.value = '';
        });
        
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendToTelegram(text);
                messageInput.value = '';
            }
        });
        
        loadHistory();
        setInterval(checkReplies, 5000);
        
        detectGeo().then(() => {
            if (isPhoneRequired) {
                setTimeout(() => showPhoneForm(), 500);
            }
        });
    })();
</script>
</body>
</html>
