<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            max-width: 500px;
        }
        h1 { margin-bottom: 20px; }
        
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 350px;
            height: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #25a3e2;
            cursor: pointer;
        }
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area { display: none; }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon { display: flex; }
        
        .chat-header {
            background: #25a3e2;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #f5f5f5;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
        }
        .user-message {
            background: #25a3e2;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .bot-message {
            background: #e0e0e0;
            color: black;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }
        .chat-input {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        .send-btn {
            background: #25a3e2;
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            margin-left: 8px;
            cursor: pointer;
        }
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        .phone-card {
            text-align: center;
            padding: 20px;
        }
        .phone-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 18px;
            text-align: center;
        }
        .phone-submit {
            background: #25a3e2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
        }
        .error-text { color: red; font-size: 12px; }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>Чат с поддержкой</h3>
        <button class="close-btn">×</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    (function() {
        const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now();
            localStorage.setItem('chat_user_id', userId);
        }
        
        let isRegistered = false;
        let userIp = '';
        
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => userIp = data.ip)
            .catch(() => userIp = '127.0.0.1');
        
        const widget = document.getElementById('chatWidget');
        const closeBtn = document.querySelector('.close-btn');
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        async function registerPhone(phone) {
            try {
                const response = await fetch(`${PROXY_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId, site: window.location.hostname, ip: userIp, phone, region: 'Тест'
                    })
                });
                const data = await response.json();
                console.log('Регистрация:', data);
                if (data.ok) {
                    isRegistered = true;
                    addMessage('Здравствуйте! Напишите ваш вопрос.', false);
                    return true;
                }
                return false;
            } catch (err) {
                console.error('Ошибка:', err);
                return false;
            }
        }
        
        function showPhoneForm() {
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Укажите номер телефона</h4>
                    <input type="tel" class="phone-input" id="phoneInput" placeholder="1234567890" maxlength="10" inputmode="numeric">
                    <div id="phoneError" class="error-text"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                </div>
            `;
            widget.appendChild(overlay);
            
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            
            phoneInput.oninput = function() {
                this.value = this.value.replace(/\D/g, '').slice(0, 10);
            };
            
            phoneSubmit.onclick = async function() {
                const digits = phoneInput.value.trim();
                if (!digits || digits.length !== 10) {
                    phoneError.textContent = 'Введите 10 цифр';
                    return;
                }
                const fullPhone = '+7' + digits;
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Проверка...';
                const success = await registerPhone(fullPhone);
                if (success) {
                    overlay.remove();
                } else {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.textContent = 'Ошибка. Попробуйте позже.';
                }
            };
        }
        
        async function sendToTelegram(text) {
            if (!isRegistered) {
                showPhoneForm();
                return;
            }
            addMessage(text, true);
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        userId, site: window.location.hostname, ip: userIp, text, region: 'Тест'
                    })
                });
                const data = await response.json();
                console.log('Отправка:', data);
            } catch (err) {
                console.error('Ошибка:', err);
            }
        }
        
        widget.onclick = (e) => {
            if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
                widget.classList.remove('closed');
                if (!isRegistered) setTimeout(() => showPhoneForm(), 100);
            }
        };
        
        closeBtn.onclick = () => widget.classList.add('closed');
        
        sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        };
        
        messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendToTelegram(text);
                messageInput.value = '';
            }
        };
        
        addMessage('Здравствуйте! Напишите ваш вопрос.', false);
    })();
</script>
</body>
</html>
