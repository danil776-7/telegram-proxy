<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .content {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        p { color: #666; line-height: 1.5; font-size: 16px; }

        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 600px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 40px);
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1000;
        }

        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }

        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay { display: none; }

        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }

        .chat-widget.closed .open-icon { display: flex; }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 20px 16px 20px;
            text-align: center;
            flex-shrink: 0;
            position: relative;
        }

        .chat-header h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.8;
            color: white;
            margin-top: 4px;
        }

        .header-buttons {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }

        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.4;
        }

        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
        }

        .bot-message {
            background: white;
            color: #1a1a2e;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #eef2f6;
            background: white;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e4e8;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
            background: #f8f9fa;
        }

        .send-btn, .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .file-btn { background: #6c757d; }

        .status {
            font-size: 12px;
            padding: 8px 14px;
            text-align: center;
            background: white;
            border-radius: 20px;
            width: fit-content;
            align-self: center;
        }

        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 24px;
            padding: 20px;
        }

        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 320px;
        }

        .phone-card h4 {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .phone-card p {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .country-select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 12px;
            background: white;
            cursor: pointer;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .phone-code-display {
            padding: 14px 12px;
            font-size: 18px;
            font-weight: 600;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 12px;
            color: #333;
            min-width: 60px;
            text-align: center;
        }

        .phone-input {
            flex: 1;
            padding: 14px 12px;
            font-size: 18px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 12px;
            background: white;
            font-family: monospace;
        }

        .phone-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }

        .error-text {
            color: #dc3545;
            font-size: 12px;
            margin-top: 8px;
        }

        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
            }
            .chat-widget.closed {
                width: 56px;
                height: 56px;
                bottom: 20px;
                right: 20px;
                border-radius: 28px;
            }
            .message { max-width: 90%; }
            .phone-card { padding: 20px 16px; }
            .phone-card h4 { font-size: 20px; }
            .phone-code-display { font-size: 16px; padding: 12px 8px; min-width: 50px; }
            .phone-input { font-size: 16px; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>Чат с поддержкой</h3>
        <p>Мы на связи и готовы помочь</p>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Онлайн</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Введите сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    (function() {
        const PROXY_URL = 'https://telegram-proxy-viyx.onrender.com';
        
        const countries = [
            { code: 'RU', name: '🇷🇺 Россия', phoneCode: '+7', maxDigits: 10 },
            { code: 'NL', name: '🇳🇱 Нидерланды', phoneCode: '+31', maxDigits: 9 },
            { code: 'UA', name: '🇺🇦 Украина', phoneCode: '+380', maxDigits: 9 },
            { code: 'KZ', name: '🇰🇿 Казахстан', phoneCode: '+7', maxDigits: 10 },
            { code: 'BY', name: '🇧🇾 Беларусь', phoneCode: '+375', maxDigits: 9 },
            { code: 'US', name: '🇺🇸 США', phoneCode: '+1', maxDigits: 10 },
            { code: 'GB', name: '🇬🇧 Великобритания', phoneCode: '+44', maxDigits: 10 },
            { code: 'DE', name: '🇩🇪 Германия', phoneCode: '+49', maxDigits: 10 },
            { code: 'FR', name: '🇫🇷 Франция', phoneCode: '+33', maxDigits: 9 },
            { code: 'IT', name: '🇮🇹 Италия', phoneCode: '+39', maxDigits: 10 }
        ];
        
        let userId = localStorage.getItem('chat_user_id');
        if (!userId) {
            userId = 'user_' + Date.now();
            localStorage.setItem('chat_user_id', userId);
        }
        
        let userPhone = localStorage.getItem('user_phone');
        let isPhoneRequired = !userPhone;
        
        let userIp = '';
        fetch('https://api.ipify.org?format=json')
            .then(r => r.json())
            .then(data => userIp = data.ip)
            .catch(() => {});
        
        const widget = document.getElementById('chatWidget');
        const clearBtn = document.getElementById('clearBtn');
        const closeBtn = document.querySelector('.close-btn');
        const messagesDiv = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const fileBtn = document.getElementById('fileBtn');
        const fileInput = document.getElementById('fileInput');
        const statusDiv = document.getElementById('status');
        
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
            div.innerText = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.push({ text, isUser, time: Date.now() });
            localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
        }
        
        function setStatus(text) {
            if (statusDiv) statusDiv.innerHTML = text;
        }
        
        async function registerPhone(phone) {
            try {
                const response = await fetch(`${PROXY_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, site: window.location.hostname, ip: userIp, phone })
                });
                const data = await response.json();
                if (data.ok) {
                    userPhone = phone;
                    localStorage.setItem('user_phone', phone);
                    isPhoneRequired = false;
                    addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false);
                    return true;
                }
                return false;
            } catch (error) {
                return false;
            }
        }
        
        function showPhoneForm() {
            const oldOverlay = document.querySelector('.phone-overlay');
            if (oldOverlay) oldOverlay.remove();
            
            const overlay = document.createElement('div');
            overlay.className = 'phone-overlay';
            overlay.innerHTML = `
                <div class="phone-card">
                    <h4>Чат с поддержкой</h4>
                    <p>Мы на связи и готовы помочь.<br>Оставьте свой номер, чтобы мы могли ответить вам, даже если вы уйдете с сайта.</p>
                    <select class="country-select" id="countrySelect">
                        ${countries.map(c => `<option value="${c.code}" data-phonecode="${c.phoneCode}" data-maxdigits="${c.maxDigits}">${c.name} ${c.phoneCode}</option>`).join('')}
                    </select>
                    <div class="phone-input-wrapper">
                        <div class="phone-code-display" id="phoneCodeDisplay">+7</div>
                        <input type="tel" class="phone-input" id="phoneInput" placeholder="1234567890" maxlength="10" inputmode="numeric">
                    </div>
                    <div id="phoneError" class="error-text" style="display: none;"></div>
                    <button class="phone-submit" id="phoneSubmit">Начать чат</button>
                    <p style="font-size: 11px; color: #999; margin-top: 16px;">Нажимая кнопку "Начать чат", вы соглашаетесь с обработкой персональных данных</p>
                </div>
            `;
            widget.appendChild(overlay);
            
            const countrySelect = document.getElementById('countrySelect');
            const phoneCodeDisplay = document.getElementById('phoneCodeDisplay');
            const phoneInput = document.getElementById('phoneInput');
            const phoneError = document.getElementById('phoneError');
            const phoneSubmit = document.getElementById('phoneSubmit');
            
            function updateCountry() {
                const selected = countrySelect.options[countrySelect.selectedIndex];
                const phoneCode = selected.getAttribute('data-phonecode');
                const maxDigits = selected.getAttribute('data-maxdigits');
                phoneCodeDisplay.textContent = phoneCode;
                phoneInput.maxLength = maxDigits;
                phoneInput.placeholder = `${maxDigits} цифр`;
                phoneInput.value = '';
                phoneError.style.display = 'none';
            }
            
            countrySelect.onchange = updateCountry;
            updateCountry();
            
            phoneInput.oninput = function() {
                this.value = this.value.replace(/\D/g, '');
            };
            
            phoneSubmit.onclick = async function() {
                const phoneDigits = phoneInput.value.trim();
                const selected = countrySelect.options[countrySelect.selectedIndex];
                const phoneCode = selected.getAttribute('data-phonecode');
                const maxDigits = parseInt(selected.getAttribute('data-maxdigits'));
                
                if (!phoneDigits || phoneDigits.length !== maxDigits) {
                    phoneError.textContent = `Введите ровно ${maxDigits} цифр`;
                    phoneError.style.display = 'block';
                    return;
                }
                
                const fullPhone = phoneCode + phoneDigits;
                
                phoneError.style.display = 'none';
                phoneSubmit.disabled = true;
                phoneSubmit.textContent = 'Проверка...';
                
                const success = await registerPhone(fullPhone);
                if (success) {
                    overlay.remove();
                } else {
                    phoneSubmit.disabled = false;
                    phoneSubmit.textContent = 'Начать чат';
                    phoneError.textContent = 'Ошибка. Попробуйте позже.';
                    phoneError.style.display = 'block';
                }
            };
        }
        
        async function sendToTelegram(text) {
            if (isPhoneRequired) {
                showPhoneForm();
                return;
            }
            
            if (!text) return;
            addMessage(text, true);
            setStatus('⏳ Отправка...');
            
            try {
                const response = await fetch(`${PROXY_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, site: window.location.hostname, ip: userIp, text })
                });
                const data = await response.json();
                if (data.ok) {
                    setStatus('🟢 Онлайн');
                } else {
                    throw new Error();
                }
            } catch (error) {
                setStatus('🔴 Ошибка');
                setTimeout(() => setStatus('🟢 Онлайн'), 3000);
            }
        }
        
        async function checkReplies() {
            try {
                const response = await fetch(`${PROXY_URL}/getUpdates?offset=0&ip=${userIp}`);
                const data = await response.json();
                if (data.ok && data.result) {
                    for (const update of data.result) {
                        if (update.message && update.message.text && !update.message.text.includes('Новый пользователь') && !update.message.text.startsWith('💬')) {
                            addMessage(update.message.text, false);
                        }
                    }
                }
            } catch (error) {}
        }
        
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
            history.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
                div.innerText = msg.text;
                messagesDiv.appendChild(div);
            });
            if (history.length === 0 && !isPhoneRequired) {
                setTimeout(() => addMessage('Здравствуйте! Напишите ваш вопрос 😊', false), 500);
            }
        }
        
        widget.onclick = (e) => {
            if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
                widget.classList.remove('closed');
                if (isPhoneRequired) {
                    setTimeout(() => showPhoneForm(), 100);
                }
            }
        };
        
        if (closeBtn) closeBtn.onclick = () => widget.classList.add('closed');
        if (clearBtn) clearBtn.onclick = () => {
            if (confirm('Очистить историю чата?')) {
                localStorage.clear();
                location.reload();
            }
        };
        if (fileBtn) fileBtn.onclick = () => fileInput.click();
        if (fileInput) fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (ev) => sendToTelegram('', ev.target.result);
            reader.readAsDataURL(file);
            fileInput.value = '';
        };
        if (sendBtn) sendBtn.onclick = () => {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        };
        if (messageInput) messageInput.onkeypress = (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendToTelegram(text);
                messageInput.value = '';
            }
        };
        
        loadHistory();
        setInterval(checkReplies, 5000);
        
        if (isPhoneRequired) {
            setTimeout(() => showPhoneForm(), 500);
        }
    })();
</script>
</body>
</html>
