<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 28px;
            max-width: 500px;
            margin: 20px;
        }
        h1 { font-size: 28px; margin-bottom: 16px; }
        p { color: #666; }
        .note {
            margin-top: 24px;
            padding: 16px;
            background: #f0f0f0;
            border-radius: 16px;
            font-size: 13px;
        }
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 600px;
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1000;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            border-radius: 20px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
        }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
        }
        .bot-message {
            background: white;
            color: #1a1a2e;
            align-self: flex-start;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #eef2f6;
            background: white;
            gap: 10px;
        }
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e4e8;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
        }
        .chat-widget.closed .chat-header, 
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area { display: none; }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon { display: flex; }
        .status {
            font-size: 12px;
            padding: 8px 14px;
            background: white;
            border-radius: 20px;
            width: fit-content;
            align-self: center;
        }
        @media (max-width: 480px) {
            .chat-widget { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
            .chat-widget.closed { width: 60px; height: 60px; bottom: 20px; right: 20px; border-radius: 30px; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
    <div class="note">
        📌 Нажмите на виджет справа, напишите сообщение — мы ответим в Telegram
    </div>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>💬 Поддержка</h3>
        <button class="close-btn">×</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status" id="status">🟢 Онлайн</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    const PROXY_URL = 'https://telegram-proxy-viyx.onrender.com';
    const BOT_TOKEN = '8743342099:AAGWRLBrNjd8YlkHPSeqOU64J4-0fJdILPg';
    const YOUR_CHAT_ID = '7545540622';
    
    let userId = localStorage.getItem('chat_user_id');
    if (!userId) {
        userId = 'user_' + Date.now();
        localStorage.setItem('chat_user_id', userId);
    }
    
    let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
    let processedIds = new Set(JSON.parse(localStorage.getItem('chat_processedIds') || '[]'));
    
    const widget = document.getElementById('chatWidget');
    const closeBtn = document.querySelector('.close-btn');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.push({ text, isUser, time: Date.now() });
        localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
    }
    
    function setStatus(text) {
        if (statusDiv) statusDiv.innerHTML = text;
    }
    
    async function sendToTelegram(text) {
        addMessage(text, true);
        setStatus('⏳ Отправка...');
        
        const messageText = `📝 Сообщение от ${userId}\n\n${text}`;
        
        try {
            const response = await fetch(`${PROXY_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    token: BOT_TOKEN,
                    chatId: YOUR_CHAT_ID,
                    text: messageText
                })
            });
            
            const data = await response.json();
            console.log('Ответ:', data);
            
            if (data.ok) {
                setStatus('✅ Отправлено!');
                setTimeout(() => setStatus('🟢 Онлайн'), 2000);
            } else {
                throw new Error(data.description);
            }
        } catch (error) {
            console.error('Ошибка:', error);
            setStatus('❌ Ошибка');
            setTimeout(() => setStatus('🟢 Онлайн'), 3000);
        }
    }
    
    async function checkForReplies() {
        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId}&timeout=5`);
            const data = await response.json();
            
            if (data.ok && data.result) {
                for (const update of data.result) {
                    lastUpdateId = update.update_id + 1;
                    const message = update.message;
                    if (message && message.chat.id == YOUR_CHAT_ID && message.text) {
                        if (!message.text.includes('📝 Сообщение от')) {
                            addMessage(message.text, false);
                        }
                    }
                }
                localStorage.setItem('chat_lastUpdateId', lastUpdateId);
            }
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
    
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
            div.innerText = msg.text;
            messagesDiv.appendChild(div);
        });
        
        if (history.length === 0) {
            setTimeout(() => {
                addMessage('Здравствуйте! Напишите ваш вопрос 😊', false);
            }, 500);
        }
    }
    
    widget.addEventListener('click', (e) => {
        if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
            widget.classList.remove('closed');
        }
    });
    
    if (closeBtn) {
        closeBtn.addEventListener('click', () => widget.classList.add('closed'));
    }
    
    if (sendBtn && messageInput) {
        sendBtn.addEventListener('click', () => {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        });
        
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = messageInput.value.trim();
                if (text) sendToTelegram(text);
                messageInput.value = '';
            }
        });
    }
    
    loadHistory();
    setInterval(checkForReplies, 5000);
</script>
</body>
</html>
