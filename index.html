<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        
        .content {
            text-align: center;
            padding: 32px 20px;
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        h1 { 
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }
        
        p { color: #666; line-height: 1.5; font-size: 16px; }
        
        .note {
            margin-top: 24px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 16px;
            font-size: 13px;
            color: #666;
            text-align: left;
        }
        
        /* ========== ВИДЖЕТ ========== */
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 400px;
            height: 650px;
            max-width: calc(100vw - 40px);
            max-height: calc(100vh - 40px);
            background: white;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000;
        }
        
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-header h3 {
            font-size: 17px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header-buttons {
            display: flex;
            gap: 12px;
        }
        
        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            transition: background 0.2s;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .close-btn {
            font-size: 24px;
            padding: 0;
            width: 44px;
            height: 44px;
            border-radius: 22px;
        }
        
        .clear-btn:active, .close-btn:active { background: rgba(255,255,255,0.4); }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
        }
        
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 20px;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
            font-size: 15px;
            line-height: 1.4;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .bot-message {
            background: white;
            color: #1a1a2e;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .message img {
            max-width: 200px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px 16px;
            border-top: 1px solid #eef2f6;
            background: white;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e4e8;
            border-radius: 30px;
            outline: none;
            font-size: 16px;
            transition: all 0.2s;
            background: #f8f9fa;
        }
        
        .chat-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.2);
            background: white;
        }
        
        .send-btn, .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 18px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.1s;
            min-width: 50px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .file-btn { background: #6c757d; }
        .send-btn:active, .file-btn:active { transform: scale(0.96); }
        
        .status {
            font-size: 12px;
            padding: 8px 14px;
            text-align: center;
            background: white;
            border-radius: 20px;
            margin-bottom: 8px;
            width: fit-content;
            align-self: center;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        .status.online { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.sending { background: #fff3cd; color: #856404; }
        .status.blocked { background: #f8d7da; color: #721c24; }
        
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            backdrop-filter: blur(4px);
        }
        
        .phone-card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            margin: 20px;
            text-align: center;
            max-width: 340px;
            width: calc(100% - 40px);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        .phone-card h4 { margin-bottom: 16px; color: #333; font-size: 22px; }
        .phone-card p { font-size: 14px; margin-bottom: 8px; }
        
        .phone-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e4e8;
            border-radius: 16px;
            font-size: 18px;
            margin-bottom: 16px;
            text-align: center;
            background: #f8f9fa;
        }
        
        .phone-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }
        
        .country-select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin-bottom: 12px;
            font-size: 14px;
            background: white;
        }
        
        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        
        .phone-submit:active { transform: scale(0.98); }
        .phone-submit:disabled { opacity: 0.6; }
        
        .error-text { color: #dc3545; font-size: 13px; margin-bottom: 12px; }
        
        .chat-widget.closed .chat-header, 
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay { display: none; }
        
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        
        .chat-widget.closed .open-icon { display: flex; }
        
        @media (max-width: 480px) {
            .chat-widget {
                width: 100%;
                height: 100%;
                bottom: 0;
                right: 0;
                border-radius: 0;
                max-width: 100vw;
                max-height: 100vh;
            }
            .chat-widget.closed {
                width: 60px;
                height: 60px;
                bottom: 20px;
                right: 20px;
                border-radius: 30px;
            }
            .message { max-width: 90%; font-size: 15px; }
            .send-btn, .file-btn { padding: 10px 16px; min-width: 44px; min-height: 44px; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
    <div class="note">
        <strong>📌 Как это работает:</strong><br>
        1️⃣ Нажмите на виджет в правом нижнем углу<br>
        2️⃣ Укажите ваш номер телефона<br>
        3️⃣ Напишите сообщение или отправьте фото<br>
        4️⃣ Мы ответим вам в Telegram, а вы увидите ответ здесь
    </div>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>💬 Поддержка</h3>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Готов к работе</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="file-btn" id="fileBtn">📎</button>
        <button class="send-btn" id="sendBtn">➤</button>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
</div>

<script>
    const PROXY_URL = 'https://telegram-proxy-viyx.onrender.com';
    
    // ========== ДАННЫЕ СТРАН ==========
    const countries = [
        { code: 'RU', name: '🇷🇺 Россия', mask: '+7 (___) ___-__-__', pattern: /^7\d{10}$/, example: '+71234567890' },
        { code: 'UA', name: '🇺🇦 Украина', mask: '+380 (__) ___-__-__', pattern: /^380\d{9}$/, example: '+380123456789' },
        { code: 'KZ', name: '🇰🇿 Казахстан', mask: '+7 (___) ___-__-__', pattern: /^7\d{10}$/, example: '+77123456789' },
        { code: 'BY', name: '🇧🇾 Беларусь', mask: '+375 (__) ___-__-__', pattern: /^375\d{9}$/, example: '+375123456789' },
        { code: 'US', name: '🇺🇸 США', mask: '+1 (___) ___-____', pattern: /^1\d{10}$/, example: '+12345678901' },
        { code: 'GB', name: '🇬🇧 Великобритания', mask: '+44 (__) ____-____', pattern: /^44\d{10}$/, example: '+441234567890' },
        { code: 'DE', name: '🇩🇪 Германия', mask: '+49 (___) ______', pattern: /^49\d{10}$/, example: '+491234567890' },
        { code: 'FR', name: '🇫🇷 Франция', mask: '+33 (__) __-__-__', pattern: /^33\d{9}$/, example: '+33123456789' },
        { code: 'IT', name: '🇮🇹 Италия', mask: '+39 (__) ____-____', pattern: /^39\d{10}$/, example: '+391234567890' },
        { code: 'ES', name: '🇪🇸 Испания', mask: '+34 (__) __-__-__', pattern: /^34\d{9}$/, example: '+34123456789' }
    ];
    
    function getCountryByIp(ip) {
        const firstOctet = parseInt(ip.split('.')[0]);
        if (firstOctet >= 1 && firstOctet <= 10) return 'RU';
        if (ip.startsWith('185.92') || ip.startsWith('5.') || ip.startsWith('178.')) return 'RU';
        if (ip.startsWith('46.') || ip.startsWith('94.')) return 'UA';
        if (ip.startsWith('2.') || ip.startsWith('5.')) return 'KZ';
        if (ip.startsWith('93.') || ip.startsWith('37.')) return 'BY';
        return 'RU';
    }
    
    function validatePhone(phone, countryCode) {
        const country = countries.find(c => c.code === countryCode);
        if (!country) return false;
        const digits = phone.replace(/\D/g, '');
        return country.pattern.test(digits);
    }
    
    function formatPhone(phone, countryCode) {
        const digits = phone.replace(/\D/g, '');
        if (!digits) return '';
        const country = countries.find(c => c.code === countryCode);
        if (!country) return digits;
        return '+' + digits;
    }
    
    // ========== ОСНОВНАЯ ЛОГИКА ==========
    const MAX_PHONE_ATTEMPTS = 3;
    const BLOCK_MINUTES = 30;
    
    let phoneAttempts = parseInt(localStorage.getItem('phone_attempts') || '0');
    let blockUntil = parseInt(localStorage.getItem('phone_block_until') || '0');
    
    function isPhoneBlocked() {
        if (blockUntil > Date.now()) return true;
        if (blockUntil && blockUntil < Date.now()) {
            localStorage.removeItem('phone_block_until');
            localStorage.removeItem('phone_attempts');
            phoneAttempts = 0;
            return false;
        }
        return false;
    }
    
    function incrementPhoneAttempt() {
        phoneAttempts++;
        localStorage.setItem('phone_attempts', phoneAttempts);
        if (phoneAttempts >= MAX_PHONE_ATTEMPTS) {
            blockUntil = Date.now() + (BLOCK_MINUTES * 60 * 1000);
            localStorage.setItem('phone_block_until', blockUntil);
            return true;
        }
        return false;
    }
    
    function getRemainingAttempts() {
        return MAX_PHONE_ATTEMPTS - phoneAttempts;
    }
    
    let userId = localStorage.getItem('chat_user_id');
    if (!userId) {
        userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        localStorage.setItem('chat_user_id', userId);
    }
    
    let userPhone = localStorage.getItem('user_phone');
    let userCountry = localStorage.getItem('user_country') || 'RU';
    let isPhoneRequired = !userPhone;
    
    let lastUpdateId = parseInt(localStorage.getItem('chat_lastUpdateId') || '0');
    let processedIds = new Set(JSON.parse(localStorage.getItem('chat_processedIds') || '[]'));
    
    let userIp = 'не определён';
    let detectedCountry = 'RU';
    
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => {
            userIp = data.ip;
            detectedCountry = getCountryByIp(userIp);
            if (!userCountry) userCountry = detectedCountry;
            updateStatus(true, true);
        })
        .catch(() => updateStatus(true, true));
    
    const site = window.location.hostname;
    
    const widget = document.getElementById('chatWidget');
    const closeBtn = document.querySelector('.close-btn');
    const clearBtn = document.getElementById('clearBtn');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const fileBtn = document.getElementById('fileBtn');
    const fileInput = document.getElementById('fileInput');
    const statusDiv = document.getElementById('status');
    
    function updateStatus(isOnline = true, isActive = false) {
        fetch(`${PROXY_URL}/updateStatus`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, site, ip: userIp, isOnline, isActive })
        }).catch(console.error);
    }
    
    function addMessage(text, isUser, isImage = false, imageUrl = null, msgId = null) {
        if (msgId && processedIds.has(msgId)) return;
        
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        
        if (isImage && imageUrl) {
            const img = document.createElement('img');
            img.src = imageUrl;
            img.style.maxWidth = '200px';
            img.style.borderRadius = '12px';
            img.style.cursor = 'pointer';
            img.onclick = () => window.open(imageUrl, '_blank');
            div.appendChild(img);
            if (text) div.appendChild(document.createTextNode(' ' + text));
        } else {
            div.innerText = text;
        }
        
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        if (msgId) {
            processedIds.add(msgId);
            localStorage.setItem('chat_processedIds', JSON.stringify([...processedIds]));
        }
        
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.push({ text, isUser, isImage, imageUrl, time: Date.now(), id: msgId });
        localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
    }
    
    function setStatus(text, type = 'online') {
        statusDiv.innerHTML = text;
        statusDiv.className = `status ${type}`;
    }
    
    async function registerPhone(phone, countryCode) {
        try {
            const response = await fetch(`${PROXY_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, site, ip: userIp, phone })
            });
            const data = await response.json();
            if (data.ok) {
                userPhone = phone;
                userCountry = countryCode;
                localStorage.setItem('user_phone', phone);
                localStorage.setItem('user_country', countryCode);
                isPhoneRequired = false;
                localStorage.removeItem('phone_attempts');
                localStorage.removeItem('phone_block_until');
                addMessage('✅ Спасибо! Номер подтверждён. Теперь вы можете задать ваш вопрос.', false);
                return true;
            }
            return false;
        } catch (error) {
            console.error('Ошибка:', error);
            return false;
        }
    }
    
    function showPhoneForm() {
        if (isPhoneBlocked()) {
            const remaining = Math.ceil((blockUntil - Date.now()) / 60000);
            addMessage(`⛔ Превышено количество попыток. Попробуйте через ${remaining} минут.`, false);
            return;
        }
        
        const remainingAttempts = getRemainingAttempts();
        const countriesOptions = countries.map(c => 
            `<option value="${c.code}" ${c.code === userCountry ? 'selected' : ''}>${c.name}</option>`
        ).join('');
        
        const overlay = document.createElement('div');
        overlay.className = 'phone-overlay';
        overlay.innerHTML = `
            <div class="phone-card">
                <h4>📞 Укажите номер телефона</h4>
                <p>Для связи с вами</p>
                <p style="font-size: 12px; color: #888; margin: 8px 0;">Осталось попыток: ${remainingAttempts} из ${MAX_PHONE_ATTEMPTS}</p>
                <select class="country-select" id="countrySelect">${countriesOptions}</select>
                <input type="tel" class="phone-input" id="phoneInput" placeholder="+7 123 456 78 90" maxlength="20" inputmode="numeric">
                <div id="phoneError" class="error-text" style="display: none;"></div>
                <button class="phone-submit" id="phoneSubmit">Продолжить</button>
            </div>
        `;
        widget.appendChild(overlay);
        
        const countrySelect = document.getElementById('countrySelect');
        const phoneInput = document.getElementById('phoneInput');
        const phoneError = document.getElementById('phoneError');
        const phoneSubmit = document.getElementById('phoneSubmit');
        
        function updatePlaceholder() {
            const country = countries.find(c => c.code === countrySelect.value);
            if (country) {
                phoneInput.placeholder = country.example;
            }
        }
        
        countrySelect.addEventListener('change', updatePlaceholder);
        updatePlaceholder();
        
        phoneSubmit.onclick = async () => {
            const phone = phoneInput.value.trim();
            const countryCode = countrySelect.value;
            
            if (!validatePhone(phone, countryCode)) {
                phoneError.textContent = `Неверный формат номера. Пример: ${countries.find(c => c.code === countryCode).example}`;
                phoneError.style.display = 'block';
                return;
            }
            
            phoneError.style.display = 'none';
            phoneSubmit.disabled = true;
            phoneSubmit.textContent = 'Проверка...';
            
            const formattedPhone = formatPhone(phone, countryCode);
            const success = await registerPhone(formattedPhone, countryCode);
            
            if (success) {
                overlay.remove();
            } else {
                const isNowBlocked = incrementPhoneAttempt();
                phoneSubmit.disabled = false;
                phoneSubmit.textContent = 'Продолжить';
                
                if (isNowBlocked) {
                    phoneError.textContent = `Превышено количество попыток. Доступ через ${BLOCK_MINUTES} минут.`;
                    phoneError.style.display = 'block';
                    phoneSubmit.disabled = true;
                    setTimeout(() => {
                        overlay.remove();
                        addMessage(`⛔ Превышено количество попыток. Попробуйте через ${BLOCK_MINUTES} минут.`, false);
                    }, 2000);
                } else {
                    const remaining = getRemainingAttempts();
                    phoneError.textContent = `Неверный номер. Осталось попыток: ${remaining}`;
                    phoneError.style.display = 'block';
                }
            }
        };
    }
    
    async function sendToTelegram(text, imageBase64 = null) {
        if (isPhoneRequired) {
            showPhoneForm();
            return;
        }
        
        if (!text && !imageBase64) return;
        if (text) addMessage(text, true);
        else if (imageBase64) addMessage('📷 Изображение', true, true, imageBase64);
        
        setStatus('⏳ Отправка...', 'sending');
        updateStatus(true, true);
        
        try {
            const response = await fetch(`${PROXY_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId, site, ip: userIp, text, imageBase64 })
            });
            const data = await response.json();
            if (data.ok) {
                setStatus('✅ Отправлено!', 'online');
                setTimeout(() => setStatus('🟢 Онлайн', 'online'), 2000);
            } else {
                throw new Error(data.description || 'Ошибка');
            }
        } catch (error) {
            setStatus('❌ Ошибка', 'error');
            setTimeout(() => setStatus('🟢 Онлайн', 'online'), 3000);
        }
    }
    
    async function checkReplies() {
        try {
            const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}&ip=${userIp}`);
            const data = await response.json();
            
            if (data.ok && data.result) {
                for (const update of data.result) {
                    lastUpdateId = Math.max(lastUpdateId, update.update_id + 1);
                    if (update.message) {
                        if (update.message.text?.includes('Новый пользователь')) continue;
                        if (update.message.text?.startsWith('💬')) continue;
                        if (update.message.text?.startsWith('📞')) continue;
                        if (update.message.text?.startsWith('🔔')) continue;
                        
                        if (update.message.hasImage || update.message.text) {
                            addMessage(update.message.text || '📷 Изображение', false, update.message.hasImage || false, update.message.imageUrl || null, update.update_id);
                        }
                    }
                }
                localStorage.setItem('chat_lastUpdateId', lastUpdateId);
            }
        } catch (error) {
            console.error('Ошибка:', error);
        }
    }
    
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
            if (msg.isImage && msg.imageUrl) {
                const img = document.createElement('img');
                img.src = msg.imageUrl;
                div.appendChild(img);
                if (msg.text) div.appendChild(document.createTextNode(' ' + msg.text));
            } else {
                div.innerText = msg.text;
            }
            messagesDiv.appendChild(div);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        if (history.length === 0 && !isPhoneRequired) {
            setTimeout(() => addMessage('Здравствуйте! Напишите ваш вопрос 😊', false), 500);
        }
    }
    
    widget.addEventListener('click', (e) => {
        if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
            widget.classList.remove('closed');
            if (isPhoneRequired && !isPhoneBlocked()) {
                setTimeout(() => showPhoneForm(), 100);
            }
        }
    });
    
    closeBtn.addEventListener('click', () => widget.classList.add('closed'));
    clearBtn.addEventListener('click', () => {
        if (confirm('Очистить историю чата?')) {
            localStorage.clear();
            location.reload();
        }
    });
    
    fileBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file?.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (ev) => sendToTelegram('', ev.target.result);
        reader.readAsDataURL(file);
        fileInput.value = '';
    });
    
    sendBtn.addEventListener('click', () => {
        const text = messageInput.value.trim();
        if (text) sendToTelegram(text);
        messageInput.value = '';
    });
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        }
    });
    
    let lastActivity = Date.now();
    document.addEventListener('click', () => {
        if (Date.now() - lastActivity > 5000) {
            lastActivity = Date.now();
            updateStatus(true, true);
        }
    });
    
    window.addEventListener('blur', () => updateStatus(false, false));
    window.addEventListener('focus', () => updateStatus(true, true));
    window.addEventListener('beforeunload', () => updateStatus(false, false));
    
    loadHistory();
    setInterval(() => updateStatus(true, true), 30000);
    setInterval(checkReplies, 5000);
    
    if (isPhoneRequired && !isPhoneBlocked()) {
        setTimeout(() => showPhoneForm(), 500);
    }
</script>
</body>
</html>
