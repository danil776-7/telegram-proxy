<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .content {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 20px;
            max-width: 500px;
            margin: 20px;
        }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; }
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 550px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: #25a3e2;
            cursor: pointer;
        }
        .chat-header {
            background: #25a3e2;
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: #f9f9f9;
        }
        .message {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 16px;
            margin-bottom: 8px;
        }
        .user-message {
            background: #25a3e2;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .bot-message {
            background: #e4e6eb;
            color: black;
        }
        .chat-input-area {
            display: flex;
            padding: 12px;
            background: white;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }
        .send-btn {
            background: #25a3e2;
            border: none;
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
        }
        .chat-widget.closed .chat-header, 
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area {
            display: none;
        }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon {
            display: flex;
        }
        .status {
            font-size: 11px;
            padding: 4px;
            text-align: center;
            background: #e8e8e8;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        .error { background: #fee; color: #c33; }
        .success { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам в виджет справа 👉</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <span>💬 Поддержка</span>
        <button class="close-btn">×</button>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status" id="status">🟢 Подключение...</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    // ========== КОНФИГУРАЦИЯ ==========
    const BOT_TOKEN = '8743342099:AAGWRLBrNjd8YlkHPSeqOU64J4-0fJdILPg';
    const YOUR_CHAT_ID = '7545540622';
    
    // ⚠️ ЗАМЕНИ НА СВОЙ URL ОТ RENDER ⚠️
    const PROXY_URL = 'https://test-gfg7.onrender.com';
    
    let userId = localStorage.getItem('chat_user_id');
    if (!userId) {
        userId = 'user_' + Date.now();
        localStorage.setItem('chat_user_id', userId);
    }
    
    // DOM элементы
    const widget = document.getElementById('chatWidget');
    const closeBtn = widget.querySelector('.close-btn');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    widget.addEventListener('click', (e) => {
        if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
            widget.classList.remove('closed');
        }
    });
    
    closeBtn.addEventListener('click', () => {
        widget.classList.add('closed');
    });
    
    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    
    async function sendToTelegram(text) {
        addMessage(text, true);
        statusDiv.innerHTML = '⏳ Отправка...';
        statusDiv.className = 'status';
        
        try {
            // Пробуем новый формат (без /api/)
            const response = await fetch(`${PROXY_URL}/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: YOUR_CHAT_ID,
                    text: `📝 Сообщение от ${userId}\n🌐 Сайт: ${window.location.hostname}\n\n${text}`
                })
            });
            
            const data = await response.json();
            console.log('Ответ:', data);
            
            if (data.ok) {
                statusDiv.innerHTML = '✅ Отправлено!';
                statusDiv.className = 'status success';
                setTimeout(() => {
                    statusDiv.innerHTML = '🟢 Онлайн';
                    statusDiv.className = 'status';
                }, 2000);
            } else {
                throw new Error(data.description || 'Ошибка');
            }
        } catch (error) {
            console.error('Ошибка:', error);
            statusDiv.innerHTML = `❌ Ошибка: ${error.message}`;
            statusDiv.className = 'status error';
            setTimeout(() => {
                statusDiv.innerHTML = '🟢 Онлайн';
                statusDiv.className = 'status';
            }, 3000);
        }
    }
    
    async function checkConnection() {
        try {
            const response = await fetch(`${PROXY_URL}/`);
            const data = await response.json();
            if (data.status === 'ok') {
                statusDiv.innerHTML = '🟢 Онлайн';
                statusDiv.className = 'status';
                return true;
            }
        } catch (error) {
            statusDiv.innerHTML = '🔴 Сервер недоступен';
            statusDiv.className = 'status error';
            return false;
        }
    }
    
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        sendToTelegram(text);
        messageInput.value = '';
    }
    
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    // Приветствие
    setTimeout(() => {
        addMessage('Здравствуйте! Напишите ваш вопрос 😊', false);
    }, 500);
    
    // Проверка соединения
    checkConnection();
    setInterval(checkConnection, 30000);
</script>
</body>
</html>
