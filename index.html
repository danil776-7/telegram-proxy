<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Чат с поддержкой</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .content {
            text-align: center;
            padding: 40px 20px;
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        h1 { font-size: 28px; margin-bottom: 16px; }
        p { color: #666; font-size: 16px; }
        
        .chat-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 380px;
            height: 600px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1000;
        }
        .chat-widget.closed {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            cursor: pointer;
        }
        .chat-widget.closed .chat-header,
        .chat-widget.closed .chat-messages,
        .chat-widget.closed .chat-input-area,
        .chat-widget.closed .phone-overlay { display: none; }
        .open-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
        }
        .chat-widget.closed .open-icon { display: flex; }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            position: relative;
        }
        .chat-header h3 { font-size: 20px; margin-bottom: 4px; }
        .chat-header p { font-size: 13px; opacity: 0.8; }
        .header-buttons {
            position: absolute;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 8px;
        }
        .clear-btn, .close-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            width: 32px;
            height: 32px;
            border-radius: 16px;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            align-self: flex-end;
        }
        .bot-message {
            background: white;
            color: #1a1a2e;
            align-self: flex-start;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .message-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eef2f6;
            background: white;
            gap: 8px;
        }
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .status {
            font-size: 12px;
            padding: 8px;
            text-align: center;
            background: #d4edda;
            color: #155724;
            border-radius: 20px;
            width: fit-content;
            align-self: center;
        }
        
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            border-radius: 24px;
            padding: 20px;
        }
        .phone-card {
            text-align: center;
            width: 100%;
            max-width: 320px;
        }
        .phone-card h4 { font-size: 24px; margin-bottom: 12px; color: #333; }
        .phone-card p { font-size: 14px; color: #666; margin-bottom: 24px; }
        .phone-input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-family: monospace;
        }
        .phone-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }
        .error-text { color: #dc3545; font-size: 12px; margin-top: 8px; }
        
        @media (max-width: 480px) {
            .chat-widget { width: 100%; height: 100%; bottom: 0; right: 0; border-radius: 0; }
            .chat-widget.closed { width: 56px; height: 56px; bottom: 20px; right: 20px; border-radius: 28px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
<div class="content">
    <h1>💬 Чат с поддержкой</h1>
    <p>Напишите нам — мы ответим в Telegram</p>
</div>

<div class="chat-widget closed" id="chatWidget">
    <div class="open-icon">💬</div>
    <div class="chat-header">
        <h3>Чат с поддержкой</h3>
        <p>Мы на связи и готовы помочь</p>
        <div class="header-buttons">
            <button class="clear-btn" id="clearBtn">🗑️</button>
            <button class="close-btn">×</button>
        </div>
    </div>
    <div class="chat-messages" id="chatMessages">
        <div class="status online" id="status">🟢 Готов к работе</div>
    </div>
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="messageInput" placeholder="Ваше сообщение...">
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
    const PROXY_URL = 'https://telegram-proxy-wyqq.onrender.com';
    
    let userId = localStorage.getItem('chat_user_id');
    if (!userId) {
        userId = 'user_' + Date.now();
        localStorage.setItem('chat_user_id', userId);
    }
    
    let userPhone = localStorage.getItem('user_phone');
    let isRegistered = !!userPhone;
    let lastUpdateId = 0;
    let userIp = '';
    
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => userIp = data.ip)
        .catch(() => userIp = '185.92.181.97');
    
    const widget = document.getElementById('chatWidget');
    const clearBtn = document.getElementById('clearBtn');
    const closeBtn = document.querySelector('.close-btn');
    const messagesDiv = document.getElementById('chatMessages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');
    
    function addMessage(text, isUser, timestamp = null) {
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
        div.innerText = text;
        
        const timeSpan = document.createElement('div');
        timeSpan.className = 'message-time';
        const date = timestamp ? new Date(timestamp * 1000) : new Date();
        timeSpan.innerText = date.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        div.appendChild(timeSpan);
        
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.push({ text, isUser, time: Date.now() });
        localStorage.setItem('chat_history', JSON.stringify(history.slice(-100)));
    }
    
    function setStatus(text) {
        if (statusDiv) statusDiv.innerHTML = text;
    }
    
    async function registerPhone(phone) {
        setStatus('⏳ Регистрация...');
        try {
            const response = await fetch(`${PROXY_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userId, 
                    site: window.location.hostname, 
                    ip: userIp, 
                    phone, 
                    region: 'Нидерланды, Амстердам'
                })
            });
            const data = await response.json();
            console.log('Регистрация:', data);
            if (data.ok) {
                userPhone = phone;
                localStorage.setItem('user_phone', phone);
                isRegistered = true;
                setStatus('🟢 Онлайн');
                addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false);
                return true;
            }
            return false;
        } catch (err) {
            console.error('Ошибка:', err);
            setStatus('❌ Ошибка');
            return false;
        }
    }
    
    function showPhoneForm() {
        const overlay = document.createElement('div');
        overlay.className = 'phone-overlay';
        overlay.innerHTML = `
            <div class="phone-card">
                <h4>Чат с поддержкой</h4>
                <p>Оставьте свой номер, чтобы мы могли ответить вам</p>
                <input type="tel" class="phone-input" id="phoneInput" placeholder="1234567890" maxlength="10" inputmode="numeric">
                <div id="phoneError" class="error-text" style="display: none;"></div>
                <button class="phone-submit" id="phoneSubmit">Начать чат</button>
            </div>
        `;
        widget.appendChild(overlay);
        
        const phoneInput = document.getElementById('phoneInput');
        const phoneError = document.getElementById('phoneError');
        const phoneSubmit = document.getElementById('phoneSubmit');
        
        phoneInput.oninput = function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 10);
        };
        
        phoneSubmit.onclick = async function() {
            const digits = phoneInput.value.trim();
            if (!digits || digits.length !== 10) {
                phoneError.textContent = 'Введите 10 цифр';
                phoneError.style.display = 'block';
                return;
            }
            const fullPhone = '+7' + digits;
            phoneError.style.display = 'none';
            phoneSubmit.disabled = true;
            phoneSubmit.textContent = 'Проверка...';
            const success = await registerPhone(fullPhone);
            if (success) {
                overlay.remove();
            } else {
                phoneSubmit.disabled = false;
                phoneSubmit.textContent = 'Начать чат';
                phoneError.textContent = 'Ошибка. Попробуйте позже.';
                phoneError.style.display = 'block';
            }
        };
    }
    
    async function sendToTelegram(text) {
        if (!isRegistered) {
            showPhoneForm();
            return;
        }
        addMessage(text, true);
        setStatus('⏳ Отправка...');
        try {
            const response = await fetch(`${PROXY_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userId, 
                    site: window.location.hostname, 
                    text: text
                })
            });
            const data = await response.json();
            console.log('Отправка:', data);
            if (data.ok) setStatus('🟢 Онлайн');
            else throw new Error();
        } catch (err) {
            setStatus('🔴 Ошибка');
            setTimeout(() => setStatus('🟢 Онлайн'), 3000);
        }
    }
    
    async function checkReplies() {
        try {
            const response = await fetch(`${PROXY_URL}/getUpdates?offset=${lastUpdateId}`);
            const data = await response.json();
            if (data.ok && data.result) {
                for (const update of data.result) {
                    lastUpdateId = Math.max(lastUpdateId, update.update_id + 1);
                    if (update.message && update.message.text && 
                        !update.message.text.includes('НОВЫЙ ПОЛЬЗОВАТЕЛЬ')) {
                        addMessage(update.message.text, false, update.message.date);
                    }
                }
            }
        } catch (err) {
            console.error('Ошибка:', err);
        }
    }
    
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('chat_history') || '[]');
        history.forEach(msg => {
            const div = document.createElement('div');
            div.className = `message ${msg.isUser ? 'user-message' : 'bot-message'}`;
            div.innerText = msg.text;
            const timeSpan = document.createElement('div');
            timeSpan.className = 'message-time';
            timeSpan.innerText = new Date(msg.time).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            div.appendChild(timeSpan);
            messagesDiv.appendChild(div);
        });
        if (history.length === 0 && isRegistered) {
            setTimeout(() => addMessage('Здравствуйте! Напишите ваш вопрос, и мы ответим в течение пары минут.', false), 500);
        }
    }
    
    widget.onclick = (e) => {
        if (widget.classList.contains('closed') && e.target.closest('.open-icon')) {
            widget.classList.remove('closed');
            if (!isRegistered) setTimeout(() => showPhoneForm(), 100);
        }
    };
    
    if (closeBtn) closeBtn.onclick = () => widget.classList.add('closed');
    if (clearBtn) clearBtn.onclick = () => {
        if (confirm('Очистить историю чата?')) {
            localStorage.clear();
            location.reload();
        }
    };
    
    sendBtn.onclick = () => {
        const text = messageInput.value.trim();
        if (text) sendToTelegram(text);
        messageInput.value = '';
    };
    
    messageInput.onkeypress = (e) => {
        if (e.key === 'Enter') {
            const text = messageInput.value.trim();
            if (text) sendToTelegram(text);
            messageInput.value = '';
        }
    };
    
    loadHistory();
    setInterval(checkReplies, 5000);
    
    if (!isRegistered) setTimeout(() => showPhoneForm(), 500);
</script>
</body>
</html>
